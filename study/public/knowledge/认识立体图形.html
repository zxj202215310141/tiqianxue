<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>认识立体图形</title>
<style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}.hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>📦 认识立体图形</h1><p><strong>立体图形</strong>是占有空间的图形，也叫<strong>几何体</strong>。常见的有长方体、正方体、圆柱、球等。</p><p style="margin-top:8px">💡 特征：<br>• <strong>长方体</strong>：6个面（长方形），相对的面相同<br>• <strong>正方体</strong>：6个面都是正方形，所有面相同<br>• <strong>圆柱</strong>：上下两个圆形底面，侧面是曲面<br>• <strong>球</strong>：表面是曲面，可以任意滚动</p><p style="margin-top:8px">📝 生活中：魔方≈正方体，易拉罐≈圆柱，篮球≈球，鞋盒≈长方体。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断物体是什么立体图形！</div></div>
<div class="card game"><h2>📦 立体图形挑战</h2><div class="hint">选择正确的图形名称</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'魔方的形状最接近什么立体图形？',o:['长方体','正方体','圆柱','球'],a:'正方体'},{t:'易拉罐的形状最接近什么立体图形？',o:['长方体','正方体','圆柱','球'],a:'圆柱'},{t:'篮球的形状是什么立体图形？',o:['圆柱','圆锥','正方体','球'],a:'球'},{t:'鞋盒的形状最接近什么立体图形？',o:['长方体','正方体','圆柱','球'],a:'长方体'},{t:'正方体有几个面？',o:['4个','6个','8个','12个'],a:'6个'},{t:'长方体的面是什么形状？',o:['都是正方形','都是长方形(含正方形)','都是圆形','都是三角形'],a:'都是长方形(含正方形)'},{t:'圆柱有几个底面？',o:['0个','1个','2个','3个'],a:'2个'},{t:'下面哪个立体图形可以滚动？',o:['长方体','正方体','球','都不可以'],a:'球'},{t:'正方体所有面的形状是？',o:['长方形','正方形','圆形','三角形'],a:'正方形'},{t:'下面哪个不是立体图形？',o:['长方体','正方形','圆柱','球'],a:'正方形'},{t:'圆柱的侧面是什么形状？',o:['平面','曲面','正方形','三角形'],a:'曲面'},{t:'长方体相对的面有什么特点？',o:['完全相同','完全不同','有时相同','无法确定'],a:'完全相同'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
