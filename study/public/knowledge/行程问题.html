<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>行程问题</title>
  <style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:18px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:110px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🚗 行程问题</h1><p>研究<strong>路程、速度、时间</strong>三者关系的应用题。</p><p style="margin-top:8px">💡 核心公式：<br><strong>路程 = 速度 × 时间</strong><br>速度 = 路程 ÷ 时间<br>时间 = 路程 ÷ 速度</p><p style="margin-top:8px">🔢 常见类型：<br>• <strong>相遇问题</strong>：总路程÷速度和=相遇时间<br>• <strong>追及问题</strong>：路程差÷速度差=追及时间<br>• <strong>行船问题</strong>：顺水速度=静水速+水速</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决行程问题！</div></div>
<div class="card game"><h2>🚗 行程问题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'速度60km/h，行3小时，路程？',o:['120','150','180','200'],a:'180'},{t:'两地相距480km，两车同时对开，速度分别为70和50km/h，几小时相遇？',o:['3','4','5','6'],a:'4'},{t:'小明从家到学校1200米，步行15分钟，速度？',o:['60','70','80','90'],a:'80'},{t:'甲在乙前20km，甲速80乙速100，几小时追上？',o:['0.5','1','1.5','2'],a:'1'},{t:'路程=速度×？',o:['速度','时间','距离','路程'],a:'时间'},{t:'火车长200米，速度20m/s，过桥用30秒，桥长？',o:['300','400','600','800'],a:'400'},{t:'顺水速度=静水速度+？',o:['逆水速度','水流速度','船速','前进速度'],a:'水流速度'},{t:'甲速度5m/s乙速度3m/s，同向跑400m甲追上乙要几秒？',o:['150','180','200','250'],a:'200'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
