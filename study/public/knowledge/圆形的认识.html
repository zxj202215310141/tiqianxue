<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆形的认识</title>
<style>:root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>⭕ 圆形的认识</h1><p><strong>圆</strong>是平面上到<strong>定点</strong>（圆心）距离等于<strong>定长</strong>（半径）的所有点组成的图形。</p><p style="margin-top:8px">💡 关键概念：<br>• <strong>圆心(O)</strong>：圆中心的点<br>• <strong>半径(r)</strong>：圆心到圆上任意一点的距离<br>• <strong>直径(d)</strong>：通过圆心两端在圆上的线段，d=2r</p><p style="margin-top:8px">🔢 周长 = 2πr = πd，面积 = πr²，π≈3.14。</p><p style="margin-top:8px">📝 圆有<strong>无数条</strong>对称轴，是轴对称图形。</p><div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断圆的特征与计算！</div></div>
<div class="card game"><h2>⭕ 圆形挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'圆心到圆上任意一点的距离叫？',o:['直径','半径','弦','弧'],a:'半径'},{t:'直径和半径的关系是？',o:['d=r','d=2r','d=r/2','没有关系'],a:'d=2r'},{t:'半径3cm的圆，直径是多少？',o:['1.5cm','3cm','6cm','9cm'],a:'6cm'},{t:'圆的周长公式是？',o:['πr','2πr','πr²','2πr²'],a:'2πr'},{t:'圆的面积公式是？',o:['πr','2πr','πr²','2πr²'],a:'πr²'},{t:'圆有几条对称轴？',o:['0条','1条','2条','无数条'],a:'无数条'},{t:'π约等于多少？',o:['2.14','3.14','3.41','4.13'],a:'3.14'},{t:'半径5cm的圆，周长约=',o:['15.7cm','31.4cm','78.5cm','157cm'],a:'31.4cm'},{t:'半径4cm的圆，面积约=',o:['12.56cm²','25.12cm²','50.24cm²','100.48cm²'],a:'50.24cm²'},{t:'圆是由什么围成的？',o:['线段','曲线','折线','直线'],a:'曲线'},{t:'直径是通过什么位置的线段？',o:['圆上任意点','圆心','圆外','切线'],a:'圆心'},{t:'一个圆的半径扩大2倍，周长扩大几倍？',o:['2倍','4倍','不变','8倍'],a:'2倍'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
