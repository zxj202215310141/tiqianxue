<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>百分数的认识</title>
  <style>
    :root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#ff9800;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .pie-container{width:200px;height:200px;margin:20px auto;position:relative}
    .pie-chart{width:100%;height:100%;border-radius:50%;background:conic-gradient(var(--accent2) 0deg,var(--accent2) 180deg,var(--accent) 180deg,var(--accent) 360deg);transition:background 0.5s ease}
    .pie-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:80px;height:80px;background:white;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:var(--accent2)}
    .question{font-size:20px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,var(--accent2),#ffb74d);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(255,152,0,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .slider{width:200px;margin:20px auto}
    .slider-track{width:100%;height:10px;background:linear-gradient(to right,var(--accent),var(--accent2));border-radius:5px;position:relative}
    .slider-thumb{width:30px;height:30px;background:white;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);cursor:grab;box-shadow:0 4px 8px rgba(0,0,0,0.2);transition:transform 0.2s}
    .slider-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.2)}
    .percentage-display{font-size:24px;font-weight:bold;color:var(--accent2);margin:10px 0}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.pie-container{width:160px;height:160px}.slider{width:150px}.pie-center{width:60px;height:60px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 百分数的认识</h1>
      <p>像50%、75%、100%这样的数叫做百分数，表示一个数是另一个数的百分之几。</p>
      <p style="margin-top:8px">💡 百分数也叫百分率或百分比。</p>
      <p style="margin-top:8px">🔢 50% = 1/2 = 0.5</p>
      <div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        百分比转盘！拖动滑块调整百分比到目标值。
      </div>
    </div>

    <div class="card game">
      <h2>🎯 百分比转盘</h2>
      <div class="hint">拖动滑块调整百分比到目标值</div>
      
      <div class="question" id="question">目标百分比：50%</div>
      
      <div class="pie-container">
        <div class="pie-chart" id="pie"></div>
        <div class="pie-center" id="center">0%</div>
      </div>
      
      <div class="percentage-display" id="display">当前：0%</div>
      
      <div class="slider">
        <div class="slider-track">
          <div class="slider-thumb" id="thumb" style="left:0%"></div>
        </div>
      </div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const pie = document.getElementById('pie')
    const center = document.getElementById('center')
    const display = document.getElementById('display')
    const thumb = document.getElementById('thumb')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let targetPercent = 0
    let currentPercent = 0
    let isDragging = false
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function updatePie(percent) {
      currentPercent = percent
      display.textContent = '当前：' + percent + '%'
      center.textContent = percent + '%'
      
      const degrees = (percent / 100) * 360
      pie.style.background = `conic-gradient(var(--accent2) 0deg, var(--accent2) ${degrees}deg, var(--accent) ${degrees}deg, var(--accent) 360deg)`
      thumb.style.left = percent + '%'
    }
    
    function checkAnswer() {
      if (currentPercent === targetPercent) {
        messageEl.textContent = '✅ 正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        setTimeout(() => {
          nextQuestion()
        }, 1500)
      } else {
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          messageEl.style.display = 'none'
        }, 1000)
      }
    }
    
    function generateQuestion() {
      targetPercent = Math.floor(Math.random() * 101)
      questionEl.textContent = '目标百分比：' + targetPercent + '%'
      messageEl.style.display = 'none'
      
      updatePie(0)
    }
    
    thumb.addEventListener('mousedown', e => {
      isDragging = true
      updatePosition(e.clientX)
    })
    
    document.addEventListener('mousemove', e => {
      if (!isDragging) return
      updatePosition(e.clientX)
    })
    
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false
        checkAnswer()
      }
    })
    
    function updatePosition(clientX) {
      const track = thumb.parentElement
      const rect = track.getBoundingClientRect()
      const x = clientX - rect.left
      const percentage = Math.max(0, Math.min(100, (x / rect.width) * 100))
      
      const percent = Math.round(percentage)
      updatePie(percent)
    }
    
    function nextQuestion() {
      generateQuestion()
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', nextQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
