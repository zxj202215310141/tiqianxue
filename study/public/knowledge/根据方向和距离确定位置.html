<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>根据方向和距离确定位置</title><style>:root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🎯 根据方向和距离确定位置</h1><p>要精确确定一个物体的位置，需要<strong>方向</strong>（方位角）和<strong>距离</strong>两个条件。</p><p style="margin-top:8px">💡 描述格式：<strong>[参照物]的[方向]偏[角度]，距离[长度]</strong>。</p><p style="margin-top:8px">🔢 例如：图书馆在学校的<strong>北偏东30°</strong>方向，距离<strong>500米</strong>。</p><div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>用方向和距离确定位置！</div></div><div class="card game"><h2>🎯 方向距离挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'确定位置两个必需条件？',o:['颜色和大小','方向和距离','时间和日期','姓名和编号'],a:'方向和距离'},{t:'A在B的北偏东30°200m处，B在A的？',o:['北偏东30°200m','南偏西30°200m','南偏东30°200m','北偏西30°200m'],a:'南偏西30°200m'},{t:'雷达上确定飞机位置需要？',o:['颜色','方向和距离','型号','速度'],a:'方向和距离'},{t:'地图上1cm代表实际1km，5cm代表？',o:['500m','1km','5km','50km'],a:'5km'},{t:'北偏西60°等于西偏北？',o:['30°','60°','90°','120°'],a:'30°'},{t:'GPS定位运用了什么原理？',o:['颜色识别','方向和距离','温度感应','声音传播'],a:'方向和距离'},{t:'学校在图书馆东偏南30°，图书馆在学校？',o:['东偏南30°','西偏北30°','西偏南30°','北偏东30°'],a:'西偏北30°'},{t:'根据方向和什么可以找到位置？',o:['颜色','大小','距离','形状'],a:'距离'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
