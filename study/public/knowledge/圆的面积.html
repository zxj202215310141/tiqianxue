<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆的面积</title><style>:root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>⭕ 圆的面积</h1><p>圆的<strong>面积</strong> = <strong>πr²</strong>（π≈3.14）。</p><p style="margin-top:8px">💡 推导：将圆分成若干等份，拼成一个近似的长方形。长≈πr，宽≈r，面积=πr×r=πr²。</p><p style="margin-top:8px">🔢 半径4cm，面积=3.14×4²=50.24cm²。<br>半径扩大2倍，面积扩大4倍。</p><div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算圆的面积！</div></div><div class="card game"><h2>⭕ 圆的面积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'半径4cm圆面积约？',o:['12.56cm²','25.12cm²','50.24cm²','100.48cm²'],a:'50.24cm²'},{t:'圆面积公式？',o:['2πr','πr','πr²','2πr²'],a:'πr²'},{t:'半径10cm面积约？',o:['31.4cm²','62.8cm²','314cm²','628cm²'],a:'314cm²'},{t:'半径扩大2倍面积扩大？',o:['2倍','4倍','8倍','不变'],a:'4倍'},{t:'直径8cm面积约？',o:['25.12cm²','50.24cm²','200.96cm²','803.84cm²'],a:'50.24cm²'},{t:'圆面积与圆周长公式区别？',o:['面积有平方','周长有平方','没区别','都有r'],a:'面积有平方'},{t:'半径3cm半圆面积约？',o:['14.13cm²','28.26cm²','56.52cm²','113.04cm²'],a:'14.13cm²'},{t:'面积78.5cm²半径约？',o:['3cm','5cm','7cm','10cm'],a:'5cm'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
