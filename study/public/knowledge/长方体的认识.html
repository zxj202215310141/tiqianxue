<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>长方体的认识</title>
<style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>📦 长方体的认识</h1><p><strong>长方体</strong>是由<strong>6个长方形</strong>（或4个长方形+2个正方形）围成的立体图形。</p><p style="margin-top:8px">💡 特征：<br>• 6个面，相对的面<strong>完全相同</strong><br>• 12条棱，相对的棱<strong>长度相等</strong><br>• 8个顶点<br>• 三条棱分别叫<strong>长、宽、高</strong></p><p style="margin-top:8px">🔢 表面积 = 2(ab+ah+bh)，体积 = 长×宽×高。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断长方体的特征！</div></div>
<div class="card game"><h2>📦 长方体挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'长方体有几个面？',o:['4个','6个','8个','12个'],a:'6个'},{t:'长方体有几条棱？',o:['6条','8条','10条','12条'],a:'12条'},{t:'长方体有几个顶点？',o:['4个','6个','8个','12个'],a:'8个'},{t:'长方体相对的面有什么特点？',o:['不同','完全相同','可能相同','没有特点'],a:'完全相同'},{t:'长方体体积公式是？',o:['长+宽+高','长×宽×高','(长+宽+高)×2','长×宽+高'],a:'长×宽×高'},{t:'长方体三条相交的棱分别叫？',o:['上、中、下','大、中、小','长、宽、高','前、后、侧'],a:'长、宽、高'},{t:'长3宽4高2的长方体体积？',o:['9','12','24','48'],a:'24'},{t:'正方体是特殊的长方体吗？',o:['是','不是','有时是','无法确定'],a:'是'},{t:'长5宽3高4的长方体表面积？',o:['47','60','74','94'],a:'94'},{t:'长方体每个面都是什么形状？',o:['只能是长方形','长方形或正方形','只能是正方形','三角形'],a:'长方形或正方形'},{t:'长方体最多有几个面是正方形？',o:['0个','1个','2个','4个'],a:'2个'},{t:'长方体相对的棱有什么特点？',o:['不相等','相等','垂直','没有特点'],a:'相等'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
