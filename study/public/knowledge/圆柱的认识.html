<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆柱的认识</title>
<style>:root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🥫 圆柱的认识</h1><p><strong>圆柱</strong>是由<strong>两个相同的圆形底面</strong>和一个<strong>曲面（侧面）</strong>围成的立体图形。</p><p style="margin-top:8px">💡 特征：<br>• 上下两个底面是<strong>完全相同</strong>的圆<br>• 侧面是<strong>曲面</strong>，展开后是长方形<br>• 两底面之间的垂直距离叫<strong>高</strong></p><p style="margin-top:8px">🔢 侧面积=2πrh，表面积=2πr²+2πrh，体积=πr²h。</p><p style="margin-top:8px">📝 生活中：易拉罐、水杯、柱子等。</p><div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断圆柱的特征！</div></div>
<div class="card game"><h2>🥫 圆柱挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'圆柱有几个底面？',o:['0个','1个','2个','3个'],a:'2个'},{t:'圆柱的底面是什么形状？',o:['正方形','长方形','圆形','三角形'],a:'圆形'},{t:'圆柱的侧面是什么形状？',o:['平面','曲面','正方形','圆形'],a:'曲面'},{t:'圆柱体积公式是？',o:['πr²','2πrh','πr²h','πr²h/3'],a:'πr²h'},{t:'圆柱侧面展开后是什么形状？',o:['圆形','正方形','长方形','三角形'],a:'长方形'},{t:'圆柱侧面积公式是？',o:['πr²','2πrh','πr²h','2πr'],a:'2πrh'},{t:'圆柱上下两个底面？',o:['大小不同','完全相同','一个圆一个方','无法确定'],a:'完全相同'},{t:'圆柱有几条高？',o:['1条','2条','3条','无数条'],a:'无数条'},{t:'底面半径2高5的圆柱体积约？',o:['31.4','62.8','20','125.6'],a:'62.8'},{t:'下面哪个是圆柱？',o:['粉笔','易拉罐','魔方','篮球'],a:'易拉罐'},{t:'圆柱的高是指？',o:['底面直径','底面半径','两底面间的垂直距离','侧面的长度'],a:'两底面间的垂直距离'},{t:'圆柱和棱柱的区别？',o:['都有曲面侧面','圆柱侧面是曲面棱柱侧面是平面','没区别','圆柱有角'],a:'圆柱侧面是曲面棱柱侧面是平面'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
