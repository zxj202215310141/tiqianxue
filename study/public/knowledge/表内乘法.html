<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>表内乘法</title>
  <style>
    :root{--bg:#f3e5f5;--card:#ffffff;--accent:#ce93d8;--accent2:#7b1fa2;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .wheel-container{position:relative;width:200px;height:200px;margin:20px auto}
    .wheel{width:100%;height:100%;border-radius:50%;background:conic-gradient(#7b1fa2 0deg,#ab47bc 45deg,#7b1fa2 90deg,#ab47bc 135deg,#7b1fa2 180deg,#ab47bc 225deg,#7b1fa2 270deg,#ab47bc 315deg);transition:transform 2s ease-out}
    .wheel.spinning{animation:spin 2s linear}
    .wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 4px 8px rgba(0,0,0,0.2);cursor:pointer}
    .question{font-size:32px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:20px 0}
    .opt-btn{width:70px;height:70px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s}
    .opt-btn:active{transform:scale(0.95)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ab47bc);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(123,31,162,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.wheel-container{width:160px;height:160px}.question{font-size:24px}.opt-btn{width:60px;height:60px;font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 表内乘法</h1>
      <p>表内乘法是指乘法口诀表中的乘法（1-9的乘法）。</p>
      <p style="margin-top:8px">💡 乘法是相同加数加法的简便运算。</p>
      <p style="margin-top:8px">🔢 例如：3 × 4 = 12，表示3个4相加或4个3相加。</p>
      <div style="margin-top:16px;padding:12px;background:#ce93d8;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        点击转盘，回答乘法问题！
      </div>
    </div>

    <div class="card game">
      <h2>🎡 乘法转盘</h2>
      <div class="hint">点击转盘，回答乘法问题</div>
      
      <div class="wheel-container">
        <div class="wheel" id="wheel"></div>
        <div class="wheel-center" id="spinBtn">✖️</div>
      </div>
      
      <div class="question" id="question">点击转盘开始！</div>
      
      <div class="options" id="options"></div>
      
      <div class="row">
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const wheel = document.getElementById('wheel')
    const spinBtn = document.getElementById('spinBtn')
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let isSpinning = false
    let currentAnswer = 0
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const num1 = Math.floor(Math.random() * 9) + 1
      const num2 = Math.floor(Math.random() * 9) + 1
      currentAnswer = num1 * num2
      
      questionEl.textContent = num1 + ' × ' + num2 + ' = ?'
      messageEl.style.display = 'none'
      optionsEl.innerHTML = ''
      
      const options = [currentAnswer]
      while (options.length < 4) {
        const rand = Math.floor(Math.random() * 81) + 1
        if (!options.includes(rand)) options.push(rand)
      }
      shuffle(options)
      
      options.forEach(opt => {
        const btn = document.createElement('div')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            messageEl.textContent = '❌ 不对哦，再试试！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function spinWheel() {
      if (isSpinning) return
      isSpinning = true
      wheel.classList.add('spinning')
      optionsEl.innerHTML = ''
      messageEl.style.display = 'none'
      
      setTimeout(() => {
        wheel.classList.remove('spinning')
        isSpinning = false
        generateQuestion()
      }, 2000)
    }
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function init() {
      score = 0
      setScore(0)
      isSpinning = false
      wheel.classList.remove('spinning')
      questionEl.textContent = '点击转盘开始！'
      optionsEl.innerHTML = ''
      messageEl.style.display = 'none'
    }
    
    spinBtn.addEventListener('click', spinWheel)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
