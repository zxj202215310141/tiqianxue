<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>面积单位</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#ff9800;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .gacha-machine{background:linear-gradient(180deg,#ffcc80,#ff9800);border-radius:16px;padding:20px;margin:16px 0;width:100%;min-height:200px;position:relative;overflow:hidden}
    .gacha-ball{position:absolute;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:transform 0.3s;animation:bounce 2s ease-in-out infinite}
    .gacha-ball:hover{transform:scale(1.2)}
    .gacha-ball.selected{animation:none}
    .gacha-window{background:rgba(255,255,255,0.3);border-radius:12px;padding:16px;margin-top:16px;width:100%;min-height:80px;border:3px dashed white;text-align:center}
    .question{font-size:20px;font-weight:bold;color:#fff;margin:16px 0;text-align:center;text-shadow:1px 1px 2px rgba(0,0,0,0.3)}
    .btn{background:linear-gradient(135deg,#fff,#ffecb3);color:var(--accent2);padding:10px 20px;border-radius:12px;border:none;font-size:16px;font-weight:bold;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,0,0,0.2)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.gacha-ball{width:40px;height:40px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📐 面积单位</h1>
      <p>常用面积单位：平方厘米（cm²）、平方分米（dm²）、平方米（m²）、公顷（hm²）、平方千米（km²）。</p>
      <p style="margin-top:8px">🔢 换算关系：100 cm² = 1 dm²，100 dm² = 1 m²，10000 m² = 1 公顷，100 公顷 = 1 km²。</p>
      <div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        扭蛋机！点击扭蛋获取题目，然后选择正确的答案。看看你能扭出什么！
      </div>
    </div>

    <div class="card game">
      <h2>🥚 扭蛋机</h2>
      <div class="hint">点击扭蛋获取题目，选择正确答案</div>
      
      <div class="gacha-machine" id="gacha">
        <div class="question" id="question">点击扭蛋开始！</div>
        <div class="gacha-ball" style="background:#e17055;left:20%;top:50%">🔴</div>
        <div class="gacha-ball" style="background:#00b894;left:45%;top:60%">🟢</div>
        <div class="gacha-ball" style="background:#0984e3;left:70%;top:50%">🔵</div>
      </div>
      
      <div class="gacha-window" id="window">获得的答案：</div>
      
      <div class="options" id="options" style="display:none"></div>
      
      <div class="row">
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const gacha = document.getElementById('gacha')
    const questionEl = document.getElementById('question')
    const windowEl = document.getElementById('window')
    const optionsEl = document.getElementById('options')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = 0
    
    const questions = [
      { q: '1平方米 = ? 平方分米', options: [10, 100, 1000], answer: 100 },
      { q: '1平方分米 = ? 平方厘米', options: [10, 100, 1000], answer: 100 },
      { q: '1公顷 = ? 平方米', options: [1000, 10000, 100], answer: 10000 },
      { q: '1平方千米 = ? 公顷', options: [10, 100, 1000], answer: 100 },
      { q: '100平方厘米 = ? 平方分米', options: [1, 10, 100], answer: 1 },
      { q: '100平方分米 = ? 平方米', options: [1, 10, 100], answer: 1 },
      { q: '10000平方米 = ? 公顷', options: [1, 10, 100], answer: 1 },
      { q: '100公顷 = ? 平方千米', options: [1, 10, 100], answer: 1 }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function initGacha() {
      gacha.innerHTML = `
        <div class="question" id="question">点击扭蛋开始！</div>
        <div class="gacha-ball" style="background:#e17055;left:20%;top:50%">🔴</div>
        <div class="gacha-ball" style="background:#00b894;left:45%;top:60%">🟢</div>
        <div class="gacha-ball" style="background:#0984e3;left:70%;top:50%">🔵</div>
      `
      
      const balls = document.querySelectorAll('.gacha-ball')
      balls.forEach(ball => {
        ball.addEventListener('click', () => {
          ball.classList.add('selected')
          ball.style.transform = 'scale(0)'
          setTimeout(() => {
            generateQuestion()
          }, 500)
        })
      })
    }
    
    function generateQuestion() {
      const idx = Math.floor(Math.random() * questions.length)
      const q = questions[idx]
      currentAnswer = q.answer
      
      questionEl.textContent = q.q
      windowEl.innerHTML = '获得的答案：'
      messageEl.style.display = 'none'
      
      const options = [...q.options]
      shuffle(options)
      
      optionsEl.innerHTML = ''
      options.forEach(opt => {
        const el = document.createElement('button')
        el.className = 'btn'
        el.textContent = opt
        el.addEventListener('click', () => {
          if (opt === currentAnswer) {
            windowEl.innerHTML = '获得的答案：✅ ' + opt
            messageEl.textContent = '🎉 答对了！扭蛋成功！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
            
            setTimeout(() => {
              initGacha()
              optionsEl.style.display = 'none'
            }, 1500)
          } else {
            windowEl.innerHTML = '获得的答案：❌ ' + opt
            messageEl.textContent = '😢 答错了，再试一次！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(el)
      })
      
      optionsEl.style.display = 'flex'
      optionsEl.style.gap = '8px'
      optionsEl.style.justifyContent = 'center'
    }
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function init() {
      score = 0
      setScore(0)
      initGacha()
      optionsEl.style.display = 'none'
    }
    
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
