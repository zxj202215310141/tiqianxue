<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>角的认识</title>
<style>:root{--bg:#ede7f6;--card:#ffffff;--accent:#b39ddb;--accent2:#311b92;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(49,27,146,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#4527a0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>📐 角的认识</h1><p>从<strong>一点</strong>引出<strong>两条射线</strong>所组成的图形叫做<strong>角</strong>。这个点叫<strong>顶点</strong>，两条射线叫<strong>边</strong>。</p><p style="margin-top:8px">💡 角的要素：<br>• <strong>顶点</strong>：两条射线的公共端点<br>• <strong>边</strong>：从顶点引出的两条射线<br>• <strong>大小</strong>：由两条边张开的程度决定</p><p style="margin-top:8px">📝 角的大小用<strong>度(°)</strong>来衡量。角的大小与边的长短无关。直角=90°，平角=180°，周角=360°。</p><div style="margin-top:16px;padding:12px;background:#b39ddb;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断角的认识！</div></div>
<div class="card game"><h2>📐 角的认识挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'角是由什么组成的？',o:['两条线段','一个顶点和两条射线','三条线段','一个点和一条线'],a:'一个顶点和两条射线'},{t:'角的大小由什么决定？',o:['边的长短','两边张开的程度','顶点的位置','无法确定'],a:'两边张开的程度'},{t:'直角等于多少度？',o:['45°','60°','90°','180°'],a:'90°'},{t:'平角等于多少度？',o:['90°','180°','270°','360°'],a:'180°'},{t:'周角等于多少度？',o:['90°','180°','270°','360°'],a:'360°'},{t:'角的大小与边的长短有关吗？',o:['有关','无关','有时有关','无法确定'],a:'无关'},{t:'角的两条边是什么线？',o:['线段','直线','射线','曲线'],a:'射线'},{t:'角的度量单位是？',o:['厘米','平方厘米','度','米'],a:'度'},{t:'一个三角板中最小的角约多少度？',o:['15°','30°','45°','60°'],a:'30°'},{t:'下面哪个不是角的组成部分？',o:['顶点','边','面','都是'],a:'面'},{t:'比直角大比平角小的角叫？',o:['锐角','钝角','周角','直角'],a:'钝角'},{t:'用放大镜看一个角，角的大小？',o:['变大','变小','不变','无法确定'],a:'不变'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
