<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>分数应用题</title>
  <style>:root{--bg:#ede7f6;--card:#ffffff;--accent:#b39ddb;--accent2:#311b92;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:18px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(49,27,146,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#4527a0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>📊 分数应用题</h1><p>涉及<strong>分数</strong>关系的应用题。关键是找准<strong>单位"1"</strong>的量。</p><p style="margin-top:8px">💡 三种基本类型：<br>① 求一个数的几分之几：<strong>单位"1"×分率</strong><br>② 已知一个数的几分之几，求这个数：<strong>部分量÷分率</strong><br>③ 求一个数是另一个数的几分之几：<strong>比较量÷单位"1"</strong></p><p style="margin-top:8px">🔢 例如：一本书120页，看了3/5，看了几页？120×3/5=72页。</p><div style="margin-top:16px;padding:12px;background:#b39ddb;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决分数应用题！</div></div>
<div class="card game"><h2>📊 分数应用题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'一本书120页，看了3/5，看了几页？',o:['60','72','80','90'],a:'72'},{t:'一桶油用去2/5后剩18千克，原来多少千克？',o:['25','30','36','45'],a:'30'},{t:'一班有48人，男生占5/8，男生几人？',o:['20','24','28','30'],a:'30'},{t:'看了80页是全书的2/3，全书几页？',o:['100','110','120','160'],a:'120'},{t:'小明身高140cm，是爸爸的7/9，爸爸多高？',o:['160','170','180','150'],a:'180'},{t:'甲数是乙数的3/4，乙=60，甲=？',o:['40','45','50','80'],a:'45'},{t:'女生占全班的3/5，男生有16人，全班几人？',o:['30','35','40','32'],a:'40'},{t:'一块地的2/5种花，剩下120m²种菜，地多大？',o:['180','200','300','240'],a:'200'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
