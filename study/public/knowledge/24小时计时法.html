<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>24小时计时法</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffb74d;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .clock{width:180px;height:180px;border:8px solid var(--accent2);border-radius:50%;position:relative;margin:20px 0}
    .clock-hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:4px}
    .hour-hand{width:6px;height:50px;background:var(--accent2)}
    .minute-hand{width:4px;height:70px;background:var(--accent)}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:120px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:24px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:100px;height:50px;font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>⏰ 24小时计时法</h1>
      <p>24小时计时法：从0时到24时的计时方法。</p>
      <p style="margin-top:8px">💡 上午的时间和12小时计时法一样，下午的时间要加上12。</p>
      <p style="margin-top:8px">🔢 例如：下午3时 = 15时，晚上9时 = 21时。</p>
      <div style="margin-top:16px;padding:12px;background:#ffb74d;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        将12小时计时法转换为24小时计时法！
      </div>
    </div>

    <div class="card game">
      <h2>⏰ 时间转换挑战</h2>
      <div class="hint">选择正确的24小时时间</div>
      
      <div class="question" id="question">下午3时 = ___ 时</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '上午8时 = ___ 时', options: ['8', '10', '20', '22'], answer: '8' },
      { text: '下午1时 = ___ 时', options: ['1', '11', '13', '21'], answer: '13' },
      { text: '下午3时 = ___ 时', options: ['3', '13', '15', '23'], answer: '15' },
      { text: '下午5时 = ___ 时', options: ['5', '15', '17', '23'], answer: '17' },
      { text: '晚上7时 = ___ 时', options: ['7', '15', '19', '21'], answer: '19' },
      { text: '晚上9时 = ___ 时', options: ['9', '17', '19', '21'], answer: '21' },
      { text: '晚上10时 = ___ 时', options: ['10', '12', '20', '22'], answer: '22' },
      { text: '中午12时 = ___ 时', options: ['0', '12', '20', '24'], answer: '12' },
      { text: '凌晨2时 = ___ 时', options: ['2', '14', '20', '22'], answer: '2' },
      { text: '下午6时 = ___ 时', options: ['6', '14', '18', '20'], answer: '18' },
      { text: '上午10时 = ___ 时', options: ['10', '12', '20', '22'], answer: '10' },
      { text: '深夜12时 = ___ 时', options: ['0', '12', '20', '24'], answer: '24' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt + ':00'
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + ':00！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
