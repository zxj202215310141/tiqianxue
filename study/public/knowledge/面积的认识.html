<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>面积的认识</title><style>:root{--bg:#e0f7fa;--card:#ffffff;--accent:#80deea;--accent2:#006064;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,96,100,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#00838f);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>📐 面积的认识</h1><p><strong>面积</strong>是物体表面或封闭图形<strong>的大小</strong>。常用单位：cm²、dm²、m²、km²。</p><p style="margin-top:8px">💡 常见面积公式：<br>• 长方形面积 = <strong>长×宽</strong><br>• 正方形面积 = <strong>边长×边长</strong><br>• 1m²=100dm², 1dm²=100cm², 1公顷=10000m²</p><p style="margin-top:8px">📝 面积和周长不同：周长是边的长度，面积是面的大小。例如：长4宽3的长方形，周长=14，面积=12。</p><div style="margin-top:16px;padding:12px;background:#80deea;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算图形的面积！</div></div><div class="card game"><h2>📐 面积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'长方形面积公式？',o:['长+宽','(长+宽)×2','长×宽','长×2+宽×2'],a:'长×宽'},{t:'正方形面积公式？',o:['边长×4','边长×边长','边长×2','边长+边长'],a:'边长×边长'},{t:'1平方米等于多少平方分米？',o:['10','100','1000','10000'],a:'100'},{t:'长5宽3长方形面积？',o:['8','15','16','30'],a:'15'},{t:'边长4cm正方形面积？',o:['8cm²','12cm²','16cm²','32cm²'],a:'16cm²'},{t:'面积和周长有什么区别？',o:['没有区别','面积是面的大小周长是边长','一样的东西','无关'],a:'面积是面的大小周长是边长'},{t:'1平方分米等于多少平方厘米？',o:['10','100','1000','10000'],a:'100'},{t:'长8宽6长方形面积？',o:['14','24','28','48'],a:'48'},{t:'周长24的正方形面积？',o:['24','30','36','48'],a:'36'},{t:'1公顷等于多少平方米？',o:['100','1000','10000','100000'],a:'10000'},{t:'面积常用的单位是？',o:['米','千克','平方米','升'],a:'平方米'},{t:'长方形长扩大2倍宽不变面积？',o:['不变','扩大2倍','扩大4倍','缩小'],a:'扩大2倍'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
