<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>正比例</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:130px;height:55px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📈 正比例</h1>
      <p>两种相关联的量，一种量变化，另一种量也随着变化，如果这两种量中相对应的两个数的比值一定，这两种量叫做成正比例的量。</p>
      <p style="margin-top:8px">💡 正比例关系可以用式子 y/x = k（k为常数）表示。</p>
      <p style="margin-top:8px">🔢 例如：速度一定时，路程和时间成正比例。</p>
      <div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        判断两种量是否成正比例！
      </div>
    </div>

    <div class="card game">
      <h2>📈 正比例挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">下面哪组量成正比例？</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '下面哪组量成正比例？', options: ['身高和体重', '速度一定时，路程和时间', '正方形的边长和面积', '年龄和身高'], answer: '速度一定时，路程和时间' },
      { text: '下面哪组量成正比例？', options: ['单价一定时，总价和数量', '一个人的年龄和体重', '长方形的面积和宽', '正方形的周长和边长'], answer: '单价一定时，总价和数量' },
      { text: '下面哪组量不成正比例？', options: ['工作效率一定时，工作总量和时间', '圆的周长和直径', '正方形的边长和周长', '小明的身高和年龄'], answer: '小明的身高和年龄' },
      { text: '下面哪组量成正比例？', options: ['一本书已读页数和未读页数', '圆柱的底面积一定时，体积和高', '人的年龄和视力', '正方形的面积和边长'], answer: '圆柱的底面积一定时，体积和高' },
      { text: '如果 y/x = 5，那么y和x：', options: ['成正比例', '成反比例', '不成比例', '无法确定'], answer: '成正比例' },
      { text: '下面哪组量成正比例？', options: ['路程一定时，速度和时间', '圆的面积和半径', '单价一定时，总价和数量', '长方形的周长一定时，长和宽'], answer: '单价一定时，总价和数量' },
      { text: '下面哪组量不成正比例？', options: ['速度一定时，路程和时间', '单价一定时，总价和数量', '工作效率一定时，工作总量和时间', '正方形的面积和边长'], answer: '正方形的面积和边长' },
      { text: '如果 x和y成正比例，当x=2时y=6，那么x=3时y=？', options: ['6', '8', '9', '12'], answer: '9' },
      { text: '下面哪组量成正比例？', options: ['梯形的面积和高', '三角形的底一定时，面积和高', '长方形的周长和长', '正方形的边长和面积'], answer: '三角形的底一定时，面积和高' },
      { text: '如果 a和b成正比例，当a=4时b=8，那么a=6时b=？', options: ['10', '12', '14', '16'], answer: '12' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
