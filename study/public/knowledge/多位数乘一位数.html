<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>多位数乘一位数</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#81c784;--accent2:#43a047;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .equation{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .answer-box{width:80px;height:60px;border:3px dashed var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--accent2)}
    .answer-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    .number-tiles{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;justify-content:center}
    .tile{width:55px;height:55px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:white;cursor:grab;transition:transform 0.2s}
    .tile:active{cursor:grabbing;transform:scale(1.1)}
    .btn{background:linear-gradient(135deg,var(--accent2),#81c784);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(67,160,71,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .carry-box{width:40px;height:40px;border:2px dashed var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--accent2);margin-right:8px}
    .carry-box.filled{border-color:var(--accent2);background:var(--accent);color:white}
    .vertical{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
    .vertical-row{display:flex;align-items:center}
    .line{width:100%;height:3px;background:var(--accent);margin:5px 0}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.equation{font-size:20px}.answer-box{width:60px;height:50px;font-size:18px}.tile{width:50px;height:50px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 多位数乘一位数</h1>
      <p>多位数乘一位数如 234 × 5，可以把 234 拆成 200+30+4，分别乘 5 再相加。</p>
      <p style="margin-top:8px">💡 竖式计算：从个位开始乘，注意进位。</p>
      <p style="margin-top:8px">🔢 例如：234 × 5 = 1170</p>
      <div style="margin-top:16px;padding:12px;background:#81c784;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        拖动数字完成乘法竖式，注意进位哦！
      </div>
    </div>

    <div class="card game">
      <h2>🧮 乘法竖式挑战</h2>
      <div class="hint">拖动数字完成乘法竖式</div>
      
      <div class="vertical" id="vertical">
        <div class="vertical-row">
          <div class="carry-box" id="carry1"></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end">
            <div style="font-size:24px;font-weight:bold;color:var(--accent2)" id="multiplicand">234</div>
            <div style="font-size:24px;font-weight:bold;color:var(--accent2)">× <span id="multiplier">5</span></div>
          </div>
        </div>
        <div class="line"></div>
        <div class="vertical-row" style="font-size:28px;font-weight:bold;color:var(--accent2)">
          <div class="answer-box" id="ans1"></div>
          <div class="answer-box" id="ans2"></div>
          <div class="answer-box" id="ans3"></div>
          <div class="answer-box" id="ans4"></div>
        </div>
      </div>
      
      <div class="number-tiles" id="tiles"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const multiplicandEl = document.getElementById('multiplicand')
    const multiplierEl = document.getElementById('multiplier')
    const ans1 = document.getElementById('ans1')
    const ans2 = document.getElementById('ans2')
    const ans3 = document.getElementById('ans3')
    const ans4 = document.getElementById('ans4')
    const carry1 = document.getElementById('carry1')
    const tilesEl = document.getElementById('tiles')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentDigits = []
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const multiplicand = Math.floor(Math.random() * 900) + 100
      const multiplier = Math.floor(Math.random() * 8) + 2
      const result = multiplicand * multiplier
      
      currentDigits = result.toString().split('').map(Number)
      while (currentDigits.length < 4) currentDigits.unshift(0)
      
      multiplicandEl.textContent = multiplicand
      multiplierEl.textContent = multiplier
      
      ans1.textContent = ''
      ans1.classList.remove('filled')
      ans2.textContent = ''
      ans2.classList.remove('filled')
      ans3.textContent = ''
      ans3.classList.remove('filled')
      ans4.textContent = ''
      ans4.classList.remove('filled')
      carry1.textContent = ''
      carry1.classList.remove('filled')
      messageEl.style.display = 'none'
      
      initTiles(currentDigits)
    }
    
    function initTiles(correct) {
      tilesEl.innerHTML = ''
      const options = [...correct]
      
      while (options.length < 6) {
        const rand = Math.floor(Math.random() * 10)
        if (!options.includes(rand)) options.push(rand)
      }
      
      shuffle(options)
      
      options.forEach(num => {
        const tile = document.createElement('div')
        tile.className = 'tile'
        tile.textContent = num
        tile.draggable = true
        
        tile.addEventListener('dragstart', e => {
          e.dataTransfer.setData('num', num.toString())
          tile.style.opacity = '0.5'
        })
        
        tile.addEventListener('dragend', () => {
          tile.style.opacity = '1'
        })
        
        tilesEl.appendChild(tile)
      })
    }
    
    function checkComplete() {
      const filled1 = ans1.classList.contains('filled')
      const filled2 = ans2.classList.contains('filled')
      const filled3 = ans3.classList.contains('filled')
      const filled4 = ans4.classList.contains('filled')
      
      if (filled1 && filled2 && filled3 && filled4) {
        messageEl.textContent = '✅ 正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        setTimeout(() => {
          generateQuestion()
        }, 1000)
      }
    }
    
    function handleDrop(e, box, expected) {
      const num = parseInt(e.dataTransfer.getData('num'))
      
      if (box.textContent !== '') return
      
      if (num === expected) {
        box.textContent = num
        box.classList.add('filled')
        checkComplete()
      } else {
        box.textContent = num
        box.style.borderColor = 'var(--wrong)'
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          generateQuestion()
        }, 1000)
      }
    }
    
    ans1.addEventListener('dragover', e => e.preventDefault())
    ans1.addEventListener('drop', e => handleDrop(e, ans1, currentDigits[0]))
    
    ans2.addEventListener('dragover', e => e.preventDefault())
    ans2.addEventListener('drop', e => handleDrop(e, ans2, currentDigits[1]))
    
    ans3.addEventListener('dragover', e => e.preventDefault())
    ans3.addEventListener('drop', e => handleDrop(e, ans3, currentDigits[2]))
    
    ans4.addEventListener('dragover', e => e.preventDefault())
    ans4.addEventListener('drop', e => handleDrop(e, ans4, currentDigits[3]))
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
