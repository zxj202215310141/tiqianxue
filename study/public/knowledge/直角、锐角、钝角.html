<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>直角、锐角、钝角</title>
<style>:root{--bg:#e0f7fa;--card:#ffffff;--accent:#80deea;--accent2:#006064;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,96,100,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#00838f);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>📏 直角、锐角、钝角</h1><p>角按<strong>大小</strong>可以分为三类：</p><p style="margin-top:8px">💡 分类：<br>• <strong>直角</strong>：等于<strong>90°</strong>的角，用"┐"符号表示<br>• <strong>锐角</strong>：<strong>小于90°</strong>的角<br>• <strong>钝角</strong>：大于90°而<strong>小于180°</strong>的角</p><p style="margin-top:8px">🔢 大小关系：锐角 < 直角 < 钝角 < 平角(180°) < 周角(360°)。</p><p style="margin-top:8px">📝 三角板上的角：一般有90°、60°、30°和90°、45°、45°。</p><div style="margin-top:16px;padding:12px;background:#80deea;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断角的类型！</div></div>
<div class="card game"><h2>📏 直角锐角钝角挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'直角等于多少度？',o:['30°','45°','90°','180°'],a:'90°'},{t:'小于90°的角叫什么？',o:['直角','锐角','钝角','平角'],a:'锐角'},{t:'大于90°而小于180°的角叫什么？',o:['直角','锐角','钝角','平角'],a:'钝角'},{t:'35°的角是什么角？',o:['直角','锐角','钝角','平角'],a:'锐角'},{t:'120°的角是什么角？',o:['直角','锐角','钝角','平角'],a:'钝角'},{t:'下面哪个是锐角？',o:['90°','100°','45°','180°'],a:'45°'},{t:'三角板上有几个直角？',o:['0个','1个','2个','3个'],a:'1个'},{t:'下面哪个是钝角？',o:['30°','60°','90°','150°'],a:'150°'},{t:'比直角大比平角小的角是？',o:['锐角','直角','钝角','周角'],a:'钝角'},{t:'用三角板可以判断什么？',o:['角是不是锐角','角是不是直角','角的大小','以上都对'],a:'角是不是直角'},{t:'89°的角比直角？',o:['大','小','相等','无法比较'],a:'小'},{t:'91°的角是什么角？',o:['锐角','直角','钝角','平角'],a:'钝角'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
