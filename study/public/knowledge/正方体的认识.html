<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>正方体的认识</title>
<style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🎲 正方体的认识</h1><p><strong>正方体</strong>是由<strong>6个完全相同的正方形</strong>围成的立体图形，也叫<strong>立方体</strong>。</p><p style="margin-top:8px">💡 特征：<br>• 6个面<strong>完全相同</strong>（都是正方形）<br>• 12条棱<strong>长度都相等</strong><br>• 8个顶点</p><p style="margin-top:8px">🔢 表面积 = 6a²，体积 = a³（a为棱长）。</p><p style="margin-top:8px">📝 正方体是特殊的长方体。生活中：魔方、骰子等。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断正方体的特征与计算！</div></div>
<div class="card game"><h2>🎲 正方体挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'正方体有几个面？',o:['4个','6个','8个','12个'],a:'6个'},{t:'正方体的6个面是什么形状？',o:['长方形','正方形','三角形','圆形'],a:'正方形'},{t:'正方体所有棱长有什么特点？',o:['都不相等','只有相对的相等','都相等','有两组相等'],a:'都相等'},{t:'正方体体积公式是？',o:['a²','a³','6a²','12a'],a:'a³'},{t:'正方体表面积公式是？',o:['a²','a³','6a²','12a'],a:'6a²'},{t:'棱长3cm的正方体体积？',o:['9cm³','18cm³','27cm³','54cm³'],a:'27cm³'},{t:'棱长2cm的正方体表面积？',o:['8cm²','16cm²','24cm²','48cm²'],a:'24cm²'},{t:'正方体是特殊的长方体吗？',o:['是','不是','有时是','无法确定'],a:'是'},{t:'正方体有几个顶点？',o:['4个','6个','8个','12个'],a:'8个'},{t:'正方体有几条棱？',o:['6条','8条','12条','16条'],a:'12条'},{t:'正方体每个面之间是什么关系？',o:['相对','相邻','完全相同','互相垂直'],a:'完全相同'},{t:'魔方的形状是？',o:['长方体','正方体','圆柱','球'],a:'正方体'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
