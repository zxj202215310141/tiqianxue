<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>正方形面积</title><style>:root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>⬛ 正方形面积</h1><p>正方形<strong>面积</strong> = <strong>边长 × 边长</strong> = 边长²。</p><p style="margin-top:8px">💡 正方形是特殊的长方形（长=宽=边长），所以面积=边长×边长。</p><p style="margin-top:8px">🔢 例如：边长7cm，面积=7×7=49cm²。<br>已知面积64m²，边长=8m。</p><p style="margin-top:8px">📝 正方形边长扩大n倍，面积扩大n²倍。如边长扩大2倍，面积扩大4倍。</p><div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算正方形面积！</div></div><div class="card game"><h2>⬛ 正方形面积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'边长9cm正方形面积？',o:['18cm²','36cm²','81cm²','162cm²'],a:'81cm²'},{t:'面积49m²正方形边长？',o:['6m','7m','8m','24.5m'],a:'7m'},{t:'边长12dm面积？',o:['24dm²','48dm²','144dm²','288dm²'],a:'144dm²'},{t:'边长扩大3倍面积扩大？',o:['3倍','6倍','9倍','12倍'],a:'9倍'},{t:'面积100cm²正方形边长？',o:['5cm','10cm','25cm','50cm'],a:'10cm'},{t:'周长24的正方形面积？',o:['24','30','36','48'],a:'36'},{t:'边长5m正方形面积？',o:['10m²','20m²','25m²','50m²'],a:'25m²'},{t:'边长1m的正方形面积=1？',o:['平方米','平方分米','平方厘米','米'],a:'平方米'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
