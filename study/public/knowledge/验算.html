<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>验算</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#2e7d32;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .equation{font-size:32px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .check-btn{width:150px;height:80px;border-radius:15px;border:none;font-size:28px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;margin:10px;box-shadow:0 4px 8px rgba(0,0,0,0.3)}
    .check-btn.true{background:linear-gradient(135deg,#4caf50,#2e7d32)}
    .check-btn.false{background:linear-gradient(135deg,#f44336,#c62828)}
    .check-btn:active{transform:scale(0.95)}
    .check-btn.correct-ans{background:var(--correct)}
    .check-btn.wrong-ans{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#4caf50);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(46,125,50,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .result-box{margin-top:20px;font-size:24px;font-weight:bold;padding:15px 30px;border-radius:12px}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.equation{font-size:24px}.check-btn{width:120px;height:60px;font-size:22px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 验算</h1>
      <p>验算是检查计算结果是否正确的方法。</p>
      <p style="margin-top:8px">💡 加法用减法验算，减法用加法验算，乘法用除法验算。</p>
      <p style="margin-top:8px">🔢 例如：28 + 35 = 63，验算：63 - 35 = 28</p>
      <div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        判断算式是否正确！
      </div>
    </div>

    <div class="card game">
      <h2>✅ 验算验证</h2>
      <div class="hint">判断下面的算式是否正确</div>
      
      <div class="equation" id="equation">28 + 35 = 63</div>
      
      <div style="display:flex;gap:20px;margin:30px 0">
        <button class="check-btn true" id="trueBtn">✓ 正确</button>
        <button class="check-btn false" id="falseBtn">✗ 错误</button>
      </div>
      
      <div id="resultBox" class="result-box" style="display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const equationEl = document.getElementById('equation')
    const trueBtn = document.getElementById('trueBtn')
    const falseBtn = document.getElementById('falseBtn')
    const resultBox = document.getElementById('resultBox')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let isCorrect = false
    let correctAnswer = 0
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const types = ['addition', 'subtraction', 'multiplication', 'division']
      const type = types[Math.floor(Math.random() * types.length)]
      
      let num1, num2, op, correctResult, wrongResult, displayResult, questionStr
      
      isCorrect = Math.random() > 0.5
      
      if (type === 'addition') {
        num1 = Math.floor(Math.random() * 80) + 10
        num2 = Math.floor(Math.random() * 80) + 10
        op = '+'
        correctResult = num1 + num2
        
        if (isCorrect) {
          displayResult = correctResult
        } else {
          wrongResult = correctResult + (Math.floor(Math.random() * 10) + 1) * (Math.random() > 0.5 ? 1 : -1)
          displayResult = wrongResult
        }
        
        questionStr = num1 + ' + ' + num2 + ' = ' + displayResult
      } else if (type === 'subtraction') {
        num1 = Math.floor(Math.random() * 80) + 20
        num2 = Math.floor(Math.random() * (num1 - 10)) + 10
        op = '-'
        correctResult = num1 - num2
        
        if (isCorrect) {
          displayResult = correctResult
        } else {
          wrongResult = correctResult + (Math.floor(Math.random() * 10) + 1) * (Math.random() > 0.5 ? 1 : -1)
          displayResult = wrongResult
        }
        
        questionStr = num1 + ' - ' + num2 + ' = ' + displayResult
      } else if (type === 'multiplication') {
        num1 = Math.floor(Math.random() * 12) + 2
        num2 = Math.floor(Math.random() * 12) + 2
        op = '×'
        correctResult = num1 * num2
        
        if (isCorrect) {
          displayResult = correctResult
        } else {
          wrongResult = correctResult + (Math.floor(Math.random() * 20) + 5) * (Math.random() > 0.5 ? 1 : -1)
          displayResult = wrongResult
        }
        
        questionStr = num1 + ' × ' + num2 + ' = ' + displayResult
      } else {
        num2 = Math.floor(Math.random() * 12) + 2
        correctResult = Math.floor(Math.random() * 50) + 5
        num1 = num2 * correctResult
        op = '÷'
        
        if (isCorrect) {
          displayResult = correctResult
        } else {
          wrongResult = correctResult + (Math.floor(Math.random() * 10) + 1) * (Math.random() > 0.5 ? 1 : -1)
          displayResult = wrongResult
        }
        
        questionStr = num1 + ' ÷ ' + num2 + ' = ' + displayResult
      }
      
      equationEl.textContent = questionStr
      correctAnswer = correctResult
      messageEl.style.display = 'none'
      resultBox.style.display = 'none'
      trueBtn.classList.remove('correct-ans', 'wrong-ans')
      falseBtn.classList.remove('correct-ans', 'wrong-ans')
    }
    
    function checkAnswer(userAnswer) {
      if (userAnswer === isCorrect) {
        if (userAnswer) {
          trueBtn.classList.add('correct-ans')
        } else {
          falseBtn.classList.add('correct-ans')
        }
        
        messageEl.textContent = '✅ 判断正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        if (!isCorrect) {
          resultBox.textContent = '正确答案：' + correctAnswer
          resultBox.style.background = '#e8f5e9'
          resultBox.style.color = '#2e7d32'
          resultBox.style.display = 'block'
        }
      } else {
        if (userAnswer) {
          trueBtn.classList.add('wrong-ans')
        } else {
          falseBtn.classList.add('wrong-ans')
        }
        
        messageEl.textContent = '❌ 判断错误！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        resultBox.textContent = '正确答案：' + correctAnswer
        resultBox.style.background = '#ffebee'
        resultBox.style.color = '#c62828'
        resultBox.style.display = 'block'
      }
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    trueBtn.addEventListener('click', () => checkAnswer(true))
    falseBtn.addEventListener('click', () => checkAnswer(false))
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
