<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>方向与位置</title><style>:root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>📍 方向与位置</h1><p>描述物体的<strong>位置</strong>需要确定<strong>方向</strong>和<strong>距离</strong>两个要素。</p><p style="margin-top:8px">💡 描述位置的方法：<br>• 以某个点为<strong>参照</strong><br>• 确定<strong>方向</strong>（东/南/西/北等）<br>• 说明<strong>距离</strong></p><p style="margin-top:8px">🔢 例如：学校在家的<strong>正东方向500米</strong>处。</p><div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断方向与位置！</div></div><div class="card game"><h2>📍 方向与位置挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'描述位置需要哪两个要素？',o:['颜色和大小','方向和距离','时间和地点','名称和数量'],a:'方向和距离'},{t:'太阳升起的方向是？',o:['东','南','西','北'],a:'东'},{t:'太阳落下的方向是？',o:['东','南','西','北'],a:'西'},{t:'描述位置首先要确定什么？',o:['颜色','参照物','大小','数量'],a:'参照物'},{t:'面向太阳升起，左边是什么方向？',o:['东','南','西','北'],a:'北'},{t:'地图上通常上面是哪个方向？',o:['东','南','西','北'],a:'北'},{t:'面向北极星是什么方向？',o:['东','南','西','北'],a:'北'},{t:'指南针指向什么方向？',o:['东','南','西','北'],a:'南'},{t:'学校在书店东200m，书店在学校？',o:['东200m','西200m','南200m','北200m'],a:'西200m'},{t:'确定位置可以用什么工具？',o:['温度计','指南针','量角器','天平'],a:'指南针'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
