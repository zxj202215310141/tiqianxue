<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>容积的计算</title><style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🧴 容积的计算</h1><p><strong>容积</strong>是容器所能容纳物体的<strong>体积</strong>。计算方法与体积相同，从<strong>里面量</strong>。</p><p style="margin-top:8px">💡 单位：升(L)、毫升(mL)。1L=1dm³，1mL=1cm³，1L=1000mL。</p><p style="margin-top:8px">🔢 长方体容器内长30内宽20内高15cm，容积=30×20×15=9000cm³=9L。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算容积！</div></div><div class="card game"><h2>🧴 容积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'1升等于多少毫升？',o:['10','100','1000','10000'],a:'1000'},{t:'1L等于多少dm³？',o:['0.1','1','10','100'],a:'1'},{t:'1mL等于多少cm³？',o:['0.1','1','10','100'],a:'1'},{t:'容积和体积的区别？',o:['完全一样','容积从里面量','容积更大','没有区别'],a:'容积从里面量'},{t:'30×20×15cm³容积多少升？',o:['6L','9L','12L','15L'],a:'9L'},{t:'容积常用单位？',o:['厘米和米','升和毫升','千克和克','小时和分钟'],a:'升和毫升'},{t:'一个水杯容积约300？',o:['升','毫升','立方米','立方厘米'],a:'毫升'},{t:'容积计算方法和什么相同？',o:['面积','周长','体积','表面积'],a:'体积'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
