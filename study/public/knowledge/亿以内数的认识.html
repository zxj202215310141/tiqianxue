<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>亿以内数的认识</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#ff9800;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .wheel-container{position:relative;width:200px;height:200px;margin:20px auto}
    .wheel{width:100%;height:100%;border-radius:50%;background:conic-gradient(#ff9800,#ffcc80,#ff9800,#ffcc80,#ff9800,#ffcc80,#ff9800,#ffcc80);transition:transform 2s ease-out}
    .wheel.spinning{animation:spin 2s linear}
    .wheel-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 8px rgba(0,0,0,0.2)}
    .wheel-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-weight:bold;color:white;text-shadow:1px 1px 2px rgba(0,0,0,0.5)}
    .question{font-size:20px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,#fff,#ffecb3);color:var(--accent2);padding:10px 20px;border-radius:12px;border:none;font-size:16px;font-weight:bold;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,0,0,0.2)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .options{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:16px 0}
    .opt-btn{background:var(--accent);color:white;padding:10px 20px;border-radius:10px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s}
    .opt-btn:active{transform:scale(0.95)}
    @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.wheel-container{width:160px;height:160px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 亿以内数的认识</h1>
      <p>亿以内的数包括：万级（万、十万、百万、千万）和个级（个、十、百、千）。</p>
      <p style="margin-top:8px">💡 例如：56789012是由5个千万、6个百万、7个十万、8个万、9个千、0个百、1个十和2个一组成的。</p>
      <p style="margin-top:8px">🔢 10个一千万是1亿。</p>
      <div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        数字转盘！点击转盘，回答关于大数的问题。
      </div>
    </div>

    <div class="card game">
      <h2>🎡 数字转盘</h2>
      <div class="hint">点击转盘，回答关于大数的问题</div>
      
      <div class="wheel-container">
        <div class="wheel" id="wheel"></div>
        <div class="wheel-center" id="spinBtn">🔄</div>
        <div class="wheel-label">转一转</div>
      </div>
      
      <div class="question" id="question">点击转盘开始！</div>
      
      <div class="options" id="options"></div>
      
      <div class="row">
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const wheel = document.getElementById('wheel')
    const spinBtn = document.getElementById('spinBtn')
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let isSpinning = false
    
    const questions = [
      { q: '10个一万是多少？', options: ['十万', '一百万', '一千万'], answer: '十万' },
      { q: '10个十万是多少？', options: ['一百万', '一千万', '一亿'], answer: '一百万' },
      { q: '10个一百万是多少？', options: ['一千万', '一亿', '十亿'], answer: '一千万' },
      { q: '10个一千万是多少？', options: ['一亿', '十亿', '一百亿'], answer: '一亿' },
      { q: '56000000中有几个千万？', options: ['5', '6', '56'], answer: '5' },
      { q: '8900000中有几个百万？', options: ['8', '9', '89'], answer: '8' },
      { q: '3450000中有几个十万？', options: ['3', '4', '5'], answer: '4' },
      { q: '12345678中，百万位是几？', options: ['1', '2', '3'], answer: '2' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const idx = Math.floor(Math.random() * questions.length)
      const q = questions[idx]
      
      questionEl.textContent = q.q
      messageEl.style.display = 'none'
      optionsEl.innerHTML = ''
      
      const options = [...q.options]
      shuffle(options)
      
      options.forEach(opt => {
        const el = document.createElement('button')
        el.className = 'opt-btn'
        el.textContent = opt
        el.addEventListener('click', () => {
          if (opt === q.answer) {
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            messageEl.textContent = '❌ 不对哦，再试试！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(el)
      })
    }
    
    function spinWheel() {
      if (isSpinning) return
      
      isSpinning = true
      wheel.classList.add('spinning')
      optionsEl.innerHTML = ''
      messageEl.style.display = 'none'
      
      setTimeout(() => {
        wheel.classList.remove('spinning')
        isSpinning = false
        generateQuestion()
      }, 2000)
    }
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function init() {
      score = 0
      setScore(0)
      isSpinning = false
      wheel.classList.remove('spinning')
      questionEl.textContent = '点击转盘开始！'
      optionsEl.innerHTML = ''
      messageEl.style.display = 'none'
    }
    
    spinBtn.addEventListener('click', spinWheel)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
