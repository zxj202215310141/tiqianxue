<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>一步应用题</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}
    .opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}.hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>1⃣ 一步应用题</h1>
      <p>只需要<strong>一步运算</strong>就能解决的应用题。关键是分析数量关系，确定用什么运算。</p>
      <p style="margin-top:8px">💡 常见类型：<br>• 求和（加法）：一共有多少？<br>• 求差（减法）：还剩多少？多多少？<br>• 求积（乘法）：几个几是多少？<br>• 求商（除法）：平均分，包含除</p>
      <p style="margin-top:8px">🔢 例如：小明有8支笔，又买了5支，一共有几支？8+5=13支。</p>
      <div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决一步应用题！</div>
    </div>
    <div class="card game">
      <h2>1⃣ 一步应用题挑战</h2>
      <div class="hint">选择正确答案</div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      <div class="row"><button id="next" class="btn">➡️ 下一题</button><button id="reset" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="scoreVal">0</span></div></div>
    </div>
  </div>
  <script>
    const questionEl=document.getElementById('question'),optionsEl=document.getElementById('options');
    const nextBtn=document.getElementById('next'),resetBtn=document.getElementById('reset');
    const scoreEl=document.getElementById('scoreVal'),messageEl=document.getElementById('message');
    let score=0,currentAnswer='';
    const qs=[{text:'树上有12只鸟，飞走了5只，还剩几只？',options:['5','7','12','17'],answer:'7'},{text:'一盒铅笔6支，4盒共几支？',options:['10','18','24','30'],answer:'24'},{text:'妈妈买了8个苹果，吃了3个，还剩几个？',options:['3','5','8','11'],answer:'5'},{text:'每排有7棵树，5排共有几棵？',options:['12','25','30','35'],answer:'35'},{text:'20个同学平均分4组，每组几人？',options:['4','5','6','24'],answer:'5'},{text:'小红有15元，买书用9元，剩几元？',options:['5','6','7','24'],answer:'6'},{text:'面包每个3元，买6个要多少元？',options:['9','12','15','18'],answer:'18'},{text:'42个苹果平均分给6人，每人几个？',options:['5','6','7','8'],answer:'7'},{text:'公交车上原有25人，到站下了8人，车上还有？',options:['17','25','33','8'],answer:'17'},{text:'一个文具盒9元，买3个付了几元？',options:['12','18','24','27'],answer:'27'}];
    function setScore(v){score=v;scoreEl.textContent=score}
    function g(){const idx=Math.floor(Math.random()*qs.length),q=qs[idx];currentAnswer=q.answer;questionEl.textContent=q.text;messageEl.style.display='none';optionsEl.innerHTML='';q.options.forEach(o=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=o;b.addEventListener('click',()=>{if(o===currentAnswer){b.classList.add('correct');messageEl.textContent='✅ 正确！';messageEl.style.color='var(--correct)';messageEl.style.display='block';setScore(score+10)}else{b.classList.add('wrong');messageEl.textContent='❌ 答案是 '+currentAnswer;messageEl.style.color='var(--wrong)';messageEl.style.display='block'}});optionsEl.appendChild(b);});}
    function init(){score=0;setScore(0);g()}nextBtn.addEventListener('click',g);resetBtn.addEventListener('click',init);init();
  </script>
</body>
</html>
