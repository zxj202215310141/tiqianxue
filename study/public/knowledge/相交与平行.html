<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>相交与平行</title>
<style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:140px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>╳ 相交与平行</h1><p>同一平面内两条直线的位置关系有<strong>相交</strong>和<strong>平行</strong>两种。</p><p style="margin-top:8px">💡 定义：<br>• <strong>相交</strong>：两条直线<strong>有一个公共点</strong>（交点）<br>• <strong>平行</strong>：同一平面内，<strong>不相交</strong>的两条直线<br>• 平行用符号"<strong>∥</strong>"表示</p><p style="margin-top:8px">🔢 特别地，相交成直角时叫<strong>垂直</strong>。</p><p style="margin-top:8px">📝 生活中：铁轨、双杠等可以看作平行线；十字路口可看作相交线。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断相交与平行的关系！</div></div>
<div class="card game"><h2>╳ 相交与平行挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'同一平面内两条直线有几种位置关系？',o:['1种','2种','3种','无数种'],a:'2种'},{t:'不相交的两条直线叫什么？',o:['垂线','平行线','相交线','斜线'],a:'平行线'},{t:'平行的符号是什么？',o:['⊥','∥','∠','△'],a:'∥'},{t:'两条直线有一个交点叫什么？',o:['平行','相交','垂直','重合'],a:'相交'},{t:'平行线之间的距离有什么特点？',o:['不相等','处处相等','越来越远','越来越近'],a:'处处相等'},{t:'下面哪个生活中有平行线？',o:['剪刀','十字路口','铁轨','墙角'],a:'铁轨'},{t:'两条相交直线形成几个角？',o:['2个','3个','4个','8个'],a:'4个'},{t:'平行线会相交吗？',o:['会','不会','有时会','不确定'],a:'不会'},{t:'上面下面两条边是什么关系？',o:['平行','相交','垂直','无法确定'],a:'平行'},{t:'同一平面内两条直线不会怎样？',o:['既不相交也不平行','平行','相交','垂直'],a:'既不相交也不平行'},{t:'长方形对边是什么关系？',o:['相交','垂直','平行','重合'],a:'平行'},{t:'两条直线相交，对顶角有什么特点？',o:['不相等','相等','互补','无关'],a:'相等'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
