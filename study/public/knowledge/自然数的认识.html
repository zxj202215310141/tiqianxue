<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>自然数的认识</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#81c784;--accent2:#43a047;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .counting-board{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;justify-content:center;width:100%}
    .count-box{width:50px;height:50px;border:3px dashed var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:var(--accent2)}
    .count-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    .count-box.current{border-color:var(--accent2);background:var(--accent);animation:pulse 1s infinite}
    .number-ball{width:50px;height:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:white;cursor:grab;transition:transform 0.2s}
    .number-ball:active{cursor:grabbing;transform:scale(1.1)}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,var(--accent2),#81c784);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(67,160,71,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.count-box,.number-ball{width:45px;height:45px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 自然数的认识</h1>
      <p>表示物体个数的1、2、3、4、5...都是自然数。</p>
      <p style="margin-top:8px">💡 0也是自然数，它表示一个物体也没有。</p>
      <p style="margin-top:8px">🔢 自然数的个数是无限的，没有最大的自然数。</p>
      <div style="margin-top:16px;padding:12px;background:#81c784;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        数数游戏！按顺序拖动数字球填入空格。
      </div>
    </div>

    <div class="card game">
      <h2>🔢 数数游戏</h2>
      <div class="hint">按顺序拖动数字填入空格</div>
      
      <div class="question" id="question">请按顺序数数：</div>
      
      <div class="counting-board" id="board"></div>
      
      <div class="counting-board" id="balls"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const board = document.getElementById('board')
    const balls = document.getElementById('balls')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let startNum = 0
    let filledCount = 0
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function initBoard(start, count) {
      board.innerHTML = ''
      filledCount = 0
      
      for (let i = 0; i < count; i++) {
        const box = document.createElement('div')
        box.className = 'count-box'
        box.dataset.index = i
        box.dataset.expected = start + i
        
        if (Math.random() > 0.5) {
          box.textContent = start + i
          box.classList.add('filled')
          filledCount++
        } else {
          box.classList.add('current')
        }
        
        box.addEventListener('dragover', e => e.preventDefault())
        box.addEventListener('drop', handleDrop)
        
        board.appendChild(box)
      }
    }
    
    function initBalls(start, count) {
      balls.innerHTML = ''
      const nums = []
      
      for (let i = 0; i < count; i++) {
        nums.push(start + i)
      }
      
      shuffle(nums)
      
      nums.forEach(num => {
        const piece = document.createElement('div')
        piece.className = 'number-ball'
        piece.textContent = num
        piece.draggable = true
        piece.dataset.value = num
        
        piece.addEventListener('dragstart', e => {
          e.dataTransfer.setData('num', num.toString())
          piece.style.opacity = '0.5'
        })
        
        piece.addEventListener('dragend', () => {
          piece.style.opacity = '1'
        })
        
        balls.appendChild(piece)
      })
    }
    
    function handleDrop(e) {
      const num = parseInt(e.dataTransfer.getData('num'))
      const expected = parseInt(e.target.dataset.expected)
      
      if (e.target.textContent !== '') return
      
      if (num === expected) {
        e.target.textContent = num
        e.target.classList.remove('current')
        e.target.classList.add('filled')
        filledCount++
        
        checkComplete()
      } else {
        e.target.classList.remove('current')
        e.target.style.borderColor = 'var(--wrong)'
        e.target.style.background = 'var(--wrong)'
        
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          initGame(startNum)
          messageEl.style.display = 'none'
        }, 1000)
      }
    }
    
    function checkComplete() {
      const boxes = document.querySelectorAll('.count-box')
      const allFilled = Array.from(boxes).every(box => box.classList.contains('filled'))
      
      if (allFilled) {
        messageEl.textContent = '✅ 正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        setTimeout(() => {
          nextQuestion()
        }, 1000)
      }
    }
    
    function initGame(start) {
      startNum = start
      const count = 8
      
      questionEl.textContent = '请按顺序数数：' + start + ' ~ ' + (start + count - 1)
      messageEl.style.display = 'none'
      
      initBoard(start, count)
      initBalls(start, count)
    }
    
    function generateQuestion() {
      const start = Math.floor(Math.random() * 90) + 1
      initGame(start)
    }
    
    function nextQuestion() {
      generateQuestion()
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', nextQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
