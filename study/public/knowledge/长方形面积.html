<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>长方形面积</title><style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>▯ 长方形面积</h1><p>长方形<strong>面积</strong> = <strong>长 × 宽</strong>。面积表示长方形内部的大小。</p><p style="margin-top:8px">💡 推导：用1平方厘米的小正方形铺满长方形，每行a个共b行，面积=a×b。</p><p style="margin-top:8px">🔢 例如：长10cm宽6cm，面积=10×6=60cm²。<br>已知面积45cm²宽5cm，长=45÷5=9cm。</p><p style="margin-top:8px">📝 注意：长和宽的单位要一致，面积用平方单位。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算长方形面积！</div></div><div class="card game"><h2>▯ 长方形面积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'长9宽4长方形面积？',o:['13','26','36','72'],a:'36'},{t:'面积48宽6长？',o:['6','7','8','9'],a:'8'},{t:'长12宽5面积？',o:['17','34','60','120'],a:'60'},{t:'周长20长6长方形面积？',o:['24','20','30','36'],a:'24'},{t:'长15m宽4m面积？',o:['19m²','38m²','60m²','120m²'],a:'60m²'},{t:'面积100长20宽？',o:['4','5','6','20'],a:'5'},{t:'长方形长宽都扩大2倍面积？',o:['扩大2倍','扩大4倍','扩大8倍','不变'],a:'扩大4倍'},{t:'长25cm宽4cm面积？',o:['29cm²','58cm²','100cm²','200cm²'],a:'100cm²'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
