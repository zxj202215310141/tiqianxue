<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>三角形面积</title><style>:root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>△ 三角形面积</h1><p>三角形<strong>面积</strong> = <strong>底 × 高 ÷ 2</strong>。</p><p style="margin-top:8px">💡 推导：两个完全一样的三角形可以拼成一个平行四边形。平行四边形面积=底×高，三角形面积=一半。</p><p style="margin-top:8px">🔢 例如：底10cm高8cm，面积=10×8÷2=40cm²。</p><p style="margin-top:8px">📝 三角形的任何一边都可以作为底，高是顶点到底边的垂直距离。</p><div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算三角形面积！</div></div><div class="card game"><h2>△ 三角形面积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'底10高8三角形面积？',o:['18','40','80','160'],a:'40'},{t:'面积24底8高？',o:['3','4','6','12'],a:'6'},{t:'三角形面积公式？',o:['底×高','底×高÷2','(底+高)÷2','底×高×2'],a:'底×高÷2'},{t:'底12高5面积？',o:['17','30','60','120'],a:'30'},{t:'面积30高10底？',o:['3','5','6','15'],a:'6'},{t:'两个相同三角形拼成？',o:['长方形','正方形','平行四边形','梯形'],a:'平行四边形'},{t:'底9cm高6cm面积？',o:['15cm²','27cm²','54cm²','108cm²'],a:'27cm²'},{t:'等底等高的三角形和平行四边形面积关系？',o:['相等','三角形是一半','平行是一半','没有关系'],a:'三角形是一半'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
