<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>上下左右</title><style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🧭 上下左右</h1><p><strong>上、下、左、右</strong>是最基本的方位词，用来描述物体的<strong>相对位置</strong>。</p><p style="margin-top:8px">💡 判断方位需要先确定<strong>参照物</strong>（以谁为标准）。</p><p style="margin-top:8px">🔢 例如：小明在小红的<strong>左边</strong>，是以小红为参照物。</p><p style="margin-top:8px">📝 通常以观察者的左右为准。左手边是左，右手边是右。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断上下左右方位！</div></div><div class="card game"><h2>🧭 上下左右挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'天花板在人的什么方位？',o:['上面','下面','左边','右边'],a:'上面'},{t:'拿笔的手通常是哪只手？',o:['左手','右手','两手都可以','不确定'],a:'右手'},{t:'排队时小明在小红前面，小红在小明？',o:['前面','后面','左边','右边'],a:'后面'},{t:'书放在桌子上，桌子在书的？',o:['上面','下面','左边','右边'],a:'下面'},{t:'小红站在小明左边，小明在小红的？',o:['左边','右边','前面','后面'],a:'右边'},{t:'地图的方向通常是？',o:['上南下北','上北下南','上东下西','上没有规定'],a:'上北下南'},{t:'四楼在三楼的什么方位？',o:['上面','下面','左边','右边'],a:'上面'},{t:'地板的什么方位是天花板？',o:['上面','下面','左边','右边'],a:'上面'},{t:'面向黑板，黑板在你的？',o:['前面','后面','左边','右边'],a:'前面'},{t:'左右是相对什么而言的？',o:['绝对方向','观察者自身','太阳','地球'],a:'观察者自身'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
