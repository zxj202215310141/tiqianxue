<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>有余数的除法</title>
  <style>
    :root{--bg:#e0f7fa;--card:#ffffff;--accent:#4dd0e1;--accent2:#00acc1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .equation{font-size:32px;font-weight:bold;color:var(--accent2);margin:20px 0;display:flex;gap:10px;align-items:center}
    .answer-box{width:60px;height:50px;border:3px dashed var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent2)}
    .answer-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    .number-tiles{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0;justify-content:center}
    .tile{width:55px;height:55px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:bold;color:white;cursor:grab;transition:transform 0.2s}
    .tile:active{cursor:grabbing;transform:scale(1.1)}
    .btn{background:linear-gradient(135deg,var(--accent2),#4dd0e1);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,172,193,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.equation{font-size:24px}.answer-box{width:50px;height:45px;font-size:16px}.tile{width:50px;height:50px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 有余数的除法</h1>
      <p>当平均分后还有剩余，就产生了余数。</p>
      <p style="margin-top:8px">💡 余数必须小于除数。</p>
      <p style="margin-top:8px">🔢 例如：10 ÷ 3 = 3……1，表示10平均分成3份，每份3个，还剩1个。</p>
      <div style="margin-top:16px;padding:12px;background:#4dd0e1;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        拖动数字完成有余数的除法算式！
      </div>
    </div>

    <div class="card game">
      <h2>🧮 余数填空</h2>
      <div class="hint">拖动数字填入算式</div>
      
      <div class="equation">
        <span id="dividend">10</span>
        <span>÷</span>
        <span id="divisor">3</span>
        <span>=</span>
        <div class="answer-box" id="quotient"></div>
        <span>……</span>
        <div class="answer-box" id="remainder"></div>
      </div>
      
      <div class="number-tiles" id="tiles"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const dividendEl = document.getElementById('dividend')
    const divisorEl = document.getElementById('divisor')
    const quotientBox = document.getElementById('quotient')
    const remainderBox = document.getElementById('remainder')
    const tilesEl = document.getElementById('tiles')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentQuotient = 0
    let currentRemainder = 0
    let filledCount = 0
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const divisor = Math.floor(Math.random() * 8) + 2
      const quotient = Math.floor(Math.random() * 9) + 1
      const remainder = Math.floor(Math.random() * divisor)
      const dividend = divisor * quotient + remainder
      
      currentQuotient = quotient
      currentRemainder = remainder
      filledCount = 0
      
      dividendEl.textContent = dividend
      divisorEl.textContent = divisor
      quotientBox.textContent = ''
      quotientBox.classList.remove('filled')
      remainderBox.textContent = ''
      remainderBox.classList.remove('filled')
      messageEl.style.display = 'none'
      
      initTiles([quotient, remainder])
    }
    
    function initTiles(correct) {
      tilesEl.innerHTML = ''
      const options = [...correct]
      
      while (options.length < 4) {
        const rand = Math.floor(Math.random() * 10) + 1
        if (!options.includes(rand)) options.push(rand)
      }
      
      shuffle(options)
      
      options.forEach(num => {
        const tile = document.createElement('div')
        tile.className = 'tile'
        tile.textContent = num
        tile.draggable = true
        
        tile.addEventListener('dragstart', e => {
          e.dataTransfer.setData('num', num.toString())
          tile.style.opacity = '0.5'
        })
        
        tile.addEventListener('dragend', () => {
          tile.style.opacity = '1'
        })
        
        tilesEl.appendChild(tile)
      })
    }
    
    function handleDrop(e, box, expected) {
      const num = parseInt(e.dataTransfer.getData('num'))
      
      if (box.textContent !== '') return
      
      if (num === expected) {
        box.textContent = num
        box.classList.add('filled')
        filledCount++
        
        if (filledCount === 2) {
          messageEl.textContent = '✅ 正确！太棒了！'
          messageEl.style.color = 'var(--correct)'
          messageEl.style.display = 'block'
          setScore(score + 10)
          
          setTimeout(() => {
            generateQuestion()
          }, 1000)
        }
      } else {
        box.textContent = num
        box.style.borderColor = 'var(--wrong)'
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          generateQuestion()
        }, 1000)
      }
    }
    
    quotientBox.addEventListener('dragover', e => e.preventDefault())
    quotientBox.addEventListener('drop', e => handleDrop(e, quotientBox, currentQuotient))
    
    remainderBox.addEventListener('dragover', e => e.preventDefault())
    remainderBox.addEventListener('drop', e => handleDrop(e, remainderBox, currentRemainder))
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
