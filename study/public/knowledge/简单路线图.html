<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>简单路线图</title><style>:root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🗺️ 简单路线图</h1><p><strong>路线图</strong>是描述从一个地点到另一个地点经过<strong>方向和距离</strong>的图示。</p><p style="margin-top:8px">💡 描述路线四要素：<strong>起点→方向→距离→终点</strong>。<br>例如：从家出发，向东走200米到学校。</p><p style="margin-top:8px">📝 在生活中：看公交线路图、导航、送快递都需要读懂路线图。</p><div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断路线和方向！</div></div><div class="card game"><h2>🗺️ 路线图挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'描述路线需要哪些要素？',o:['颜色和大小','起点方向距离终点','时间和日期','姓名和年龄'],a:'起点方向距离终点'},{t:'从学校向东走再向北走，在学校的？',o:['东北方向','东南方向','西北方向','西南方向'],a:'东北方向'},{t:'小红家到学校：北100m东50m，学校在家的？',o:['正北','东北','正东','西北'],a:'东北'},{t:'路线图中箭头表示什么？',o:['距离','方向','时间','速度'],a:'方向'},{t:'先向西200m再向南100m，终点的？',o:['东北','东南','西南','西北'],a:'西南'},{t:'公交站牌上的路线图有什么作用？',o:['装饰','知道经过哪些站','看风景','没有用'],a:'知道经过哪些站'},{t:'从学校向北走回到家，学校在家的？',o:['北面','南面','东面','西面'],a:'南面'},{t:'绘制路线图最重要的是？',o:['颜色','方向和距离','字体','纸张大小'],a:'方向和距离'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
