<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>比例尺补充</title>
  <style>
    :root{--bg:#f7fff9;--card:#ffffff;--accent:#81c784;--accent2:#2e7d32;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(46,125,50,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(46,125,50,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:130px;height:55px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🗺️ 比例尺补充</h1>
      <p>地图比例尺表示图上距离与实际距离的比例关系。</p>
      <p style="margin-top:8px">💡 数值比例尺：如1:100000，表示图上1厘米代表实际100000厘米。</p>
      <p style="margin-top:8px">💡 线段比例尺：用线段表示，如一段1厘米的线段代表实际500米。</p>
      <p style="margin-top:8px">🔢 换算公式：图上距离 = 实际距离 × 比例尺，实际距离 = 图上距离 ÷ 比例尺。</p>
      <div style="margin-top:16px;padding:12px;background:#81c784;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        根据题目计算比例尺相关问题，选择正确答案！
      </div>
    </div>

    <div class="card game">
      <h2>🗺️ 比例尺挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">线段比例尺0___500米，表示图上1厘米代表实际距离多少米？</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '线段比例尺0___500米，表示图上1厘米代表实际距离多少米？', options: ['50米', '500米', '5000米', '50000米'], answer: '500米' },
      { text: '线段比例尺0___200米，表示图上2厘米代表实际距离多少米？', options: ['200米', '400米', '600米', '800米'], answer: '400米' },
      { text: '线段比例尺0___1千米，表示图上3厘米代表实际距离多少千米？', options: ['1千米', '2千米', '3千米', '4千米'], answer: '3千米' },
      { text: '实际距离200米，线段比例尺0___50米，图上距离是多少厘米？', options: ['2厘米', '4厘米', '5厘米', '8厘米'], answer: '4厘米' },
      { text: '实际距离300千米，比例尺1:5000000，图上距离是多少厘米？', options: ['4厘米', '6厘米', '8厘米', '10厘米'], answer: '6厘米' },
      { text: '图上距离8厘米，实际距离400千米，比例尺是多少？', options: ['1:50000', '1:500000', '1:5000000', '1:50000000'], answer: '1:5000000' },
      { text: '线段比例尺0___100米，表示图上5厘米代表实际距离多少米？', options: ['100米', '300米', '500米', '1000米'], answer: '500米' },
      { text: '比例尺1:500000，表示实际距离是图上距离的多少倍？', options: ['500倍', '5000倍', '50000倍', '500000倍'], answer: '500000倍' },
      { text: '图上距离6厘米，比例尺1:200000，实际距离是多少千米？', options: ['12千米', '120千米', '1200千米', '12000千米'], answer: '12千米' },
      { text: '实际距离80米，图上距离4厘米，比例尺是多少？', options: ['1:20', '1:200', '1:2000', '1:20000'], answer: '1:2000' },
      { text: '线段比例尺0___300米，表示图上1厘米代表实际距离多少厘米？', options: ['300厘米', '3000厘米', '30000厘米', '300000厘米'], answer: '30000厘米' },
      { text: '比例尺1:25000000是哪种比例尺？', options: ['放大比例尺', '缩小比例尺', '等值比例尺', '线段比例尺'], answer: '缩小比例尺' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
