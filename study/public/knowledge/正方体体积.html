<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>正方体体积</title><style>:root{--bg:#e0f7fa;--card:#ffffff;--accent:#80deea;--accent2:#006064;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,96,100,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#00838f);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🎲 正方体体积</h1><p>正方体<strong>体积</strong> = <strong>棱长 × 棱长 × 棱长</strong> = a³。</p><p style="margin-top:8px">💡 正方体是长=宽=高的长方体，体积=长×宽×高=a³。</p><p style="margin-top:8px">🔢 棱长5cm，体积=5³=125cm³。</p><div style="margin-top:16px;padding:12px;background:#80deea;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算正方体体积！</div></div><div class="card game"><h2>🎲 正方体体积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'棱长5cm体积？',o:['25cm³','75cm³','125cm³','250cm³'],a:'125cm³'},{t:'体积27cm³棱长？',o:['2cm','3cm','6cm','9cm'],a:'3cm'},{t:'体积公式？',o:['6a²','a³','a²','12a'],a:'a³'},{t:'棱长4dm体积？',o:['16dm³','48dm³','64dm³','128dm³'],a:'64dm³'},{t:'棱长扩大2倍体积？',o:['2倍','4倍','6倍','8倍'],a:'8倍'},{t:'体积125dm³棱长？',o:['4dm','5dm','10dm','25dm'],a:'5dm'},{t:'正方体体积=棱长³，'a³'读作？',o:['a的立方','a的三次方','a立方','都可以'],a:'都可以'},{t:'棱长10cm体积？',o:['100cm³','300cm³','600cm³','1000cm³'],a:'1000cm³'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
