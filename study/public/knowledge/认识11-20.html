<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>认识11-20</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#81c784;--accent2:#43a047;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .game-board{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;justify-content:center;width:100%}
    .digit-box{width:60px;height:60px;border:3px dashed var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:var(--accent2)}
    .digit-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    .digit-piece{width:60px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:white;cursor:grab;transition:transform 0.2s}
    .digit-piece:active{cursor:grabbing;transform:scale(1.1)}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,var(--accent2),#81c784);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(67,160,71,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .blocks{display:flex;gap:4px;margin-top:8px}
    .block-10{width:40px;height:40px;background:#43a047;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-size:12px}
    .block-1{width:20px;height:20px;background:#81c784;border-radius:4px}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.digit-box,.digit-piece{width:50px;height:50px;font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 认识11-20</h1>
      <p>11-20各数的组成：十几就是由1个十和几个一组成的。</p>
      <p style="margin-top:8px">💡 例如：11是由1个十和1个一组成的；15是由1个十和5个一组成的。</p>
      <p style="margin-top:8px">🔢 10个一是1个十，20是由2个十组成的。</p>
      <div style="margin-top:16px;padding:12px;background:#81c784;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        数字拼图！拖动数字组成正确的数字。左边是十位数，右边是个位数。
      </div>
    </div>

    <div class="card game">
      <h2>🧩 数字拼图</h2>
      <div class="hint">拖动数字组成正确的两位数</div>
      
      <div class="question" id="question">请组成数字：15</div>
      
      <div class="blocks" id="blocks"></div>
      
      <div class="game-board" id="board">
        <div class="digit-box" data-pos="0"></div>
        <div class="digit-box" data-pos="1"></div>
      </div>
      
      <div class="game-board" id="pieces"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const board = document.getElementById('board')
    const pieces = document.getElementById('pieces')
    const blocks = document.getElementById('blocks')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentNumber = 0
    let filledPositions = []
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function initBoard() {
      board.innerHTML = '<div class="digit-box" data-pos="0"></div><div class="digit-box" data-pos="1"></div>'
      filledPositions = []
      
      const boxes = document.querySelectorAll('.digit-box')
      boxes.forEach(box => {
        box.addEventListener('dragover', e => e.preventDefault())
        box.addEventListener('drop', handleDrop)
      })
    }
    
    function initPieces(num) {
      pieces.innerHTML = ''
      const tens = Math.floor(num / 10)
      const ones = num % 10
      
      const digits = [tens, ones]
      shuffle(digits)
      
      digits.forEach(digit => {
        const piece = document.createElement('div')
        piece.className = 'digit-piece'
        piece.textContent = digit
        piece.draggable = true
        piece.dataset.value = digit
        
        piece.addEventListener('dragstart', e => {
          e.dataTransfer.setData('digit', digit.toString())
          piece.style.opacity = '0.5'
        })
        
        piece.addEventListener('dragend', () => {
          piece.style.opacity = '1'
        })
        
        pieces.appendChild(piece)
      })
    }
    
    function initBlocks(num) {
      blocks.innerHTML = ''
      const tens = Math.floor(num / 10)
      const ones = num % 10
      
      for (let i = 0; i < tens; i++) {
        const block = document.createElement('div')
        block.className = 'block-10'
        block.textContent = '10'
        blocks.appendChild(block)
      }
      
      const onesContainer = document.createElement('div')
      onesContainer.style.display = 'flex'
      onesContainer.style.flexWrap = 'wrap'
      onesContainer.style.gap = '4px'
      
      for (let i = 0; i < ones; i++) {
        const block = document.createElement('div')
        block.className = 'block-1'
        onesContainer.appendChild(block)
      }
      blocks.appendChild(onesContainer)
    }
    
    function handleDrop(e) {
      const digit = parseInt(e.dataTransfer.getData('digit'))
      const pos = parseInt(e.target.dataset.pos)
      
      if (filledPositions.includes(pos)) return
      
      e.target.textContent = digit
      e.target.classList.add('filled')
      filledPositions.push(pos)
      
      const boxes = document.querySelectorAll('.digit-box')
      if (filledPositions.length === 2) {
        const num = parseInt(boxes[0].textContent + boxes[1].textContent)
        if (num === currentNumber) {
          messageEl.textContent = '✅ 正确！太棒了！'
          messageEl.style.color = 'var(--correct)'
          messageEl.style.display = 'block'
          setScore(score + 10)
          
          setTimeout(() => {
            nextQuestion()
          }, 1000)
        } else {
          messageEl.textContent = '❌ 不对哦，再试试！'
          messageEl.style.color = 'var(--wrong)'
          messageEl.style.display = 'block'
          
          setTimeout(() => {
            initBoard()
            initPieces(currentNumber)
            messageEl.style.display = 'none'
          }, 1000)
        }
      }
    }
    
    function generateQuestion() {
      currentNumber = Math.floor(Math.random() * 10) + 11
      
      questionEl.textContent = '请组成数字：' + currentNumber
      messageEl.style.display = 'none'
      
      initBlocks(currentNumber)
      initBoard()
      initPieces(currentNumber)
    }
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function nextQuestion() {
      generateQuestion()
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', nextQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
