<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>比例尺的应用</title><style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🗺️ 比例尺的应用</h1><p><strong>比例尺</strong> = 图上距离 : 实际距离，用于地图和工程图纸。</p><p style="margin-top:8px">💡 公式：图上距离 = 实际距离 × 比例尺；实际距离 = 图上距离 ÷ 比例尺。</p><p style="margin-top:8px">🔢 比例尺1:50000，图上2cm代表实际1km。图上5cm→实际2.5km。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>比例尺计算应用！</div></div><div class="card game"><h2>🗺️ 比例尺应用挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'比例尺1:50000图上2cm实际多少km？',o:['0.5km','1km','2km','5km'],a:'1km'},{t:'实际距离=图上距离÷？',o:['比例尺','面积','周长','半径'],a:'比例尺'},{t:'实际10km比例尺1:200000图上？',o:['2cm','5cm','10cm','50cm'],a:'5cm'},{t:'比例尺1:1000图上3cm实际？',o:['3m','30m','300m','3km'],a:'30m'},{t:'比例尺越大表示？',o:['范围越大','越详细','范围越小','越粗略'],a:'越详细'},{t:'中国地图用什么比例尺？',o:['大比例尺','小比例尺','1:1','等比例'],a:'小比例尺'},{t:'校园平面图用什么比例尺？',o:['小比例尺','大比例尺','不用比例尺','都一样'],a:'大比例尺'},{t:'比例尺1:10000000图上1cm实际多少？',o:['1km','10km','100km','1000km'],a:'100km'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
