<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆锥的认识</title>
<style>:root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🔺 圆锥的认识</h1><p><strong>圆锥</strong>是由一个<strong>圆形底面</strong>和一个<strong>曲面（侧面）</strong>围成的立体图形，有一个<strong>顶点</strong>。</p><p style="margin-top:8px">💡 特征：<br>• 底面是<strong>圆</strong>，侧面是<strong>曲面</strong><br>• 顶点到底面圆心的距离叫<strong>高</strong><br>• 侧面展开是<strong>扇形</strong></p><p style="margin-top:8px">🔢 体积 = πr²h÷3（等底等高圆柱体积的1/3）。</p><p style="margin-top:8px">📝 生活中：冰淇淋筒、漏斗、圣诞帽等。</p><div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断圆锥的特征！</div></div>
<div class="card game"><h2>🔺 圆锥挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'圆锥有几个底面？',o:['0个','1个','2个','3个'],a:'1个'},{t:'圆锥的底面是什么形状？',o:['正方形','圆形','三角形','长方形'],a:'圆形'},{t:'圆锥有几个顶点？',o:['0个','1个','2个','无数个'],a:'1个'},{t:'圆锥体积公式是？',o:['πr²h','πr²h/2','πr²h/3','2πr²h/3'],a:'πr²h/3'},{t:'圆锥侧面展开是什么形状？',o:['长方形','正方形','圆形','扇形'],a:'扇形'},{t:'圆锥体积是等底等高圆柱的？',o:['1/2','1/3','2/3','1/4'],a:'1/3'},{t:'圆锥的高是指？',o:['顶点到底面任意点','顶点到底面圆心','侧面长度','底面直径'],a:'顶点到底面圆心'},{t:'下面哪个物体近似圆锥？',o:['篮球','魔方','冰淇淋筒','易拉罐'],a:'冰淇淋筒'},{t:'底面半径3高6的圆锥体积约？',o:['56.52','169.56','28.26','113.04'],a:'56.52'},{t:'圆锥的侧面是什么？',o:['平面','曲面','由平面组成','有时平面有时曲面'],a:'曲面'},{t:'圆锥有几条高？',o:['0条','1条','2条','无数条'],a:'1条'},{t:'从顶点到底面圆周上任意一点的线段叫？',o:['高','半径','母线','直径'],a:'母线'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
