<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>两位数乘两位数</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#ff9800;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .equation{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .grid-box{width:60px;height:60px;border:3px dashed var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:var(--accent2)}
    .grid-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    .number-tiles{display:flex;flex-wrap:wrap;gap:10px;margin:20px 0;justify-content:center}
    .tile{width:50px;height:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:white;cursor:grab;transition:transform 0.2s}
    .tile:active{cursor:grabbing;transform:scale(1.1)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ffb74d);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(255,152,0,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .grid-board{display:grid;grid-template-columns:60px 60px 80px;gap:5px;margin:10px 0}
    .grid-label{display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:var(--accent2)}
    .result-box{width:80px;height:60px;border:3px dashed var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--accent2)}
    .result-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.equation{font-size:20px}.grid-box{width:50px;height:50px;font-size:18px}.tile{width:45px;height:45px;font-size:16px}.result-box{width:65px;height:50px;font-size:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 两位数乘两位数</h1>
      <p>两位数乘两位数可以用分配律分开计算：(a+b)×(c+d) = ac+ad+bc+bd。</p>
      <p style="margin-top:8px">💡 竖式计算：先乘个位再乘十位并移位相加。</p>
      <p style="margin-top:8px">🔢 例如：23 × 45 = 1035</p>
      <div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        使用网格乘法，拖动数字填入正确位置！
      </div>
    </div>

    <div class="card game">
      <h2>🧮 网格乘法挑战</h2>
      <div class="hint">拖动数字完成网格乘法</div>
      
      <div class="equation" id="equation">23 × 45 = ?</div>
      
      <div style="display:flex;gap:20px;align-items:flex-start">
        <div class="grid-board">
          <div></div>
          <div class="grid-label" id="top1">2</div>
          <div class="grid-label" id="top2">3</div>
          <div class="grid-label" id="left1">4</div>
          <div class="grid-box" id="box1"></div>
          <div class="grid-box" id="box2"></div>
          <div class="grid-label" id="left2">5</div>
          <div class="grid-box" id="box3"></div>
          <div class="grid-box" id="box4"></div>
        </div>
        
        <div style="display:flex;flex-direction:column;gap:5px">
          <div class="result-box" id="result1"></div>
          <div class="result-box" id="result2"></div>
          <div class="result-box" id="result3"></div>
          <div class="result-box" id="result4"></div>
        </div>
      </div>
      
      <div class="number-tiles" id="tiles"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const equationEl = document.getElementById('equation')
    const top1 = document.getElementById('top1')
    const top2 = document.getElementById('top2')
    const left1 = document.getElementById('left1')
    const left2 = document.getElementById('left2')
    const box1 = document.getElementById('box1')
    const box2 = document.getElementById('box2')
    const box3 = document.getElementById('box3')
    const box4 = document.getElementById('box4')
    const result1 = document.getElementById('result1')
    const result2 = document.getElementById('result2')
    const result3 = document.getElementById('result3')
    const result4 = document.getElementById('result4')
    const tilesEl = document.getElementById('tiles')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentBoxes = []
    let currentResults = []
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const num1 = Math.floor(Math.random() * 80) + 11
      const num2 = Math.floor(Math.random() * 80) + 11
      
      const digit1 = Math.floor(num1 / 10)
      const digit2 = num1 % 10
      const digit3 = Math.floor(num2 / 10)
      const digit4 = num2 % 10
      
      const box1Val = digit1 * digit3
      const box2Val = digit1 * digit4
      const box3Val = digit2 * digit3
      const box4Val = digit2 * digit4
      
      currentBoxes = [box1Val, box2Val, box3Val, box4Val]
      
      const result = num1 * num2
      currentResults = result.toString().split('').map(Number)
      while (currentResults.length < 4) currentResults.unshift(0)
      
      equationEl.textContent = num1 + ' × ' + num2 + ' = ?'
      top1.textContent = digit1
      top2.textContent = digit2
      left1.textContent = digit3
      left2.textContent = digit4
      
      [box1, box2, box3, box4].forEach(b => { b.textContent = ''; b.classList.remove('filled') })
      [result1, result2, result3, result4].forEach(b => { b.textContent = ''; b.classList.remove('filled') })
      messageEl.style.display = 'none'
      
      initTiles([...currentBoxes, ...currentResults])
    }
    
    function initTiles(correct) {
      tilesEl.innerHTML = ''
      const options = [...correct]
      
      while (options.length < 10) {
        const rand = Math.floor(Math.random() * 100)
        if (!options.includes(rand)) options.push(rand)
      }
      
      shuffle(options)
      
      options.forEach(num => {
        const tile = document.createElement('div')
        tile.className = 'tile'
        tile.textContent = num
        tile.draggable = true
        
        tile.addEventListener('dragstart', e => {
          e.dataTransfer.setData('num', num.toString())
          tile.style.opacity = '0.5'
        })
        
        tile.addEventListener('dragend', () => {
          tile.style.opacity = '1'
        })
        
        tilesEl.appendChild(tile)
      })
    }
    
    function checkComplete() {
      const boxesFilled = [box1, box2, box3, box4].every(b => b.classList.contains('filled'))
      const resultsFilled = [result1, result2, result3, result4].every(b => b.classList.contains('filled'))
      
      if (boxesFilled && resultsFilled) {
        messageEl.textContent = '✅ 正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        setTimeout(() => {
          generateQuestion()
        }, 1000)
      }
    }
    
    function handleDrop(e, box, expected) {
      const num = parseInt(e.dataTransfer.getData('num'))
      
      if (box.textContent !== '') return
      
      if (num === expected) {
        box.textContent = num
        box.classList.add('filled')
        checkComplete()
      } else {
        box.textContent = num
        box.style.borderColor = 'var(--wrong)'
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          generateQuestion()
        }, 1000)
      }
    }
    
    box1.addEventListener('dragover', e => e.preventDefault())
    box1.addEventListener('drop', e => handleDrop(e, box1, currentBoxes[0]))
    
    box2.addEventListener('dragover', e => e.preventDefault())
    box2.addEventListener('drop', e => handleDrop(e, box2, currentBoxes[1]))
    
    box3.addEventListener('dragover', e => e.preventDefault())
    box3.addEventListener('drop', e => handleDrop(e, box3, currentBoxes[2]))
    
    box4.addEventListener('dragover', e => e.preventDefault())
    box4.addEventListener('drop', e => handleDrop(e, box4, currentBoxes[3]))
    
    result1.addEventListener('dragover', e => e.preventDefault())
    result1.addEventListener('drop', e => handleDrop(e, result1, currentResults[0]))
    
    result2.addEventListener('dragover', e => e.preventDefault())
    result2.addEventListener('drop', e => handleDrop(e, result2, currentResults[1]))
    
    result3.addEventListener('dragover', e => e.preventDefault())
    result3.addEventListener('drop', e => handleDrop(e, result3, currentResults[2]))
    
    result4.addEventListener('dragover', e => e.preventDefault())
    result4.addEventListener('drop', e => handleDrop(e, result4, currentResults[3]))
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1))
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
