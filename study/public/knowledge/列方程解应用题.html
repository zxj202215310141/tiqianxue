<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>列方程解应用题</title>
  <style>
    :root{--bg:#e0f2f1;--card:#ffffff;--accent:#80cbc4;--accent2:#00897b;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,137,123,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#26a69a);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,137,123,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:20px}.opt-btn{width:130px;height:55px;font-size:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📚 列方程解应用题</h1>
      <p>列方程解应用题的步骤：设未知数、找等量关系、列方程、解方程。</p>
      <p style="margin-top:8px">💡 关键是找出题目中的等量关系。</p>
      <p style="margin-top:8px">🔢 例如：小明有5个苹果，比小红多2个，小红有几个？设小红有x个，则x+2=5。</p>
      <div style="margin-top:16px;padding:12px;background:#80cbc4;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        根据题目选择正确的方程！
      </div>
    </div>

    <div class="card game">
      <h2>📚 列方程解应用题挑战</h2>
      <div class="hint">选择正确的方程</div>
      
      <div class="question" id="question">小明有x本书，借给同学3本后还剩10本，列方程：</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '小明有x本书，借给同学3本后还剩10本，列方程：', options: ['x+3=10', 'x-3=10', '3x=10', 'x÷3=10'], answer: 'x-3=10' },
      { text: '一个数x的5倍是30，列方程：', options: ['x+5=30', 'x-5=30', '5x=30', 'x÷5=30'], answer: '5x=30' },
      { text: '小红有x支笔，妈妈又买了8支，现在有15支，列方程：', options: ['x+8=15', 'x-8=15', '8x=15', 'x÷8=15'], answer: 'x+8=15' },
      { text: '一个数x除以4等于6，列方程：', options: ['x+4=6', 'x-4=6', '4x=6', 'x÷4=6'], answer: 'x÷4=6' },
      { text: '哥哥有x元，比弟弟多5元，弟弟有20元，列方程：', options: ['x+5=20', 'x-5=20', '5x=20', 'x÷5=20'], answer: 'x-5=20' },
      { text: '3个足球共x元，每个足球50元，列方程：', options: ['x+3=50', 'x-3=50', 'x÷3=50', '3x=50'], answer: 'x÷3=50' },
      { text: '一本书有x页，每天看10页，5天看完，列方程：', options: ['x+10=5', 'x-10=5', 'x÷10=5', '10x=5'], answer: 'x÷10=5' },
      { text: '爸爸今年x岁，比小明大28岁，小明今年12岁，列方程：', options: ['x+28=12', 'x-28=12', '28x=12', 'x÷28=12'], answer: 'x-28=12' },
      { text: '买4个笔记本共花x元，每个8元，列方程：', options: ['x+4=8', 'x-4=8', 'x÷4=8', '4x=8'], answer: 'x÷4=8' },
      { text: '一个数x加上12等于25，列方程：', options: ['x+12=25', 'x-12=25', '12x=25', 'x÷12=25'], answer: 'x+12=25' },
      { text: '小明做了x道题，比小红多做5道，小红做了15道，列方程：', options: ['x+5=15', 'x-5=15', '5x=15', 'x÷5=15'], answer: 'x-5=15' },
      { text: '6个苹果共x斤，每个苹果0.5斤，列方程：', options: ['x+6=0.5', 'x-6=0.5', 'x÷6=0.5', '6x=0.5'], answer: 'x÷6=0.5' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
