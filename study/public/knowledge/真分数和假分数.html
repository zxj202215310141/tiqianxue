<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>真分数和假分数</title>
  <style>
    :root{--bg:#ede7f6;--card:#ffffff;--accent:#b39ddb;--accent2:#311b92;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{min-width:150px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(49,27,146,0.3)}
    .opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#4527a0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}
    .btn:active{transform:scale(0.95)}.row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}.hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:20px}.opt-btn{min-width:130px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📊 真分数和假分数</h1>
      <p><strong>真分数：</strong>分子比分母<strong>小</strong>的分数。真分数<strong>小于1</strong>。如：1/2, 3/4, 5/8。</p>
      <p style="margin-top:8px">💡 <strong>假分数：</strong>分子比分母<strong>大</strong>或分子等于分母的分数。假分数<strong>大于或等于1</strong>。如：5/3, 7/4, 4/4。</p>
      <p style="margin-top:8px">🔢 分子=分母时，分数值等于1（如 5/5 = 1）。分子>分母时，分数值大于1。</p>
      <p style="margin-top:8px">📝 假分数可以化成带分数或整数。</p>
      <div style="margin-top:16px;padding:12px;background:#b39ddb;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断是真分数还是假分数！</div>
    </div>
    <div class="card game">
      <h2>📊 真分数假分数挑战</h2>
      <div class="hint">选择正确的答案</div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>
  <script>
    const questionEl=document.getElementById('question'),optionsEl=document.getElementById('options');
    const nextBtn=document.getElementById('next'),resetBtn=document.getElementById('reset');
    const scoreEl=document.getElementById('scoreVal'),messageEl=document.getElementById('message');
    let score=0,currentAnswer='';
    const questions=[
      {text:'3/4 是什么分数？',options:['真分数','假分数','带分数','整数'],answer:'真分数'},
      {text:'7/3 是什么分数？',options:['真分数','假分数','带分数','整数'],answer:'假分数'},
      {text:'5/5 是什么分数？',options:['真分数','假分数','带分数','无法判断'],answer:'假分数'},
      {text:'下面哪个是真分数？',options:['5/3','2/5','8/4','7/4'],answer:'2/5'},
      {text:'下面哪个是假分数？',options:['1/2','2/3','3/4','9/6'],answer:'9/6'},
      {text:'分子比分母小的分数叫做？',options:['真分数','假分数','带分数','整数'],answer:'真分数'},
      {text:'真分数的值一定？',options:['大于1','小于1','等于1','大于等于1'],answer:'小于1'},
      {text:'假分数的值？',options:['一定小于1','一定大于1','大于或等于1','一定等于1'],answer:'大于或等于1'},
      {text:'分子等于分母时，分数值等于？',options:['0','1','分子','分母'],answer:'1'},
      {text:'下面哪个分数等于1？',options:['3/4','5/5','7/4','2/3'],answer:'5/5'},
      {text:'1/8 是什么分数？',options:['真分数','假分数','带分数','整数'],answer:'真分数'},
      {text:'11/7 是什么分数？',options:['真分数','假分数','带分数','整数'],answer:'假分数'}
    ];
    function setScore(v){score=v;scoreEl.textContent=score}
    function generateQuestion(){
      const idx=Math.floor(Math.random()*questions.length),q=questions[idx];currentAnswer=q.answer;
      questionEl.textContent=q.text;messageEl.style.display='none';optionsEl.innerHTML='';
      q.options.forEach(opt=>{
        const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt;
        btn.addEventListener('click',()=>{
          if(opt===currentAnswer){btn.classList.add('correct');messageEl.textContent='✅ 正确！太棒了！';messageEl.style.color='var(--correct)';messageEl.style.display='block';setScore(score+10)}
          else{btn.classList.add('wrong');messageEl.textContent='❌ 不对哦，正确答案是 '+currentAnswer;messageEl.style.color='var(--wrong)';messageEl.style.display='block'}
        });optionsEl.appendChild(btn);
      });
    }
    function init(){score=0;setScore(0);generateQuestion()}
    nextBtn.addEventListener('click',generateQuestion);resetBtn.addEventListener('click',init);init();
  </script>
</body>
</html>
