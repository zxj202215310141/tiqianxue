<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆柱体积</title><style>:root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🥫 圆柱体积</h1><p>圆柱<strong>体积</strong> = <strong>底面积 × 高</strong> = πr²h。</p><p style="margin-top:8px">💡 圆柱体积公式和长方体类似：都是底面积×高。</p><p style="margin-top:8px">🔢 半径3cm高10cm，体积=3.14×9×10=282.6cm³。</p><div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算圆柱体积！</div></div><div class="card game"><h2>🥫 圆柱体积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'半径3高10圆柱体积约？',o:['94.2','188.4','282.6','565.2'],a:'282.6'},{t:'体积公式？',o:['2πrh','πr²h','πr²h/3','πr²'],a:'πr²h'},{t:'半径2高5体积约？',o:['31.4','62.8','125.6','251.2'],a:'62.8'},{t:'圆柱体积=什么×高？',o:['侧面积','底面积','表面积','周长'],a:'底面积'},{t:'直径4高10体积约？',o:['62.8','125.6','251.2','502.4'],a:'125.6'},{t:'等底等高圆柱体积是圆锥的？',o:['1/3倍','1倍','3倍','2倍'],a:'3倍'},{t:'半径5cm高8cm体积约？',o:['314cm³','628cm³','942cm³','1256cm³'],a:'628cm³'},{t:'体积=底面积×高这个公式也适用？',o:['只适用圆柱','长方体正方体圆柱','只适用长方体','不适用'],a:'长方体正方体圆柱'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
