<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>工程问题</title>
  <style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:18px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:110px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🔧 工程问题</h1><p>研究<strong>工作效率、工作时间、工作总量</strong>三者关系的应用题。</p><p style="margin-top:8px">💡 核心公式：<br><strong>工作总量 = 工作效率 × 工作时间</strong><br>通常把工作总量看作<strong>单位"1"</strong><br>工作效率 = 1÷完成时间</p><p style="margin-top:8px">🔢 例如：甲单独做要10天，效率=1/10；乙要15天，效率=1/15。合作需：1÷(1/10+1/15)=6天。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决工程问题！</div></div>
<div class="card game"><h2>🔧 工程问题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'甲独做10天完成，乙独做15天，合作需几天？',o:['5','6','7','8'],a:'6'},{t:'一项工程，甲队独做20天，乙队独做30天，合作需几天？',o:['10','12','15','18'],a:'12'},{t:'甲效率=1/8，做3天后完成了几分之几？',o:['1/8','3/8','5/8','1/4'],a:'3/8'},{t:'甲独做要12天，先做3天后乙加入，又用4天完成，乙独做要几天？',o:['8','10','12','15'],a:'10'},{t:'工作总量÷工作时间=？',o:['工作效率','工作速度','剩余工作量','完成天数'],a:'工作效率'},{t:'三人合作完成一项工程，甲做1/4乙做1/3丙做剩下的，丙做了几分之几？',o:['1/4','5/12','1/3','7/12'],a:'5/12'},{t:'甲效率1/6乙效率1/9，合作2天完成几分之几？',o:['5/18','5/9','7/9','1/3'],a:'5/9'},{t:'一件工作甲要15天乙要20天，合作几天完成？',o:['60/7天','7天','8天','9天'],a:'60/7天'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
