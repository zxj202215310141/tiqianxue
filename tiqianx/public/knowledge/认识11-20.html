<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认识11-20</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfeff 50%, #fffbeb 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #22c55e 0%, #0ea5e9 100%);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
        }
        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .header h1 { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .main-content { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 768px) { .main-content { grid-template-columns: 1fr 1fr; } }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        .card-title {
            font-size: 18px;
            font-weight: bold;
            color: #22c55e;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card-title::before {
            content: '';
            width: 8px; height: 8px;
            background: #22c55e;
            border-radius: 50%;
        }
        .knowledge-content {
            font-size: 15px;
            color: #374151;
            line-height: 1.8;
        }
        .knowledge-content p { margin-bottom: 10px; }
        .highlight {
            background: #dcfce7;
            padding: 2px 8px;
            border-radius: 8px;
            font-weight: bold;
            color: #16a34a;
        }
        .number-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .number-circle {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 10px rgba(34, 197, 94, 0.4);
        }
        .example-box {
            background: #f0fdf4;
            border-radius: 15px;
            padding: 15px;
            margin-top: 15px;
            border-left: 4px solid #22c55e;
        }
        .example-title {
            font-weight: bold;
            color: #16a34a;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .game-title {
            font-size: 16px;
            font-weight: bold;
            color: #0ea5e9;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .game-title::before {
            content: '🎮';
            font-size: 20px;
        }
        .question-box {
            background: #f0f9ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .question-text {
            font-size: 16px;
            font-weight: bold;
            color: #0369a1;
            margin-bottom: 15px;
            text-align: center;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        @media (max-width: 480px) { .options-grid { grid-template-columns: repeat(2, 1fr); } }
        .option-btn {
            padding: 12px;
            background: white;
            border: 2px solid #bae6fd;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            color: #0369a1;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option-btn:hover { border-color: #0ea5e9; background: #e0f2fe; }
        .option-btn.correct { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
        .option-btn.wrong { background: #fee2e2; border-color: #ef4444; color: #dc2626; animation: shake 0.3s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .count-items {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .count-item {
            font-size: 35px;
            animation: bounce 0.5s;
        }
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        .drop-zones {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .drop-zone {
            width: 60px; height: 60px;
            border: 3px dashed #94a3b8;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #6b7280;
            background: white;
            transition: all 0.3s;
        }
        .drop-zone.hover { border-color: #22c55e; background: #f0fdf4; }
        .drop-zone.filled { border-color: #22c55e; background: #dcfce7; }
        .drag-numbers {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .drag-number {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: white;
            cursor: grab;
            box-shadow: 0 4px 10px rgba(251, 191, 36, 0.4);
            user-select: none;
            transition: all 0.3s;
        }
        .drag-number:active { cursor: grabbing; transform: scale(0.95); }
        .feedback {
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 16px;
            text-align: center;
            margin-top: 15px;
            animation: fadeIn 0.3s;
        }
        .feedback.correct { background: #dcfce7; color: #16a34a; }
        .feedback.wrong { background: #fee2e2; color: #dc2626; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .score-display {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #f59e0b;
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #22c55e 0%, #0ea5e9 100%);
            border-radius: 4px;
            transition: width 0.3s;
        }
        .next-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #22c55e 0%, #0ea5e9 100%);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4); }
        .ten-frame {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            max-width: 200px;
            margin: 0 auto;
            background: #f0f9ff;
            padding: 10px;
            border-radius: 12px;
        }
        .ten-dot {
            width: 30px;
            height: 30px;
            background: #bae6fd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #0369a1;
        }
        .ten-dot.filled {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="window.location.href='/'">
                ← 返回主页
            </button>
            <h1>🧮 认识11-20的数字</h1>
            <p>快乐学习，轻松掌握！</p>
        </div>

        <div class="main-content">
            <div class="card">
                <div class="card-title">📖 知识要点</div>
                <div class="knowledge-content">
                    <p>小朋友们好！今天我们来认识<strong class="highlight">11-20</strong>这些数字朋友。</p>
                    <p><strong class="highlight">十几的数</strong>都是由"1个十"和"几个一"组成的哦！</p>
                    <p><strong class="highlight">11</strong>就是1个十和1个一，<strong class="highlight">15</strong>就是1个十和5个一</p>
                    <p><strong class="highlight">20</strong>是由2个十组成的，没有单独的一</p>
                    <p>我们可以用<strong class="highlight">小棒捆成一捆</strong>来表示十，这样数数更方便！</p>
                </div>

                <div class="number-row">
                    <div class="number-circle">11</div>
                    <div class="number-circle">12</div>
                    <div class="number-circle">13</div>
                    <div class="number-circle">14</div>
                    <div class="number-circle">15</div>
                    <div class="number-circle">16</div>
                    <div class="number-circle">17</div>
                    <div class="number-circle">18</div>
                    <div class="number-circle">19</div>
                    <div class="number-circle">20</div>
                </div>

                <div class="example-box">
                    <div class="example-title">💡 举例说明</div>
                    <div style="font-size:14px; color:#059669; line-height:1.8;">
                        <p>1捆小棒（10根）+ 3根 = 13</p>
                        <p>十位是1，表示1个十；个位是5，表示5个一 → 15</p>
                        <p>2捆小棒 = 20</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">🎮 互动练习</div>
                <div class="score-display" id="score">得分：0</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress" style="width:0%"></div>
                </div>

                <div id="game-container">
                    <div class="game-title">练习1：看图写数</div>
                    <div class="question-box">
                        <div class="question-text">数一数有多少根小棒？</div>
                        <div class="count-items">
                            <div style="background:#22c55e; padding:10px 20px; border-radius:10px; font-size:20px; color:white; margin:5px;">一捆=10</div>
                            <span style="font-size:30px; margin:5px;">|||</span>
                        </div>
                        <div class="options-grid">
                            <button class="option-btn" onclick="checkAnswer(0, 13)">11</button>
                            <button class="option-btn" onclick="checkAnswer(0, 13)">12</button>
                            <button class="option-btn" onclick="checkAnswer(0, 13)">13</button>
                            <button class="option-btn" onclick="checkAnswer(0, 13)">14</button>
                            <button class="option-btn" onclick="checkAnswer(0, 13)">15</button>
                            <button class="option-btn" onclick="checkAnswer(0, 13)">20</button>
                        </div>
                    </div>
                </div>

                <div id="feedback-area"></div>
                <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">下一题 →</button>
            </div>
        </div>
    </div>

    <script>
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = 5;

        const questions = [
            {
                type: 'count',
                title: '练习1：看图写数',
                question: '数一数有多少根小棒？一捆=10根',
                items: ['一捆', '|||'],
                options: [11, 12, 13, 14, 15, 20],
                answer: 13
            },
            {
                type: 'count',
                title: '练习2：看图写数',
                question: '数一数有多少颗糖果？',
                items: ['🍬🍬🍬🍬🍬🍬🍬🍬🍬🍬', '🍬🍬🍬🍬'],
                options: [12, 13, 14, 15, 16, 17],
                answer: 14
            },
            {
                type: 'drag',
                title: '练习3：按顺序填数',
                question: '把数字拖到正确的位置：13、__、15',
                targets: ['?'],
                values: [14],
                options: [14, 12, 16]
            },
            {
                type: 'choice',
                title: '练习4：选择题',
                question: '17是由几个十和几个一组成的？',
                options: ['1个十和7个一', '7个十和1个一', '17个十', '17个一'],
                answer: '1个十和7个一'
            },
            {
                type: 'choice',
                title: '练习5：选择题',
                question: '20前面的一个数是？',
                options: [18, 19, 21, 22],
                answer: 19
            }
        ];

        function showFeedback(message, type) {
            const feedback = document.createElement('div');
            feedback.className = `feedback ${type}`;
            feedback.textContent = message;
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('feedback-area').appendChild(feedback);
        }

        function updateScore(points) {
            score += points;
            document.getElementById('score').textContent = `得分：${score}`;
            const progress = (currentQuestion / totalQuestions) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function checkAnswer(qIndex, selected) {
            const question = questions[currentQuestion];
            if (selected === question.answer) {
                showFeedback('🎉 太棒了！答对了！', 'correct');
                updateScore(20);
                document.querySelectorAll('.option-btn').forEach(btn => {
                    if (btn.textContent == question.answer) btn.classList.add('correct');
                });
            } else {
                showFeedback('😢 再试试！', 'wrong');
                event.target.classList.add('wrong');
                setTimeout(() => event.target.classList.remove('wrong'), 500);
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function renderQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('game-container');
            
            if (question.type === 'count') {
                let displayItems = '';
                if (question.items[0] === '一捆') {
                    displayItems = `<div style="background:#22c55e; padding:8px 16px; border-radius:8px; font-size:18px; color:white; margin:5px; display:inline-block;">一捆=10</div><span style="font-size:28px; margin:5px;">${question.items[1]}</span>`;
                } else {
                    displayItems = question.items.map(item => `<div class="count-item">${item}</div>`).join('');
                }
                
                container.innerHTML = `
                    <div class="game-title">${question.title}</div>
                    <div class="question-box">
                        <div class="question-text">${question.question}</div>
                        <div class="count-items" style="justify-content:center;">${displayItems}</div>
                        <div class="options-grid">
                            ${question.options.map(opt => `<button class="option-btn" onclick="checkAnswer(${currentQuestion}, ${opt})">${opt}</button>`).join('')}
                        </div>
                    </div>
                `;
            } else if (question.type === 'drag') {
                container.innerHTML = `
                    <div class="game-title">${question.title}</div>
                    <div class="question-box">
                        <div class="question-text">${question.question}</div>
                        <div class="drop-zones">
                            ${question.targets.map((t, i) => `<div class="drop-zone" data-target="${question.values[i]}">${t}</div>`).join('')}
                        </div>
                        <div class="drag-numbers">
                            ${question.options.map(opt => `<div class="drag-number" draggable="true" data-value="${opt}">${opt}</div>`).join('')}
                        </div>
                    </div>
                `;
                initDrag();
            } else {
                container.innerHTML = `
                    <div class="game-title">${question.title}</div>
                    <div class="question-box">
                        <div class="question-text">${question.question}</div>
                        <div class="options-grid">
                            ${question.options.map(opt => `<button class="option-btn" onclick="checkAnswer(${currentQuestion}, '${opt}')">${opt}</button>`).join('')}
                        </div>
                    </div>
                `;
            }
        }

        function initDrag() {
            const bubbles = document.querySelectorAll('.drag-number');
            const zones = document.querySelectorAll('.drop-zone');

            bubbles.forEach(bubble => {
                bubble.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text', bubble.dataset.value);
                    bubble.classList.add('dragging');
                });
                bubble.addEventListener('dragend', () => bubble.classList.remove('dragging'));
            });

            zones.forEach(zone => {
                zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('hover'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('hover'));
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('hover');
                    const value = e.dataTransfer.getData('text');
                    if (value === zone.dataset.target) {
                        zone.textContent = value;
                        zone.classList.add('filled');
                        showFeedback('🎉 太棒了！', 'correct');
                        updateScore(20);
                        document.getElementById('next-btn').style.display = 'block';
                    } else {
                        showFeedback('😢 再试试！', 'wrong');
                    }
                });
            });
        }

        function nextQuestion() {
            currentQuestion++;
            document.getElementById('feedback-area').innerHTML = '';
            document.getElementById('next-btn').style.display = 'none';
            
            if (currentQuestion < totalQuestions) {
                renderQuestion();
            } else {
                document.getElementById('game-container').innerHTML = `
                    <div style="text-align:center; padding:40px;">
                        <div style="font-size:64px; margin-bottom:20px;">🎉</div>
                        <h2 style="font-size:24px; color:#22c55e; margin-bottom:10px;">恭喜完成所有练习！</h2>
                        <p style="font-size:18px; color:#374151;">你的得分：${score}分</p>
                        <button class="next-btn" onclick="location.reload()" style="margin-top:20px;">再玩一次</button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
