name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: study/package-lock.json

      - name: Install dependencies
        run: cd study && npm install

      - name: Build project
        run: cd study && npm run build

      - name: Enable GitHub Pages via API
        run: |
          curl -s -X POST https://api.github.com/repos/zxj202215310141/tiqianxue/pages \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -d '{"source":{"branch":"pages","path":"/"}}' || true

      - name: Deploy to pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./study/dist
          publish_branch: pages
          force_orphan: true
