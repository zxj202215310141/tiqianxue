<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>年月日</title>
  <style>
    :root{--bg:#f3e5f5;--card:#ffffff;--accent:#ce93d8;--accent2:#7b1fa2;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin:20px 0;width:100%;max-width:400px}
    .cal-header{background:var(--accent);color:white;text-align:center;padding:8px;border-radius:8px;font-weight:bold;font-size:14px}
    .cal-day{background:var(--accent);color:var(--accent2);text-align:center;padding:12px;border-radius:8px;font-weight:bold;font-size:18px;cursor:pointer;transition:transform 0.2s}
    .cal-day:active{transform:scale(0.95)}
    .cal-day.correct{background:var(--correct);color:white}
    .cal-day.wrong{background:var(--wrong);color:white}
    .btn{background:linear-gradient(135deg,var(--accent2),#ab47bc);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(123,31,162,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:20px}.cal-day{padding:10px;font-size:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📅 年月日</h1>
      <p>一年有12个月，大月有31天，小月有30天，平年2月有28天，闰年2月有29天。</p>
      <p style="margin-top:8px">💡 大月：1、3、5、7、8、10、12月；小月：4、6、9、11月。</p>
      <p style="margin-top:8px">🔢 平年全年365天，闰年全年366天。</p>
      <div style="margin-top:16px;padding:12px;background:#ce93d8;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        根据提示选择正确的日期！
      </div>
    </div>

    <div class="card game">
      <h2>📅 日历挑战</h2>
      <div class="hint">点击正确的日期</div>
      
      <div class="question" id="question">一年中有多少个月有31天？</div>
      
      <div class="options" id="options" style="display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '一年有多少个月？', options: ['10', '12', '13', '24'], answer: '12' },
      { text: '大月有多少天？', options: ['28', '29', '30', '31'], answer: '31' },
      { text: '小月有多少天？', options: ['28', '29', '30', '31'], answer: '30' },
      { text: '平年2月有多少天？', options: ['28', '29', '30', '31'], answer: '28' },
      { text: '闰年2月有多少天？', options: ['28', '29', '30', '31'], answer: '29' },
      { text: '一年中有多少个大月？', options: ['5', '6', '7', '8'], answer: '7' },
      { text: '一年中有多少个小月？', options: ['3', '4', '5', '6'], answer: '4' },
      { text: '平年全年有多少天？', options: ['364', '365', '366', '367'], answer: '365' },
      { text: '闰年全年有多少天？', options: ['364', '365', '366', '367'], answer: '366' },
      { text: '3月有多少天？', options: ['28', '29', '30', '31'], answer: '31' },
      { text: '6月有多少天？', options: ['28', '29', '30', '31'], answer: '30' },
      { text: '9月有多少天？', options: ['28', '29', '30', '31'], answer: '30' },
      { text: '12月有多少天？', options: ['28', '29', '30', '31'], answer: '31' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'cal-day'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
