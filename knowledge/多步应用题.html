<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>多步应用题</title>
  <style>:root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:18px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🔢 多步应用题</h1><p>需要<strong>三步或更多步</strong>运算才能解决的问题。需仔细分析<strong>数量关系</strong>，分步解答。</p><p style="margin-top:8px">💡 解题策略：<br>① <strong>分析法</strong>：从问题出发找条件<br>② <strong>综合法</strong>：从条件出发推导结论<br>③ 画图、列表辅助理解</p><p style="margin-top:8px">🔢 例如：商店运来苹果5箱，每箱20千克；梨4箱，每箱15千克。苹果比梨多多少千克？<br>苹果：5×20=100kg，梨：4×15=60kg，多：100-60=40kg。</p><div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决多步应用题！</div></div>
<div class="card game"><h2>🔢 多步应用题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'苹果5箱每箱20kg，梨4箱每箱15kg。苹果比梨多几kg？',o:['35','40','45','50'],a:'40'},{t:'钢笔8元一支，圆珠笔3元一支。买3支钢笔和2支圆珠笔共几元？',o:['24','28','30','33'],a:'30'},{t:'长方形的长12cm，宽8cm，周长几cm？面积几cm²？周长+面积=?',o:['40+96=136','36+96=132','40+80=120','36+80=116'],a:'40+96=136'},{t:'3个篮球各45元，2个足球各68元，共几元？',o:['113','226','271','281'],a:'271'},{t:'班费200元，买书用89元，买文具用45元，还剩多少？',o:['55','66','76','86'],a:'66'},{t:'甲班45人乙班38人，各分3组，甲每组比乙组多几人？',o:['2','3','4','1'],a:'2'},{t:'一本故事书240页，前3天每天看30页，剩下的4天看完，每天看几页？',o:['30','35','37.5','40'],a:'37.5'},{t:'梯形上底4cm下底6cm高5cm，面积几cm²？',o:['20','25','30','50'],a:'25'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
