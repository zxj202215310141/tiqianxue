<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>比例应用题</title>
  <style>:root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:18px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:110px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>⚖️ 比例应用题</h1><p>用<strong>比和比例</strong>的知识解决的实际问题。常用正比例和反比例来解答。</p><p style="margin-top:8px">💡 解题方法：<br>① 判断题中两种量成<strong>正比例</strong>还是<strong>反比例</strong><br>② 列出比例式<br>③ 解比例</p><p style="margin-top:8px">🔢 例如：3小时行180千米，5小时行x千米。速度一定，路程和时间成正比例。180:3=x:5，x=300千米。</p><div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px"><strong>🎮 游戏说明：</strong><br>用比例方法解决应用题！</div></div>
<div class="card game"><h2>⚖️ 比例应用题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'3小时行180km，照这样5小时行？',o:['250','280','300','360'],a:'300'},{t:'4人6天完成，8人需要几天？（工作总量不变）',o:['2','3','4','12'],a:'3'},{t:'地图比例尺1:50000，图上2cm代表实际多少km？',o:['0.5','1','1.5','2'],a:'1'},{t:'6个工人15天完成，增加3人，几天完成？',o:['8','9','10','12'],a:'10'},{t:'用边长3dm方砖铺地需96块，改用边长4dm需几块？',o:['48','54','72','128'],a:'54'},{t:'100克海水含盐3克，5吨海水含盐多少千克？',o:['100','120','150','180'],a:'150'},{t:'拖拉机4小时耕48亩，7小时耕几亩？',o:['72','78','84','96'],a:'84'},{t:'20本同样的书摞起来高60cm，50本高几cm？',o:['120','135','140','150'],a:'150'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
