<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>最大公因数</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:26px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:22px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{min-width:110px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🏆 最大公因数</h1>
      <p>几个数的公因数中<strong>最大的一个</strong>叫做这几个数的<strong>最大公因数</strong>（也叫最大公约数）。</p>
      <p style="margin-top:8px">💡 求最大公因数的方法：
        <br>① <strong>列举法</strong>：列举所有因数，找出最大的
        <br>② <strong>短除法</strong>：用公有的质因数连续去除</p>
      <p style="margin-top:8px">🔢 例如：12和18的最大公因数。<br>12的因数：1,2,3,4,6,12；18的因数：1,2,3,6,9,18；公因数1,2,3,6中最大的是6。</p>
      <div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        快速求出两个数的最大公因数！
      </div>
    </div>

    <div class="card game">
      <h2>🏆 最大公因数挑战</h2>
      <div class="hint">计算并选择正确的最大公因数</div>

      <div class="question" id="question"></div>

      <div class="options" id="options"></div>

      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>

      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')

    let score = 0
    let currentAnswer = ''

    const questions = [
      { text: '8和12的最大公因数是？', options: ['2', '4', '6', '8'], answer: '4' },
      { text: '15和25的最大公因数是？', options: ['3', '5', '10', '15'], answer: '5' },
      { text: '18和30的最大公因数是？', options: ['3', '6', '9', '12'], answer: '6' },
      { text: '14和21的最大公因数是？', options: ['3', '5', '7', '14'], answer: '7' },
      { text: '16和24的最大公因数是？', options: ['4', '6', '8', '12'], answer: '8' },
      { text: '12和20的最大公因数是？', options: ['2', '4', '6', '8'], answer: '4' },
      { text: '9和15的最大公因数是？', options: ['1', '2', '3', '5'], answer: '3' },
      { text: '24和36的最大公因数是？', options: ['6', '8', '12', '18'], answer: '12' },
      { text: '10和21的最大公因数是？', options: ['1', '3', '5', '7'], answer: '1' },
      { text: '30和45的最大公因数是？', options: ['5', '10', '15', '20'], answer: '15' },
      { text: '两个数是倍数关系时，最大公因数是？', options: ['1', '较大的数', '较小的数', '两个数的积'], answer: '较小的数' },
      { text: '两个数互质时，最大公因数是？', options: ['0', '1', '较小的数', '较大的数'], answer: '1' }
    ]

    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }

    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer

      questionEl.textContent = q.text
      messageEl.style.display = 'none'

      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }

    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }

    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
