<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>比例的认识</title>
  <style>
    :root{--bg:#fbe9e7;--card:#ffffff;--accent:#ffab91;--accent2:#bf360c;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(191,54,12,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#d84315);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(191,54,12,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:130px;height:55px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>⚖️ 比例的认识</h1>
      <p>表示两个比相等的式子叫做比例。</p>
      <p style="margin-top:8px">💡 组成比例的四个数叫做比例的项，两端的两项叫做外项，中间的两项叫做内项。</p>
      <p style="margin-top:8px">🔢 例如：2:4 = 3:6，其中2和6是外项，4和3是内项。</p>
      <div style="margin-top:16px;padding:12px;background:#ffab91;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        判断两个比是否能组成比例！
      </div>
    </div>

    <div class="card game">
      <h2>⚖️ 比例的认识挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">下面哪组比可以组成比例？</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '下面哪组比可以组成比例？', options: ['2:3和4:5', '1:2和2:4', '3:5和6:7', '4:5和5:4'], answer: '1:2和2:4' },
      { text: '下面哪组比可以组成比例？', options: ['3:4和9:12', '2:5和4:9', '5:6和10:11', '1:3和3:1'], answer: '3:4和9:12' },
      { text: '下面哪组比可以组成比例？', options: ['2:5和3:7', '4:6和6:9', '5:8和10:15', '7:9和8:10'], answer: '4:6和6:9' },
      { text: '下面哪组比不可以组成比例？', options: ['1:4和2:8', '3:6和4:8', '2:3和4:6', '5:6和6:5'], answer: '5:6和6:5' },
      { text: '下面哪组比可以组成比例？', options: ['5:10和1:2', '2:3和3:4', '4:5和5:6', '6:7和7:8'], answer: '5:10和1:2' },
      { text: '比例 2:5 = 4:x 中，x = ?', options: ['5', '8', '10', '20'], answer: '10' },
      { text: '比例 3:4 = x:12 中，x = ?', options: ['6', '8', '9', '10'], answer: '9' },
      { text: '下面哪组比可以组成比例？', options: ['6:8和9:12', '2:3和5:6', '7:8和8:9', '9:10和10:11'], answer: '6:8和9:12' },
      { text: '比例 x:6 = 4:3 中，x = ?', options: ['4', '6', '8', '12'], answer: '8' },
      { text: '下面哪组比不可以组成比例？', options: ['4:8和1:2', '6:9和2:3', '8:10和4:5', '9:12和3:5'], answer: '9:12和3:5' },
      { text: '比例 5:x = 10:12 中，x = ?', options: ['5', '6', '10', '12'], answer: '6' },
      { text: '下面哪组比可以组成比例？', options: ['3:5和6:10', '2:7和4:13', '5:9和10:17', '8:11和16:21'], answer: '3:5和6:10' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
