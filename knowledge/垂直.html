<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>垂直</title>
<style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>⊥ 垂直</h1><p>两条直线<strong>相交成直角</strong>时，这两条直线<strong>互相垂直</strong>。垂直用符号"<strong>⊥</strong>"表示。</p><p style="margin-top:8px">💡 概念：<br>• 垂足：两条垂线的<strong>交点</strong><br>• 垂线：互相垂直的两条直线<br>• 垂线段：从直线外一点到直线的垂直线段</p><p style="margin-top:8px">🔢 <strong>垂线段最短</strong>：从直线外一点到直线，垂线段距离最短。</p><p style="margin-top:8px">📝 生活中：墙角、门框相邻两边、十字路口的垂直方向等。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断垂直的知识！</div></div>
<div class="card game"><h2>⊥ 垂直挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'垂直的符号是什么？',o:['∥','⊥','∠','△'],a:'⊥'},{t:'两条直线相交成多少度时互相垂直？',o:['45°','60°','90°','180°'],a:'90°'},{t:'两条垂线的交点叫什么？',o:['顶点','垂足','交点','中点'],a:'垂足'},{t:'从直线外一点到直线什么线段最短？',o:['任意线段','平行线段','垂线段','斜线段'],a:'垂线段'},{t:'长方形相邻两边是什么关系？',o:['平行','垂直','相交但不垂直','无法确定'],a:'垂直'},{t:'正方形对角线互相垂直吗？',o:['是','不是','有时是','无法确定'],a:'是'},{t:'下面哪个有垂直线段？',o:['铁轨','平行线','墙角','跑道'],a:'墙角'},{t:'点到直线的距离是指？',o:['任意线段','最长线段','最短线段(垂线段)','不确定'],a:'最短线段(垂线段)'},{t:'两条垂线形成几个直角？',o:['1个','2个','3个','4个'],a:'4个'},{t:'垂直是相交的特例吗？',o:['是','不是','有时是','无法确定'],a:'是'},{t:'过直线上一点可以画几条垂线？',o:['0条','1条','2条','无数条'],a:'1条'},{t:'门框相邻两边是什么关系？',o:['平行','垂直','重合','没有关系'],a:'垂直'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
