<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>用数对确定位置</title><style>:root{--bg:#ede7f6;--card:#ffffff;--accent:#b39ddb;--accent2:#311b92;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(49,27,146,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#4527a0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🔢 用数对确定位置</h1><p><strong>数对</strong>是用两个数字确定平面上一点位置的方法，写成<strong>(列, 行)</strong>的形式。</p><p style="margin-top:8px">💡 规则：<strong>先列后行</strong>（先横后纵）。第一个数表示第几列（从左到右），第二个数表示第几行（从下到上）。</p><p style="margin-top:8px">🔢 例如：(3,5)表示第3列第5行。</p><div style="margin-top:16px;padding:12px;background:#b39ddb;border-radius:10px"><strong>🎮 游戏说明：</strong><br>用数对确定位置！</div></div><div class="card game"><h2>🔢 数对挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'数对(3,5)表示什么？',o:['第5列第3行','第3列第5行','第3行第5个','第5行第3个'],a:'第3列第5行'},{t:'数对中第一个数表示？',o:['行','列','高度','序号'],a:'列'},{t:'数对中第二个数表示？',o:['行','列','宽度','序号'],a:'行'},{t:'数对的写法是？',o:['[3,5]','{3,5}','(3,5)','3行5列'],a:'(3,5)'},{t:'第2列第4行用数对表示？',o:['(2,4)','(4,2)','2列4行','(4行,2列)'],a:'(2,4)'},{t:'数对(5,1)和(5,3)在同一？',o:['行','列','颜色','大小'],a:'列'},{t:'教室座位(4,2)表示？',o:['第2列第4排','第4列第2排','第4排第2行','任意'],a:'第4列第2排'},{t:'数对(x,y)中x不变y变大，位置移动？',o:['向上','向下','向左','向右'],a:'向上'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
