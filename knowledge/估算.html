<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>估算</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffb74d;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .hint-text{font-size:16px;color:#636e72;margin-bottom:16px}
    .options{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0}
    .opt-btn{min-width:100px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:14px;border:none;font-size:22px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}
    .opt-btn:hover{transform:translateY(-2px)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:12px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{min-width:80px;height:50px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 估算</h1>
      <p>估算就是大致推算，不需要精确计算。把数字凑成整十、整百数后再计算。</p>
      <p style="margin-top:8px">💡 常见方法：四舍五入到整十或整百。</p>
      <p style="margin-top:8px">🔢 例如：29×31 ≈ 30×30 = 900</p>
      <div style="margin-top:16px;padding:12px;background:#ffb74d;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>选择最接近的估算值，点击即答！
      </div>
    </div>
    <div class="card game">
      <h2>🎯 估算挑战</h2>
      <div class="hint">点击你认为最接近的估算值</div>
      <div class="question" id="question">29 × 31 ≈ ?</div>
      <div class="hint-text" id="hintText">提示：把数字凑成整十数再算</div>
      <div class="options" id="options"></div>
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      <div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;display:none"></div>
    </div>
  </div>
  <script>
    const qEl=document.getElementById('question'),hintEl=document.getElementById('hintText'),
      optsEl=document.getElementById('options'),scoreEl=document.getElementById('scoreVal'),
      msgEl=document.getElementById('msg');
    let score=0,currentAnswer=0,locked=false;

    function setScore(v){score=v;scoreEl.textContent=score}

    function gen(){
      locked=false;msgEl.style.display='none';
      const type=Math.floor(Math.random()*3); // 0=add,1=multiply,2=add-large
      let a,b,est,expr,hint;
      if(type===0){
        a=Math.floor(Math.random()*80)+11; b=Math.floor(Math.random()*80)+11;
        const ra=Math.round(a/10)*10, rb=Math.round(b/10)*10;
        est=ra+rb; expr=a+'+'+b+' ≈ ?'; hint='凑成整十：'+ra+'+'+rb;
      }else if(type===1){
        a=Math.floor(Math.random()*80)+11; b=Math.floor(Math.random()*80)+11;
        const ra=Math.round(a/10)*10, rb=Math.round(b/10)*10;
        est=ra*rb; expr=a+'×'+b+' ≈ ?'; hint='凑成整十：'+ra+'×'+rb;
      }else{
        a=Math.floor(Math.random()*800)+100; b=Math.floor(Math.random()*800)+100;
        const ra=Math.round(a/100)*100, rb=Math.round(b/100)*100;
        est=ra+rb; expr=a+'+'+b+' ≈ ?'; hint='凑成整百：'+ra+'+'+rb;
      }
      currentAnswer=est; qEl.textContent=expr; hintEl.textContent='提示：'+hint;
      // Generate 4 options including correct answer
      const pool=[est];
      while(pool.length<4){
        let r=est+(Math.floor(Math.random()*5)-2)*(type===2?100:10);
        if(r>0&&!pool.includes(r))pool.push(r);
      }
      const sorted=pool.sort(()=>Math.random()-.5);
      optsEl.innerHTML='';sorted.forEach(v=>{
        const b=document.createElement('button');b.className='opt-btn';b.textContent=v;
        b.onclick=()=>{
          if(locked)return;locked=true;
          document.querySelectorAll('.opt-btn').forEach(x=>x.disabled=true);
          if(v===est){b.classList.add('correct');msgEl.textContent='✅ 正确！';msgEl.style.color='var(--correct)';setScore(score+10)}
          else{b.classList.add('wrong');msgEl.textContent='❌ 答案是 '+est;msgEl.style.color='var(--wrong)';document.querySelectorAll('.opt-btn').forEach(x=>{if(parseInt(x.textContent)===est)x.classList.add('correct')})}
          msgEl.style.display='block';setTimeout(gen,1500);
        };optsEl.appendChild(b);
      });
    }

    function init(){score=0;setScore(0);gen()}
    document.getElementById('next').onclick=gen;
    init();
  </script>
</body>
</html>
