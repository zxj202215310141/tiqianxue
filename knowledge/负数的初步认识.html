<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>负数的初步认识</title>
  <style>
    :root{--bg:#e1f5fe;--card:#ffffff;--accent:#4fc3f7;--accent2:#0288d1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .thermometer{width:80px;height:300px;background:linear-gradient(to bottom,#ff5252,#ff9800,#4caf50);border-radius:40px;position:relative;margin:20px auto;overflow:hidden}
    .thermometer::before{content:'';position:absolute;top:10px;left:10px;right:10px;bottom:10px;background:rgba(255,255,255,0.3);border-radius:30px}
    .mercury{width:100%;background:linear-gradient(to bottom,#ff0000,#ff5252);position:absolute;bottom:0;transition:height 0.3s ease;border-radius:0 0 40px 40px}
    .temperature-marks{position:absolute;right:20px;top:0;bottom:0;width:60px;display:flex;flex-direction:column;justify-content:space-between;padding:20px 0}
    .mark{font-size:14px;font-weight:bold;color:#636e72}
    .mark.zero{color:#ff9800;font-size:16px}
    .target-temp{font-size:24px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center;padding:10px;background:var(--accent);border-radius:10px;color:white}
    .slider{width:200px;margin:20px auto}
    .slider-track{width:100%;height:10px;background:linear-gradient(to right,#ff5252,#ff9800,#4caf50);border-radius:5px;position:relative}
    .slider-thumb{width:30px;height:30px;background:white;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);cursor:grab;box-shadow:0 4px 8px rgba(0,0,0,0.2);transition:transform 0.2s}
    .slider-thumb:active{cursor:grabbing;transform:translate(-50%,-50%) scale(1.2)}
    .current-temp{font-size:18px;font-weight:bold;color:var(--accent2);margin-top:10px}
    .btn{background:linear-gradient(135deg,var(--accent2),#4fc3f7);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(2,136,209,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.thermometer{width:60px;height:250px}.slider{width:150px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>❄️ 负数的初步认识</h1>
      <p>像-3、-5、-10这样的数叫做负数。</p>
      <p style="margin-top:8px">💡 0既不是正数，也不是负数。</p>
      <p style="margin-top:8px">❄️ 负数在生活中的应用：温度（零下）、海拔（低于海平面）等。</p>
      <div style="margin-top:16px;padding:12px;background:#4fc3f7;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        温度计游戏！拖动滑块调整温度到目标值。
      </div>
    </div>

    <div class="card game">
      <h2>🌡️ 温度计游戏</h2>
      <div class="hint">拖动滑块调整温度到目标值</div>
      
      <div class="target-temp" id="target">目标温度：-5°C</div>
      
      <div class="thermometer">
        <div class="mercury" id="mercury"></div>
        <div class="temperature-marks">
          <div class="mark">20</div>
          <div class="mark">10</div>
          <div class="mark zero">0</div>
          <div class="mark">-10</div>
          <div class="mark">-20</div>
        </div>
      </div>
      
      <div class="current-temp" id="current">当前温度：0°C</div>
      
      <div class="slider">
        <div class="slider-track">
          <div class="slider-thumb" id="thumb" style="left:50%"></div>
        </div>
      </div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const targetEl = document.getElementById('target')
    const mercury = document.getElementById('mercury')
    const currentEl = document.getElementById('current')
    const thumb = document.getElementById('thumb')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let targetTemp = 0
    let currentTemp = 0
    let isDragging = false
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function updateThermometer(temp) {
      currentTemp = temp
      currentEl.textContent = '当前温度：' + temp + '°C'
      
      const percentage = ((temp + 20) / 40) * 100
      mercury.style.height = percentage + '%'
      thumb.style.left = percentage + '%'
    }
    
    function checkAnswer() {
      if (currentTemp === targetTemp) {
        messageEl.textContent = '✅ 正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        setTimeout(() => {
          nextQuestion()
        }, 1500)
      } else {
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          messageEl.style.display = 'none'
        }, 1000)
      }
    }
    
    function generateQuestion() {
      targetTemp = Math.floor(Math.random() * 41) - 20
      targetEl.textContent = '目标温度：' + targetTemp + '°C'
      messageEl.style.display = 'none'
      
      updateThermometer(0)
    }
    
    thumb.addEventListener('mousedown', e => {
      isDragging = true
      updatePosition(e.clientX)
    })
    
    document.addEventListener('mousemove', e => {
      if (!isDragging) return
      updatePosition(e.clientX)
    })
    
    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false
        checkAnswer()
      }
    })
    
    function updatePosition(clientX) {
      const track = thumb.parentElement
      const rect = track.getBoundingClientRect()
      const x = clientX - rect.left
      const percentage = Math.max(0, Math.min(100, (x / rect.width) * 100))
      
      const temp = Math.round((percentage / 100) * 40 - 20)
      updateThermometer(temp)
    }
    
    function nextQuestion() {
      generateQuestion()
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', nextQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
