<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>长度的测量</title><style>:root{--bg:#e8f5e9;--card:#ffffff;--accent:#a5d6a7;--accent2:#1b5e20;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(27,94,32,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#388e3c);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>📏 长度的测量</h1><p>测量物体<strong>长度</strong>需要使用<strong>尺子</strong>。测量时，尺子的<strong>0刻度</strong>对准物体一端。</p><p style="margin-top:8px">💡 常用长度单位：毫米mm、厘米cm、分米dm、米m、千米km。<br>1cm=10mm, 1dm=10cm, 1m=100cm, 1km=1000m。</p><p style="margin-top:8px">🔢 测量步骤：① 尺子0刻度对准起点 → ② 尺子与物体平行 → ③ 读取终点刻度。</p><div style="margin-top:16px;padding:12px;background:#a5d6a7;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断长度测量和单位换算！</div></div><div class="card game"><h2>📏 长度测量挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'1米等于多少厘米？',o:['10','100','1000','10000'],a:'100'},{t:'1厘米等于多少毫米？',o:['1','10','100','1000'],a:'10'},{t:'1千米等于多少米？',o:['10','100','1000','10000'],a:'1000'},{t:'测量物体长度用什么工具？',o:['量角器','圆规','尺子','三角板'],a:'尺子'},{t:'铅笔的长度约15什么单位？',o:['毫米','厘米','分米','米'],a:'厘米'},{t:'操场跑道一圈400什么单位？',o:['厘米','分米','米','千米'],a:'米'},{t:'高速公路距离用什么单位？',o:['米','分米','厘米','千米'],a:'千米'},{t:'2米5厘米等于多少厘米？',o:['25','205','250','2500'],a:'205'},{t:'尺子测量时0刻度对准？',o:['中间','终点','起点','任意位置'],a:'起点'},{t:'300厘米等于多少米？',o:['3','30','300','0.3'],a:'3'},{t:'一枚硬币厚度约2什么单位？',o:['毫米','厘米','分米','米'],a:'毫米'},{t:'5km等于多少m？',o:['50','500','5000','50000'],a:'5000'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
