<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>倍数应用题</title>
  <style>:root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>✖️ 倍数应用题</h1><p>涉及<strong>"倍"</strong>的关系的应用题。关键是分清<strong>谁是1倍数</strong>，谁是几倍数。</p><p style="margin-top:8px">💡 核心关系：<br>• 求一个数的几倍：<strong>用乘法</strong><br>• 求一个数是另一个数的几倍：<strong>用除法</strong><br>• 已知一个数的几倍，求这个数：<strong>用除法</strong></p><p style="margin-top:8px">🔢 例如：小明有12张卡，小红的是小明的3倍，小红有几张？12×3=36张。<br>小华有36张，是小明的3倍，小明有几张？36÷3=12张。</p><div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决倍数关系应用题！</div></div>
<div class="card game"><h2>✖️ 倍数应用题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'小明有12张卡，小红的是小明的3倍，小红几张？',o:['15','24','36','48'],a:'36'},{t:'小华有36张卡，是小明的3倍，小明几张？',o:['9','12','15','108'],a:'12'},{t:'甲=25，乙是甲的4倍，乙=？',o:['50','75','100','125'],a:'100'},{t:'甲有20本书，乙有60本，乙是甲的几倍？',o:['2','3','4','40'],a:'3'},{t:'鸡有15只，鸭是鸡的2倍多3只，鸭几只？',o:['30','33','35','28'],a:'33'},{t:'桃树40棵，是梨树的5倍，梨树几棵？',o:['5','8','35','200'],a:'8'},{t:'甲数是乙数的3倍，甲数比乙数多18，乙数=？',o:['6','9','18','54'],a:'9'},{t:'弟弟5岁，爸爸的年龄是弟弟的7倍还多1岁，爸爸几岁？',o:['35','36','37','42'],a:'36'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
