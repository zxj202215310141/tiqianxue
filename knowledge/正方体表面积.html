<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>正方体表面积</title><style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{color:var(--accent2)}h2{color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>🎲 正方体表面积</h1><p>正方体<strong>表面积</strong> = <strong>6 × 棱长²</strong> = 6a²。</p><p style="margin-top:8px">💡 正方体6个面都是相同的正方形，每个面面积=a²，总表面积=6a²。</p><p style="margin-top:8px">🔢 棱长4cm，表面积=6×16=96cm²。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算正方体表面积！</div></div><div class="card game"><h2>🎲 正方体表面积挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'棱长4cm正方体表面积？',o:['48cm²','64cm²','96cm²','128cm²'],a:'96cm²'},{t:'表面积54cm²棱长？',o:['3cm','6cm','9cm','12cm'],a:'3cm'},{t:'表面积公式？',o:['a²','6a','6a²','12a²'],a:'6a²'},{t:'棱长5dm表面积？',o:['100dm²','125dm²','150dm²','250dm²'],a:'150dm²'},{t:'正方体有几个面？',o:['4个','6个','8个','12个'],a:'6个'},{t:'表面积150cm²棱长？',o:['3cm','5cm','7cm','10cm'],a:'5cm'},{t:'棱长扩大2倍表面积？',o:['2倍','4倍','6倍','8倍'],a:'4倍'},{t:'魔方棱长6cm至少需多少包装纸？',o:['144cm²','180cm²','216cm²','360cm²'],a:'216cm²'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
