<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>长方形的认识</title>
<style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}.hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>▯ 长方形的认识</h1><p><strong>长方形</strong>是一种四边形，<strong>对边相等</strong>，<strong>四个角都是直角</strong>。</p><p style="margin-top:8px">💡 特征：<br>• <strong>对边平行且相等</strong>（长边叫长，短边叫宽）<br>• <strong>四个角都是直角</strong>（90°）<br>• 是特殊的平行四边形</p><p style="margin-top:8px">🔢 周长 = (长+宽)×2；面积 = 长×宽。</p><p style="margin-top:8px">📝 生活中：课本封面、手机屏幕、门板等都是长方形。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断长方形的特征！</div></div>
<div class="card game"><h2>▯ 长方形挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'长方形有几条边？',o:['3条','4条','5条','6条'],a:'4条'},{t:'长方形的对边有什么特点？',o:['不相等','相等','有时相等','无法确定'],a:'相等'},{t:'长方形有几个角？',o:['2个','3个','4个','6个'],a:'4个'},{t:'长方形的四个角都是什么角？',o:['锐角','直角','钝角','平角'],a:'直角'},{t:'直角是多少度？',o:['45°','60°','90°','180°'],a:'90°'},{t:'长方形较长的边叫什么？',o:['长','宽','高','底'],a:'长'},{t:'长方形较短的边叫什么？',o:['长','宽','高','底'],a:'宽'},{t:'长方形周长公式是？',o:['长+宽','长×宽','(长+宽)×2','长×2+宽'],a:'(长+宽)×2'},{t:'长方形面积公式是？',o:['长+宽','长×宽','(长+宽)×2','长×2+宽×2'],a:'长×宽'},{t:'长8cm宽5cm的长方形，周长=',o:['26cm','40cm','13cm','80cm'],a:'26cm'},{t:'下面哪个一定是长方形？',o:['四边相等的四边形','对边相等四个直角的四边形','只有对边平行的四边形','四个角不等的四边形'],a:'对边相等四个直角的四边形'},{t:'正方形是特殊的长方形吗？',o:['是','不是','有时是','无法确定'],a:'是'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
