<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>质量单位</title>
  <style>
    :root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#e91e63;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:20px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,var(--accent2),#f48fb1);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(233,30,99,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>⚖️ 质量单位</h1>
      <p>常用质量单位：克（g）、千克（kg）、吨（t）。</p>
      <p style="margin-top:8px">🔢 换算关系：1000 g = 1 kg，1000 kg = 1 t。</p>
      <p style="margin-top:8px">💡 生活中的例子：一个鸡蛋约50克，一个西瓜约5千克，一辆卡车约5吨。</p>
      <div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        质量单位小测验！选择正确的答案，看看你能拿多少分！
      </div>
    </div>

    <div class="card game">
      <h2>⚖️ 质量单位小测验</h2>
      <div class="hint">选择正确的答案</div>

      <div class="question" id="question">一个鸡蛋大约重多少？</div>

      <div id="options" style="display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin:16px 0"></div>

      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>

      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')

    let score = 0
    let currentAnswer = ''

    const questions = [
      { text: '一个鸡蛋大约重多少？', options: ['50克', '50千克', '50吨'], answer: '50克' },
      { text: '一个西瓜大约重多少？', options: ['5克', '5千克', '5吨'], answer: '5千克' },
      { text: '一辆卡车大约重多少？', options: ['5千克', '500千克', '5吨'], answer: '5吨' },
      { text: '1千克等于多少克？', options: ['10克', '100克', '1000克'], answer: '1000克' },
      { text: '1吨等于多少千克？', options: ['100千克', '1000千克', '10000千克'], answer: '1000千克' },
      { text: '一个苹果大约重多少？', options: ['100克', '100千克', '100吨'], answer: '100克' },
      { text: '一只小猫大约重多少？', options: ['3克', '3千克', '3吨'], answer: '3千克' },
      { text: '5000千克等于多少吨？', options: ['5吨', '50吨', '500吨'], answer: '5吨' },
      { text: '一个乒乓球大约重多少？', options: ['3克', '30克', '300克'], answer: '3克' },
      { text: '一头大象大约重多少？', options: ['5千克', '500千克', '5吨'], answer: '5吨' }
    ]

    function setScore(v) { score = v; scoreEl.textContent = score }

    function generateQuestion() {
      const q = questions[Math.floor(Math.random() * questions.length)]
      currentAnswer = q.answer
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          document.querySelectorAll('#options .btn').forEach(b => b.style.opacity = '0.6')
          btn.style.opacity = '1'
          if (opt === currentAnswer) {
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            setScore(score + 10)
          } else {
            messageEl.textContent = '❌ 不对哦，正确答案是：' + currentAnswer
            messageEl.style.color = 'var(--wrong)'
          }
          messageEl.style.display = 'block'
        })
        optionsEl.appendChild(btn)
      })
    }

    function init() { score = 0; setScore(0); generateQuestion() }

    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
