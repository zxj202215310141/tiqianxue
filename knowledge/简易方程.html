<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>简易方程</title>
  <style>
    :root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#c2185b;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:120px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:24px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(194,24,91,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#e91e63);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(194,24,91,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:100px;height:50px;font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📝 简易方程</h1>
      <p>含有未知数的等式叫做方程。</p>
      <p style="margin-top:8px">💡 使方程左右两边相等的未知数的值，叫做方程的解。</p>
      <p style="margin-top:8px">🔢 例如：x + 5 = 10 是方程，x = 5 是方程的解。</p>
      <div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        判断哪个是方程，或者找出方程的解！
      </div>
    </div>

    <div class="card game">
      <h2>📝 简易方程挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">下面哪个是方程？</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '下面哪个是方程？', options: ['3+5', 'x+5', 'x+5=8', '2×4'], answer: 'x+5=8' },
      { text: '下面哪个是方程？', options: ['a-3', '4×5', '2x=6', '5>3'], answer: '2x=6' },
      { text: '方程 x+3=7 的解是：', options: ['x=3', 'x=4', 'x=5', 'x=10'], answer: 'x=4' },
      { text: '方程 2x=10 的解是：', options: ['x=2', 'x=5', 'x=8', 'x=20'], answer: 'x=5' },
      { text: '方程 x-5=3 的解是：', options: ['x=2', 'x=3', 'x=8', 'x=15'], answer: 'x=8' },
      { text: '方程 x÷4=2 的解是：', options: ['x=2', 'x=4', 'x=6', 'x=8'], answer: 'x=8' },
      { text: '下面哪个不是方程？', options: ['x=0', 'a+b=c', '3x+5', '2y=4'], answer: '3x+5' },
      { text: '方程 3x=15 的解是：', options: ['x=3', 'x=5', 'x=12', 'x=45'], answer: 'x=5' },
      { text: '方程 x+8=12 的解是：', options: ['x=3', 'x=4', 'x=5', 'x=20'], answer: 'x=4' },
      { text: '方程 x-7=5 的解是：', options: ['x=2', 'x=5', 'x=12', 'x=35'], answer: 'x=12' },
      { text: '下面哪个是方程？', options: ['2+3=5', 'y-5=0', '6<9', 'a+b'], answer: 'y-5=0' },
      { text: '方程 x÷3=6 的解是：', options: ['x=2', 'x=3', 'x=9', 'x=18'], answer: 'x=18' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
