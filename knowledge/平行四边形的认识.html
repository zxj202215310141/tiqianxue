<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>平行四边形的认识</title>
<style>:root{--bg:#ede7f6;--card:#ffffff;--accent:#b39ddb;--accent2:#311b92;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:140px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(49,27,146,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#4527a0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>▱ 平行四边形的认识</h1><p><strong>平行四边形</strong>是<strong>两组对边分别平行</strong>的四边形。</p><p style="margin-top:8px">💡 特征：<br>• <strong>对边平行且相等</strong><br>• <strong>对角相等</strong>，邻角互补<br>• <strong>容易变形</strong>（不稳定性）</p><p style="margin-top:8px">🔢 面积 = 底×高。<br>周长 = (底边+邻边)×2。</p><p style="margin-top:8px">📝 长方形和正方形都是特殊的平行四边形。生活中的伸缩门、升降机利用了其易变形特性。</p><div style="margin-top:16px;padding:12px;background:#b39ddb;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断平行四边形的特征！</div></div>
<div class="card game"><h2>▱ 平行四边形挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'平行四边形的对边有什么特点？',o:['不平行','平行且相等','平行但不相等','相等但不平行'],a:'平行且相等'},{t:'平行四边形有几组对边平行？',o:['0组','1组','2组','3组'],a:'2组'},{t:'平行四边形面积公式是？',o:['底×高÷2','底×高','(底+高)×2','长×宽'],a:'底×高'},{t:'平行四边形具有什么特性？',o:['稳定性','易变形','对称性','没有特性'],a:'易变形'},{t:'平行四边形对角有什么特点？',o:['不相等','互补','相等','无法确定'],a:'相等'},{t:'长方形是特殊的平行四边形吗？',o:['是','不是','有时是','无法确定'],a:'是'},{t:'底8cm高5cm的平行四边形面积？',o:['20cm²','26cm²','40cm²','80cm²'],a:'40cm²'},{t:'正方形是特殊的平行四边形吗？',o:['是','不是','有时是','无法确定'],a:'是'},{t:'平行四边形有几条高？',o:['1条','2条','4条','无数条'],a:'无数条'},{t:'下面哪个利用了平行四边形特性？',o:['屋顶三角形支架','伸缩门','铁塔','拱桥'],a:'伸缩门'},{t:'平行四边形邻角的关系是？',o:['相等','互补(和为180°)','互余(和为90°)','没有关系'],a:'互补(和为180°)'},{t:'平行四边形周长公式是？',o:['底×高','底+高×2','(底边+邻边)×2','(底+高)×2'],a:'(底边+邻边)×2'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
