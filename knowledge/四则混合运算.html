<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>四则混合运算</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#81c784;--accent2:#43a047;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .expression{font-size:30px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center;line-height:1.6}
    .answer-box{width:120px;height:70px;border:3px dashed var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--accent2);background:var(--card);margin:12px auto}
    .answer-box.correct{border-color:var(--correct);background:var(--correct);color:white}
    .answer-box.wrong{border-color:var(--wrong);background:var(--wrong);color:white}
    .tiles{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0;justify-content:center}
    .tile{min-width:65px;height:65px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:bold;color:white;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 8px rgba(0,0,0,0.15);border:none;padding:0 8px}
    .tile:hover{transform:translateY(-3px);box-shadow:0 8px 16px rgba(0,0,0,0.25)}
    .tile:active{transform:scale(0.95)}
    .tile.selected{outline:3px solid white;outline-offset:2px}
    .btn{background:linear-gradient(135deg,var(--accent2),var(--accent));color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,0,0,0.15)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:12px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.expression{font-size:24px}.tile{min-width:55px;height:55px;font-size:22px}.answer-box{width:100px;height:60px;font-size:26px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🧮 四则混合运算</h1>
      <p>四则混合运算包含加、减、乘、除四种运算。</p>
      <p style="margin-top:8px">💡 运算顺序：先乘除，后加减；有括号的先算括号里面的。</p>
      <p style="margin-top:8px">🔢 例如：3+4×5 = 3+20 = 23</p>
      <div style="margin-top:16px;padding:12px;background:#dfe6e9;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>先算乘除后算加减！点击下方数字选择正确答案。</div>
    </div>
    <div class="card game">
      <h2>🎯 混合运算挑战</h2>
      <div class="hint">注意：先乘除，后加减！</div>
      <div class="expression" id="expr">3 + 4 × 5 = ?</div>
      <div class="answer-box" id="answerBox">?</div>
      <div class="tiles" id="tiles"></div>
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      <div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;display:none"></div>
    </div>
  </div>
  <script>
    const exprEl=document.getElementById('expr'),answerBox=document.getElementById('answerBox'),
      tilesEl=document.getElementById('tiles'),scoreEl=document.getElementById('scoreVal'),
      msgEl=document.getElementById('msg');
    let score=0,currentAnswer=null,locked=false;

    function setScore(v){score=v;scoreEl.textContent=score}
    const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

    function gen(){
      locked=false;
      var patterns=[
        function(){var a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1,c=Math.floor(Math.random()*9)+1;return{str:a+' + '+b+' × '+c,ans:a+b*c}},
        function(){var a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1,c=Math.floor(Math.random()*9)+1;return{str:a+' × '+b+' + '+c,ans:a*b+c}},
        function(){var a=Math.floor(Math.random()*9)+1,b=Math.floor(Math.random()*9)+1,c=Math.floor(Math.random()*9)+1;return{str:a+' × '+b+' - '+c,ans:a*b-c}},
        function(){var a=Math.floor(Math.random()*19)+10,b=Math.floor(Math.random()*9)+1,c=Math.floor(Math.random()*9)+1;return{str:a+' + '+b+' - '+c,ans:a+b-c}},
        function(){var a=Math.floor(Math.random()*19)+10,b=Math.floor(Math.random()*9)+1,c=Math.floor(Math.random()*9)+1;return{str:a+' - '+b+' + '+c,ans:a-b+c}}
      ];
      var p=patterns[Math.floor(Math.random()*patterns.length)]();
      currentAnswer=p.ans;
      exprEl.textContent=p.str+' = ?';
      answerBox.textContent='?';answerBox.className='answer-box';
      msgEl.style.display='none';

      var pool=[currentAnswer];
      while(pool.length<6){
        var r=Math.floor(Math.random()*180)+1;
        if(pool.indexOf(r)===-1)pool.push(r);
      }
      var tiles=shuffle(pool);
      tilesEl.innerHTML='';
      for(var i=0;i<tiles.length;i++){
        (function(n){
          var t=document.createElement('button');t.className='tile';t.textContent=n;
          t.onclick=function(){
            if(locked)return;
            answerBox.textContent=n;
            var all=document.querySelectorAll('.tile');
            for(var j=0;j<all.length;j++)all[j].classList.remove('selected');
            t.classList.add('selected');
            if(n===currentAnswer){
              answerBox.className='answer-box correct';
              msgEl.textContent='✅ 正确！先乘除后加减！';msgEl.style.color='var(--correct)';msgEl.style.display='block';
              locked=true;setScore(score+10);setTimeout(gen,1200);
            }else{
              answerBox.className='answer-box wrong';
              msgEl.textContent='❌ 注意：先乘除，后加减！';msgEl.style.color='var(--wrong)';msgEl.style.display='block';
              setTimeout(function(){answerBox.textContent='?';answerBox.className='answer-box';msgEl.style.display='none'},800);
            }
          };tilesEl.appendChild(t);
        })(tiles[i]);
      }
    }

    function init(){score=0;setScore(0);gen()}
    document.getElementById('next').onclick=gen;
    init();
  </script>
</body>
</html>
