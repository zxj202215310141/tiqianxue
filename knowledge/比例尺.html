<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>比例尺</title>
  <style>
    :root{--bg:#e8eaf6;--card:#ffffff;--accent:#9fa8da;--accent2:#283593;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(40,53,147,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#3949ab);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(40,53,147,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:130px;height:55px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🗺️ 比例尺</h1>
      <p>比例尺 = 图上距离 / 实际距离。</p>
      <p style="margin-top:8px">💡 比例尺有数值比例尺和线段比例尺两种形式。</p>
      <p style="margin-top:8px">🔢 例如：比例尺1:1000表示图上1厘米代表实际距离1000厘米（即10米）。</p>
      <div style="margin-top:16px;padding:12px;background:#9fa8da;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        根据比例尺计算图上距离或实际距离！
      </div>
    </div>

    <div class="card game">
      <h2>🗺️ 比例尺挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">比例尺1:1000表示图上1厘米代表实际距离多少米？</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '比例尺1:1000表示图上1厘米代表实际距离多少米？', options: ['1米', '10米', '100米', '1000米'], answer: '10米' },
      { text: '比例尺1:50000表示图上1厘米代表实际距离多少千米？', options: ['0.5千米', '5千米', '50千米', '500千米'], answer: '0.5千米' },
      { text: '实际距离是100米，比例尺是1:100，图上距离是多少厘米？', options: ['1厘米', '10厘米', '100厘米', '1000厘米'], answer: '100厘米' },
      { text: '实际距离是50千米，比例尺是1:1000000，图上距离是多少厘米？', options: ['5厘米', '50厘米', '500厘米', '5000厘米'], answer: '5厘米' },
      { text: '图上距离是3厘米，实际距离是150米，比例尺是多少？', options: ['1:50', '1:500', '1:5000', '1:50000'], answer: '1:5000' },
      { text: '比例尺1:2000表示图上1厘米代表实际距离多少米？', options: ['2米', '20米', '200米', '2000米'], answer: '20米' },
      { text: '图上距离是5厘米，比例尺是1:1000，实际距离是多少米？', options: ['5米', '50米', '500米', '5000米'], answer: '50米' },
      { text: '实际距离是2千米，比例尺是1:20000，图上距离是多少厘米？', options: ['5厘米', '10厘米', '20厘米', '40厘米'], answer: '10厘米' },
      { text: '比例尺1:10000表示图上1厘米代表实际距离多少米？', options: ['10米', '100米', '1000米', '10000米'], answer: '100米' },
      { text: '图上距离是4厘米，实际距离是200千米，比例尺是多少？', options: ['1:50000', '1:500000', '1:5000000', '1:50000000'], answer: '1:5000000' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
