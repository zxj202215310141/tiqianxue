<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>浓度问题</title>
  <style>:root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:18px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:110px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>🧪 浓度问题</h1><p>研究<strong>溶质、溶剂、溶液、浓度</strong>之间关系的应用题。</p><p style="margin-top:8px">💡 核心公式：<br>• <strong>浓度 = 溶质÷溶液×100%</strong><br>• 溶质 = 溶液×浓度<br>• 溶液 = 溶质+溶剂（通常是水）</p><p style="margin-top:8px">🔢 例如：200克盐水含盐20克，浓度=20÷200×100%=10%。<br>加盐不加水浓度升高，加水不加盐浓度降低。</p><div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决浓度问题！</div></div>
<div class="card game"><h2>🧪 浓度问题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'200克盐水含盐20克，浓度？',o:['5%','10%','15%','20%'],a:'10%'},{t:'浓度为15%的盐水200克，含盐几克？',o:['20','25','30','40'],a:'30'},{t:'10%的盐水300克，蒸发50克水后浓度？',o:['10%','12%','15%','20%'],a:'12%'},{t:'含盐率=？',o:['盐÷水','盐÷盐水','水÷盐水','盐水÷盐'],a:'盐÷盐水'},{t:'浓度=20%的盐水100克，加多少克盐浓度变为25%？',o:['5','6.67','8','10'],a:'6.67'},{t:'向100克15%糖水中加25克糖，新浓度？',o:['30%','32%','35%','40%'],a:'32%'},{t:'100克浓度为80%酒精，加水100克后浓度？',o:['30%','35%','40%','50%'],a:'40%'},{t:'溶质÷浓度=？',options:['溶剂','溶液','水','溶质+水'],answer:'溶液'},{t:'含糖25%的糖水400克，含糖？',o:['80','100','120','150'],a:'100'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
