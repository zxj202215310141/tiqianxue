<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>比例的性质</title>
  <style>
    :root{--bg:#f3e5f5;--card:#ffffff;--accent:#ce93d8;--accent2:#6a1b9a;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:60px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(106,27,154,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#8e24aa);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(106,27,154,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:130px;height:55px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>✨ 比例的性质</h1>
      <p>在比例里，两个外项的积等于两个内项的积。这叫做比例的基本性质。</p>
      <p style="margin-top:8px">💡 如果 a:b = c:d，那么 ad = bc。</p>
      <p style="margin-top:8px">🔢 例如：3:4 = 6:8，外项积 3×8 = 24，内项积 4×6 = 24。</p>
      <div style="margin-top:16px;padding:12px;background:#ce93d8;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        根据比例的基本性质填空！
      </div>
    </div>

    <div class="card game">
      <h2>✨ 比例的性质挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">在比例 2:3 = 4:x 中，x = ?</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: '在比例 2:3 = 4:x 中，x = ?', options: ['5', '6', '7', '8'], answer: '6' },
      { text: '在比例 3:4 = x:12 中，x = ?', options: ['6', '8', '9', '10'], answer: '9' },
      { text: '在比例 x:5 = 6:10 中，x = ?', options: ['2', '3', '4', '5'], answer: '3' },
      { text: '在比例 4:x = 8:10 中，x = ?', options: ['4', '5', '6', '8'], answer: '5' },
      { text: '在比例 5:6 = x:18 中，x = ?', options: ['12', '15', '16', '18'], answer: '15' },
      { text: '在比例 x:8 = 3:4 中，x = ?', options: ['4', '5', '6', '8'], answer: '6' },
      { text: '在比例 6:9 = 4:x 中，x = ?', options: ['5', '6', '7', '9'], answer: '6' },
      { text: '在比例 7:x = 14:16 中，x = ?', options: ['6', '7', '8', '9'], answer: '8' },
      { text: '在比例 8:12 = x:15 中，x = ?', options: ['8', '10', '12', '15'], answer: '10' },
      { text: '在比例 x:10 = 5:25 中，x = ?', options: ['1', '2', '3', '4'], answer: '2' },
      { text: '在比例 9:6 = x:4 中，x = ?', options: ['5', '6', '7', '8'], answer: '6' },
      { text: '在比例 10:x = 20:14 中，x = ?', options: ['5', '6', '7', '8'], answer: '7' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
