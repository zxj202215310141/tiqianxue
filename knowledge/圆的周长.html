<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>圆的周长</title><style>:root{--bg:#e0f7fa;--card:#ffffff;--accent:#80deea;--accent2:#006064;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,96,100,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#00838f);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>⭕ 圆的周长</h1><p>圆的<strong>周长</strong> = <strong>πd = 2πr</strong>（π≈3.14）。</p><p style="margin-top:8px">💡 <strong>圆周率π</strong>是圆的周长与直径的比值，是一个无限不循环小数，约等于3.14。</p><p style="margin-top:8px">🔢 例如：半径5cm，周长=2×3.14×5=31.4cm。<br>已知周长62.8cm，半径=62.8÷3.14÷2=10cm。</p><div style="margin-top:16px;padding:12px;background:#80deea;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算圆的周长！</div></div><div class="card game"><h2>⭕ 圆的周长挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'半径5cm圆周长约？',o:['15.7cm','31.4cm','78.5cm','157cm'],a:'31.4cm'},{t:'直径10cm圆周长约？',o:['15.7cm','31.4cm','62.8cm','314cm'],a:'31.4cm'},{t:'周长公式是？',o:['πr','2πr','πr²','πd÷2'],a:'2πr'},{t:'半径扩大2倍周长？',o:['扩大2倍','扩大4倍','扩大8倍','不变'],a:'扩大2倍'},{t:'周长62.8cm半径约？',o:['5cm','10cm','20cm','31.4cm'],a:'10cm'},{t:'圆周率π约等于？',o:['2.14','3.14','3.41','3.16'],a:'3.14'},{t:'π是圆的周长除以什么？',o:['半径','直径','面积','周长'],a:'直径'},{t:'半径3cm半圆弧长？',o:['9.42cm','18.84cm','28.26cm','37.68cm'],a:'9.42cm'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
