<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>梯形的认识</title>
<style>:root{--bg:#e0f7fa;--card:#ffffff;--accent:#80deea;--accent2:#006064;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(0,96,100,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#00838f);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>⏢ 梯形的认识</h1><p><strong>梯形</strong>是<strong>只有一组对边平行</strong>的四边形。</p><p style="margin-top:8px">💡 特征：<br>• 平行的两边叫<strong>上底</strong>和<strong>下底</strong><br>• 不平行的两边叫<strong>腰</strong><br>• 两底之间的垂直距离叫<strong>高</strong></p><p style="margin-top:8px">🔢 面积 = (上底+下底)×高÷2。</p><p style="margin-top:8px">📝 特殊梯形：<strong>等腰梯形</strong>（两腰相等）、<strong>直角梯形</strong>（有一腰垂直于底）。生活中：水坝截面、梯子等。</p><div style="margin-top:16px;padding:12px;background:#80deea;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断梯形的特征与计算！</div></div>
<div class="card game"><h2>⏢ 梯形挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'梯形有几组对边平行？',o:['0组','1组','2组','3组'],a:'1组'},{t:'梯形平行的两条边叫什么？',o:['腰','上底和下底','高','对角线'],a:'上底和下底'},{t:'梯形面积公式是？',o:['底×高÷2','(上底+下底)×高÷2','底×高','(上底+下底)×高'],a:'(上底+下底)×高÷2'},{t:'两腰相等的梯形叫什么？',o:['直角梯形','等腰梯形','等边梯形','长方形'],a:'等腰梯形'},{t:'上底4下底8高5的梯形面积？',o:['20','30','40','60'],a:'30'},{t:'梯形有几条高？',o:['1条','2条','3条','无数条'],a:'无数条'},{t:'有一腰垂直于底的梯形叫？',o:['等腰梯形','直角梯形','垂直梯形','长方形'],a:'直角梯形'},{t:'梯形和三角形的面积公式都除以？',o:['1','2','3','4'],a:'2'},{t:'上底3下底7高4的梯形面积？',o:['10','20','28','40'],a:'20'},{t:'下面哪个是梯形？',o:['两组对边平行','只有一组对边平行','对边都不平行','四条边相等'],a:'只有一组对边平行'},{t:'等腰梯形的两腰？',o:['不相等','相等','可能相等','没有腰'],a:'相等'},{t:'梯形可以看成什么图形的一半？',o:['三角形','长方形','平行四边形','正方形'],a:'平行四边形'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
