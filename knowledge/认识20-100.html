<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>认识20-100</title>
  <style>
    :root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#1976d2;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .sequence-board{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0;justify-content:center;width:100%}
    .sequence-box{width:50px;height:50px;border:3px dashed var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:var(--accent2)}
    .sequence-box.filled{border-color:var(--correct);background:var(--correct);color:white}
    .sequence-box.filled.wrong{border-color:var(--wrong);background:var(--wrong)}
    .number-piece{width:50px;height:50px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:white;cursor:grab;transition:transform 0.2s}
    .number-piece:active{cursor:grabbing;transform:scale(1.1)}
    .question{font-size:20px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,var(--accent2),#42a5f5);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(25,118,210,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.sequence-box,.number-piece{width:45px;height:45px;font-size:16px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 认识20-100</h1>
      <p>20-100各数的组成：几十就是由几个十组成的，几十几就是由几个十和几个一组成的。</p>
      <p style="margin-top:8px">💡 例如：30是由3个十组成的；45是由4个十和5个一组成的。</p>
      <p style="margin-top:8px">🔢 10个十是100。</p>
      <div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        数字接龙！按顺序排列数字，从20开始依次排列到100。
      </div>
    </div>

    <div class="card game">
      <h2>🔗 数字接龙</h2>
      <div class="hint">按顺序拖动数字排列</div>
      
      <div class="question" id="question">请按顺序排列数字：20开始</div>
      
      <div class="sequence-board" id="board"></div>
      
      <div class="sequence-board" id="pieces"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const board = document.getElementById('board')
    const pieces = document.getElementById('pieces')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let startNum = 0
    let filledCount = 0
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function initBoard(count) {
      board.innerHTML = ''
      filledCount = 0
      
      for (let i = 0; i < count; i++) {
        const box = document.createElement('div')
        box.className = 'sequence-box'
        box.dataset.index = i
        
        box.addEventListener('dragover', e => e.preventDefault())
        box.addEventListener('drop', handleDrop)
        
        board.appendChild(box)
      }
    }
    
    function initPieces(start, count) {
      pieces.innerHTML = ''
      const nums = []
      
      for (let i = 0; i < count; i++) {
        nums.push(start + i)
      }
      
      shuffle(nums)
      
      nums.forEach(num => {
        const piece = document.createElement('div')
        piece.className = 'number-piece'
        piece.textContent = num
        piece.draggable = true
        piece.dataset.value = num
        
        piece.addEventListener('dragstart', e => {
          e.dataTransfer.setData('num', num.toString())
          piece.style.opacity = '0.5'
        })
        
        piece.addEventListener('dragend', () => {
          piece.style.opacity = '1'
        })
        
        pieces.appendChild(piece)
      })
    }
    
    function handleDrop(e) {
      const num = parseInt(e.dataTransfer.getData('num'))
      const index = parseInt(e.target.dataset.index)
      
      if (e.target.textContent !== '') return
      
      const expected = startNum + index
      
      if (num === expected) {
        e.target.textContent = num
        e.target.classList.add('filled')
        filledCount++
        
        if (filledCount === board.children.length) {
          messageEl.textContent = '✅ 正确！太棒了！'
          messageEl.style.color = 'var(--correct)'
          messageEl.style.display = 'block'
          setScore(score + 10)
          
          setTimeout(() => {
            nextQuestion()
          }, 1000)
        }
      } else {
        e.target.textContent = num
        e.target.classList.add('filled', 'wrong')
        
        messageEl.textContent = '❌ 不对哦，再试试！'
        messageEl.style.color = 'var(--wrong)'
        messageEl.style.display = 'block'
        
        setTimeout(() => {
          initGame(startNum)
          messageEl.style.display = 'none'
        }, 1000)
      }
    }
    
    function initGame(start) {
      startNum = start
      const count = 5
      
      questionEl.textContent = '请按顺序排列数字：' + start + ' ~ ' + (start + count - 1)
      messageEl.style.display = 'none'
      
      initBoard(count)
      initPieces(start, count)
    }
    
    function generateQuestion() {
      const start = Math.floor(Math.random() * 77) + 20
      initGame(start)
    }
    
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]]
      }
      return array
    }
    
    function nextQuestion() {
      generateQuestion()
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', nextQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
