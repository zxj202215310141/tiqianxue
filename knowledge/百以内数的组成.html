<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>百以内数的组成</title>
  <style>
    :root{--bg:#e8f5e9;--card:#ffffff;--accent:#81c784;--accent2:#43a047;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .blocks-area{display:flex;gap:4px;margin:16px 0;flex-wrap:wrap;justify-content:center}
    .block-ten{width:45px;height:45px;background:var(--accent2);border-radius:8px;color:white;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:14px;cursor:grab;transition:transform 0.2s}
    .block-ten:active{cursor:grabbing;transform:scale(1.1)}
    .block-one{width:25px;height:25px;background:var(--accent);border-radius:4px;cursor:grab;transition:transform 0.2s}
    .block-one:active{cursor:grabbing;transform:scale(1.1)}
    .target-box{background:#fff3e0;border:3px dashed var(--accent);border-radius:12px;padding:16px;margin:16px 0;width:100%;min-height:80px;text-align:center}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:16px 0;text-align:center}
    .btn{background:linear-gradient(135deg,var(--accent2),#81c784);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(67,160,71,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    .count-display{display:flex;gap:20px;margin-top:12px;font-weight:bold}
    .count-box{background:var(--accent);color:white;padding:8px 16px;border-radius:8px}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.block-ten{width:40px;height:40px}.block-one{width:20px;height:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 百以内数的组成</h1>
      <p>几十几是由几个十和几个一组成的。</p>
      <p style="margin-top:8px">💡 例如：56是由5个十和6个一组成的；30是由3个十组成的。</p>
      <p style="margin-top:8px">🔢 10个十是100。</p>
      <div style="margin-top:16px;padding:12px;background:#81c784;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        数字积木！拖动十块和一块组成正确的数字。
      </div>
    </div>

    <div class="card game">
      <h2>🧱 数字积木</h2>
      <div class="hint">拖动十块和一块组成目标数字</div>
      
      <div class="question" id="question">请组成数字：56</div>
      
      <div class="count-display">
        <span>十块：<span id="tenCount" class="count-box">0</span></span>
        <span>一块：<span id="oneCount" class="count-box">0</span></span>
      </div>
      
      <div class="target-box" id="targetBox">
        <div style="font-size:32px;font-weight:bold;color:var(--accent2)">?</div>
      </div>
      
      <div class="blocks-area" id="blocks"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const targetBox = document.getElementById('targetBox')
    const blocks = document.getElementById('blocks')
    const tenCountEl = document.getElementById('tenCount')
    const oneCountEl = document.getElementById('oneCount')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentNum = 0
    let selectedTens = 0
    let selectedOnes = 0
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function updateCounts() {
      tenCountEl.textContent = selectedTens
      oneCountEl.textContent = selectedOnes
      
      const total = selectedTens * 10 + selectedOnes
      if (total > 0) {
        targetBox.innerHTML = `<div style="font-size:32px;font-weight:bold;color:var(--accent2)">${total}</div>`
      } else {
        targetBox.innerHTML = `<div style="font-size:32px;font-weight:bold;color:var(--accent2)">?</div>`
      }
      
      if (total === currentNum) {
        targetBox.style.borderColor = 'var(--correct)'
        messageEl.textContent = '✅ 正确！太棒了！'
        messageEl.style.color = 'var(--correct)'
        messageEl.style.display = 'block'
        setScore(score + 10)
        
        setTimeout(() => {
          nextQuestion()
        }, 1000)
      } else if (total > 0 && total !== currentNum) {
        targetBox.style.borderColor = 'var(--wrong)'
      }
    }
    
    function initBlocks(tens, ones) {
      blocks.innerHTML = ''
      selectedTens = 0
      selectedOnes = 0
      
      const extraTens = Math.min(3, tens)
      const extraOnes = Math.min(3, ones)
      
      for (let i = 0; i < tens + extraTens; i++) {
        const block = document.createElement('div')
        block.className = 'block-ten'
        block.textContent = '10'
        block.draggable = true
        block.dataset.type = 'ten'
        
        block.addEventListener('dragstart', e => {
          e.dataTransfer.setData('type', 'ten')
          block.style.opacity = '0.5'
        })
        
        block.addEventListener('dragend', () => {
          block.style.opacity = '1'
        })
        
        blocks.appendChild(block)
      }
      
      for (let i = 0; i < ones + extraOnes; i++) {
        const block = document.createElement('div')
        block.className = 'block-one'
        block.draggable = true
        block.dataset.type = 'one'
        
        block.addEventListener('dragstart', e => {
          e.dataTransfer.setData('type', 'one')
          block.style.opacity = '0.5'
        })
        
        block.addEventListener('dragend', () => {
          block.style.opacity = '1'
        })
        
        blocks.appendChild(block)
      }
      
      updateCounts()
    }
    
    targetBox.addEventListener('dragover', e => e.preventDefault())
    targetBox.addEventListener('drop', e => {
      const type = e.dataTransfer.getData('type')
      
      if (type === 'ten') {
        selectedTens++
      } else if (type === 'one') {
        selectedOnes++
      }
      
      updateCounts()
    })
    
    targetBox.addEventListener('click', () => {
      if (selectedTens > 0) {
        selectedTens--
        updateCounts()
      } else if (selectedOnes > 0) {
        selectedOnes--
        updateCounts()
      }
    })
    
    function generateQuestion() {
      currentNum = Math.floor(Math.random() * 90) + 10
      const tens = Math.floor(currentNum / 10)
      const ones = currentNum % 10
      
      questionEl.textContent = '请组成数字：' + currentNum
      messageEl.style.display = 'none'
      targetBox.style.borderColor = 'var(--accent)'
      
      initBlocks(tens, ones)
    }
    
    function nextQuestion() {
      generateQuestion()
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', nextQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
