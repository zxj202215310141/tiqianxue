<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>等差数列</title>
  <style>
    :root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:22px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}
    .opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}
    .btn:active{transform:scale(0.95)}.row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}.hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:20px}.opt-btn{min-width:100px;font-size:20px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>📈 等差数列</h1>
      <p>如果一个数列从第二项起，每一项与它前一项的<strong>差</strong>都相等，这个数列叫做<strong>等差数列</strong>，这个差叫做<strong>公差</strong>。</p>
      <p style="margin-top:8px">💡 等差数列的关键要素：<strong>首项</strong>、<strong>公差</strong>、<strong>项数</strong>。<br>第n项 = 首项 + (n-1)×公差</p>
      <p style="margin-top:8px">🔢 例如：3, 7, 11, 15, 19... 首项=3，公差=4。<br>第10项 = 3 + (10-1)×4 = 39。</p>
      <p style="margin-top:8px">📝 求和公式：(首项+末项)×项数÷2。高斯算法：1+2+...+100 = 5050。</p>
      <div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算等差数列的相关数值！</div>
    </div>
    <div class="card game">
      <h2>📈 等差数列挑战</h2>
      <div class="hint">计算并选择正确答案</div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>
  <script>
    const questionEl=document.getElementById('question'),optionsEl=document.getElementById('options');
    const nextBtn=document.getElementById('next'),resetBtn=document.getElementById('reset');
    const scoreEl=document.getElementById('scoreVal'),messageEl=document.getElementById('message');
    let score=0,currentAnswer='';
    const questions=[
      {text:'2, 5, 8, 11... 公差是？',options:['2','3','5','8'],answer:'3'},
      {text:'3, 7, 11, 15... 第5项是多少？',options:['17','19','21','23'],answer:'19'},
      {text:'首项5，公差3，第4项是？',options:['12','14','15','17'],answer:'14'},
      {text:'1+2+3+...+10 = ？',options:['45','50','55','60'],answer:'55'},
      {text:'2, 4, 6, 8... 第10项是？',options:['18','20','22','24'],answer:'20'},
      {text:'10, 20, 30, 40... 公差是？',options:['5','10','15','20'],answer:'10'},
      {text:'首项1，公差2，第5项是？',options:['7','8','9','11'],answer:'9'},
      {text:'5, 9, 13, 17... 第6项是？',options:['21','23','25','27'],answer:'25'},
      {text:'1+3+5+7+9 = ？',options:['20','25','30','35'],answer:'25'},
      {text:'首项10，公差5，第3项是？',options:['15','20','25','30'],answer:'20'},
      {text:'等差数列相邻两项的差叫做？',options:['首项','公差','项数','末项'],answer:'公差'},
      {text:'100-99+98-97+...+2-1 = ？',options:['0','50','100','1'],answer:'50'}
    ];
    function setScore(v){score=v;scoreEl.textContent=score}
    function generateQuestion(){
      const idx=Math.floor(Math.random()*questions.length),q=questions[idx];currentAnswer=q.answer;
      questionEl.textContent=q.text;messageEl.style.display='none';optionsEl.innerHTML='';
      q.options.forEach(opt=>{
        const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt;
        btn.addEventListener('click',()=>{
          if(opt===currentAnswer){btn.classList.add('correct');messageEl.textContent='✅ 正确！';messageEl.style.color='var(--correct)';messageEl.style.display='block';setScore(score+10)}
          else{btn.classList.add('wrong');messageEl.textContent='❌ 正确答案是 '+currentAnswer;messageEl.style.color='var(--wrong)';messageEl.style.display='block'}
        });optionsEl.appendChild(btn);
      });
    }
    function init(){score=0;setScore(0);generateQuestion()}
    nextBtn.addEventListener('click',generateQuestion);resetBtn.addEventListener('click',init);init();
  </script>
</body>
</html>
