<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>加法交换律</title>
  <style>
    :root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:24px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}
    .opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}
    .btn:active{transform:scale(0.95)}.row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}.hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔄 加法交换律</h1>
      <p>两个数相加，<strong>交换加数的位置</strong>，和不变。</p>
      <p style="margin-top:8px">💡 公式：<strong>a + b = b + a</strong></p>
      <p style="margin-top:8px">🔢 例如：3+5 = 8，5+3 = 8，所以 3+5 = 5+3。</p>
      <p style="margin-top:8px">📝 应用：46+78+54 = 46+54+78 = 100+78 = 178（先凑整百）</p>
      <div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px"><strong>🎮 游戏说明：</strong><br>应用加法交换律完成计算！</div>
    </div>
    <div class="card game">
      <h2>🔄 加法交换律挑战</h2>
      <div class="hint">选择正确答案</div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>
  <script>
    const questionEl=document.getElementById('question'),optionsEl=document.getElementById('options');
    const nextBtn=document.getElementById('next'),resetBtn=document.getElementById('reset');
    const scoreEl=document.getElementById('scoreVal'),messageEl=document.getElementById('message');
    let score=0,currentAnswer='';
    const questions=[
      {text:'加法交换律的公式是？',options:['a+b=b+a','a+b=c','a-b=b-a','a×b=b×a'],answer:'a+b=b+a'},
      {text:'25+38+75 怎样算最快？',options:['25+38=63再+75','38+75=113再+25','25+75+38=138','逐个加'],answer:'25+75+38=138'},
      {text:'交换加数的位置，和会？',options:['变大','变小','不变','有时变化'],answer:'不变'},
      {text:'67+89+33 最简便的算法？',options:['先算67+89','先算89+33','先算67+33+89','都一样'],answer:'先算67+33+89'},
      {text:'12+45 = 45+？',options:['12','57','45','33'],answer:'12'},
      {text:'200+150 = ？= ？+200',options:['350和150','350和100','400和150','300和200'],answer:'350和150'},
      {text:'加法交换律适合几个数？',options:['只有2个','2个及以上','只有3个','只有整数'],answer:'2个及以上'},
      {text:'下面哪个用了加法交换律？',options:['2+3+5=10','3+7=7+3','(2+3)+4=2+(3+4)','2×3=3×2'],answer:'3+7=7+3'},
      {text:'a+0 = ？',options:['0','a','1','2a'],answer:'a'},
      {text:'交换加数位置，和不变，这叫什么？',options:['加法结合律','加法交换律','乘法交换律','交换性质'],answer:'加法交换律'}
    ];
    function setScore(v){score=v;scoreEl.textContent=score}
    function generateQuestion(){const idx=Math.floor(Math.random()*questions.length),q=questions[idx];currentAnswer=q.answer;questionEl.textContent=q.text;messageEl.style.display='none';optionsEl.innerHTML='';q.options.forEach(opt=>{const btn=document.createElement('button');btn.className='opt-btn';btn.textContent=opt;btn.addEventListener('click',()=>{if(opt===currentAnswer){btn.classList.add('correct');messageEl.textContent='✅ 正确！';messageEl.style.color='var(--correct)';messageEl.style.display='block';setScore(score+10)}else{btn.classList.add('wrong');messageEl.textContent='❌ 答案是 '+currentAnswer;messageEl.style.color='var(--wrong)';messageEl.style.display='block'}});optionsEl.appendChild(btn);});}
    function init(){score=0;setScore(0);generateQuestion()}
    nextBtn.addEventListener('click',generateQuestion);resetBtn.addEventListener('click',init);init();
  </script>
</body>
</html>
