<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>两步应用题</title>
  <style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>2⃣ 两步应用题</h1><p>需要<strong>两步运算</strong>才能解决的问题。要先求出<strong>隐藏的中间量</strong>，再求最终答案。</p><p style="margin-top:8px">💡 解题步骤：<br>① 读题，找出已知和未知<br>② <strong>确定中间问题</strong>（先算什么）<br>③ 列式算出中间结果，再算最终结果</p><p style="margin-top:8px">🔢 例如：小明买3支笔，每支2元，付10元，找多少？<br>第一步：3×2=6元。第二步：10-6=4元。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>解决两步应用题！</div></div>
<div class="card game"><h2>2⃣ 两步应用题挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="msg" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('msg');let sc=0,ca='';const qs=[{t:'小明买3个面包，每个4元，付了20元，要找多少元？',o:['6','8','12','4'],a:'8'},{t:'学校有32人，其中女生18人，男生几人？',o:['12','14','16','20'],a:'14'},{t:'一本书80页，第一天看25页，第二天看30页，还剩几页？',o:['20','25','30','55'],a:'25'},{t:'每箱苹果15千克，运来4箱，卖出38千克，还剩几千克？',o:['18','22','28','60'],a:'22'},{t:'小红有5张邮票，小明的邮票是小红的3倍，两人共有几张？',o:['15','20','25','18'],a:'20'},{t:'一个书包58元，比铅笔盒贵45元，铅笔盒几元？',o:['13','23','103','3'],a:'13'},{t:'学校食堂原有50千克米，用去25千克，又买来30千克，现有？',o:['45','55','60','30'],a:'55'},{t:'爸爸35岁，比小明大27岁，小明几岁？',o:['62','8','12','18'],a:'8'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
