<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>周长的认识</title><style>:root{--bg:#fff8e1;--card:#ffffff;--accent:#ffe082;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>⭕ 周长的认识</h1><p><strong>周长</strong>是封闭图形<strong>一周的长度</strong>，即所有边的长度之和。</p><p style="margin-top:8px">💡 常见周长公式：<br>• 长方形周长 = <strong>(长+宽)×2</strong><br>• 正方形周长 = <strong>边长×4</strong><br>• 三角形周长 = 三条边之和<br>• 圆的周长 = <strong>2πr = πd</strong></p><p style="margin-top:8px">🔢 例如：长5cm宽3cm的长方形，周长=(5+3)×2=16cm。</p><div style="margin-top:16px;padding:12px;background:#ffe082;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算不同图形的周长！</div></div><div class="card game"><h2>⭕ 周长挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'周长是指什么？',o:['图形的大小','图形一周的长度','图形的面积','图形的高度'],a:'图形一周的长度'},{t:'长方形周长公式是？',o:['长+宽','长×宽','(长+宽)×2','长×2+宽'],a:'(长+宽)×2'},{t:'正方形周长公式是？',o:['边长×2','边长×4','边长×边长','边长+边长'],a:'边长×4'},{t:'圆的周长公式是？',o:['πr','2πr','πr²','2πr²'],a:'2πr'},{t:'长6宽4的长方形周长？',o:['10','20','24','48'],a:'20'},{t:'边长5cm的正方形周长？',o:['10cm','15cm','20cm','25cm'],a:'20cm'},{t:'三角形三边为3cm 4cm 5cm，周长？',o:['6cm','10cm','12cm','15cm'],a:'12cm'},{t:'半径2cm的圆周长约？',o:['6.28cm','12.56cm','25.12cm','3.14cm'],a:'12.56cm'},{t:'周长相等的正方形和长方形面积？',o:['正方形大','长方形大','一样大','不确定'],a:'正方形大'},{t:'直径4cm的圆周长约？',o:['6.28cm','12.56cm','25.12cm','50.24cm'],a:'12.56cm'},{t:'正方形边长扩大2倍，周长扩大？',o:['2倍','4倍','不变','8倍'],a:'2倍'},{t:'周长常用的单位是？',o:['平方米','立方米','米','千克'],a:'米'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
