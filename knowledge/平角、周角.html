<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>平角、周角</title>
<style>:root{--bg:#fff3e0;--card:#ffffff;--accent:#ffcc80;--accent2:#e65100;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:22px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(230,81,0,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#ff7043);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head>
<body><div class="wrap">
<div class="card knowledge"><h1>↔️ 平角、周角</h1><p><strong>平角</strong>和<strong>周角</strong>是两种特殊的大角。</p><p style="margin-top:8px">💡 定义：<br>• <strong>平角</strong>：等于<strong>180°</strong>，两条边在一条直线上<br>• <strong>周角</strong>：等于<strong>360°</strong>，射线绕端点旋转一周</p><p style="margin-top:8px">🔢 关系：<br>1平角 = 2直角<br>1周角 = 2平角 = 4直角</p><p style="margin-top:8px">📝 平角看起来像一条直线但不是直线（有顶点）。周角的两边重合。</p><div style="margin-top:16px;padding:12px;background:#ffcc80;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断平角和周角的知识！</div></div>
<div class="card game"><h2>↔️ 平角周角挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div>
<script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'平角等于多少度？',o:['90°','180°','270°','360°'],a:'180°'},{t:'周角等于多少度？',o:['90°','180°','270°','360°'],a:'360°'},{t:'1平角等于几个直角？',o:['1个','2个','3个','4个'],a:'2个'},{t:'1周角等于几个平角？',o:['1个','2个','3个','4个'],a:'2个'},{t:'1周角等于几个直角？',o:['1个','2个','3个','4个'],a:'4个'},{t:'平角的两条边在什么位置？',o:['互相垂直','在一条直线上','互相平行','重合'],a:'在一条直线上'},{t:'周角的两条边？',o:['互相垂直','在一条直线上','互相平行','重合'],a:'重合'},{t:'平角是直线吗？',o:['是','不是','有时是','无法确定'],a:'不是'},{t:'时钟上从12点到6点，时针转了多少度？',o:['90°','180°','270°','360°'],a:'180°'},{t:'90°×3等于多少？是什么角？',o:['180°平角','270°(大于平角小于周角)','360°周角','无法计算'],a:'270°(大于平角小于周角)'},{t:'平角比周角？',o:['大','小','相等','无法比较'],a:'小'},{t:'钟面上3:00时，时针和分针成什么角？',o:['锐角','直角','钝角','平角'],a:'直角'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
