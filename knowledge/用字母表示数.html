<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>用字母表示数</title>
  <style>
    :root{--bg:#f1f8e9;--card:#ffffff;--accent:#aed581;--accent2:#558b2f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:28px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{width:150px;height:70px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(85,139,47,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#7cb342);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(85,139,47,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{width:130px;height:60px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔤 用字母表示数</h1>
      <p>用字母可以表示任意数，也可以表示数量关系。</p>
      <p style="margin-top:8px">💡 字母与数字相乘时，数字要写在字母前面，乘号可以省略。</p>
      <p style="margin-top:8px">🔢 例如：5×a = 5a，3×x = 3x</p>
      <div style="margin-top:16px;padding:12px;background:#aed581;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        选择正确的字母表达式！
      </div>
    </div>

    <div class="card game">
      <h2>🔤 字母表达式挑战</h2>
      <div class="hint">选择正确的答案</div>
      
      <div class="question" id="question">a的3倍可以表示为：</div>
      
      <div class="options" id="options"></div>
      
      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>
      
      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')
    
    let score = 0
    let currentAnswer = ''
    
    const questions = [
      { text: 'a的3倍可以表示为：', options: ['a3', '3a', 'a+3', 'a-3'], answer: '3a' },
      { text: 'x与5的和可以表示为：', options: ['5x', 'x5', 'x+5', 'x-5'], answer: 'x+5' },
      { text: 'b减去8可以表示为：', options: ['8-b', 'b-8', 'b×8', 'b÷8'], answer: 'b-8' },
      { text: 'y的平方可以表示为：', options: ['2y', 'y2', 'y²', 'y+2'], answer: 'y²' },
      { text: 'm除以4可以表示为：', options: ['4÷m', 'm÷4', '4m', 'm4'], answer: 'm÷4' },
      { text: '比n大10的数可以表示为：', options: ['10-n', 'n-10', 'n+10', '10n'], answer: 'n+10' },
      { text: 'a与b的积可以表示为：', options: ['a+b', 'ab', 'a÷b', 'a-b'], answer: 'ab' },
      { text: '2个a相加可以表示为：', options: ['a²', '2a', 'a2', 'a+2'], answer: '2a' },
      { text: '比x的2倍少5的数：', options: ['2x-5', '2x+5', '5-2x', 'x-5'], answer: '2x-5' },
      { text: 'a的5倍加上b：', options: ['5a+b', 'a+5b', '5(a+b)', 'ab+5'], answer: '5a+b' },
      { text: 'a与b的和的3倍：', options: ['3a+b', 'a+3b', '3(a+b)', '3ab'], answer: '3(a+b)' },
      { text: 'x的一半可以表示为：', options: ['x÷2', '2x', 'x-2', 'x+2'], answer: 'x÷2' }
    ]
    
    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }
    
    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer
      
      questionEl.textContent = q.text
      messageEl.style.display = 'none'
      
      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer + '！'
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }
    
    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }
    
    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
