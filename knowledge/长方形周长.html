<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>长方形周长</title><style>:root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:120px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:20px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>▯ 长方形周长</h1><p>长方形<strong>周长</strong> = <strong>(长+宽)×2</strong>，即四边长度之和。</p><p style="margin-top:8px">💡 推导：长方形对边相等，周长=长+宽+长+宽=(长+宽)×2。</p><p style="margin-top:8px">🔢 例如：长8cm宽3cm，周长=(8+3)×2=22cm。<br>已知周长20cm长6cm，宽=20÷2-6=4cm。</p><p style="margin-top:8px">📝 常见应用：相框周长、跑道、围墙长度等。</p><div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px"><strong>🎮 游戏说明：</strong><br>计算长方形周长！</div></div><div class="card game"><h2>▯ 长方形周长挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'长10宽6的长方形周长？',o:['16','32','60','26'],a:'32'},{t:'周长24长8的长方形宽？',o:['2','4','6','8'],a:'4'},{t:'长7宽5周长？',o:['12','24','35','17'],a:'24'},{t:'长方形周长公式？',o:['长+宽','(长+宽)×2','长×宽','长×2+宽×2'],a:'(长+宽)×2'},{t:'周长18宽4长？',o:['3','4','5','7'],a:'5'},{t:'长12宽3周长？',o:['15','30','36','18'],a:'30'},{t:'正方形边长6cm周长24cm，等周长长方形长7宽？',o:['3','4','5','6'],a:'5'},{t:'长方形长扩大2倍宽不变，周长？',o:['不变','扩大2倍','扩大但不是2倍','缩小'],a:'扩大但不是2倍'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
