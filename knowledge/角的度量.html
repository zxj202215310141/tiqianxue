<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>角的度量</title><style>:root{--bg:#e3f2fd;--card:#ffffff;--accent:#90caf9;--accent2:#0d47a1;--text:#2d3436;--correct:#00b894;--wrong:#e17055}*{box-sizing:border-box}body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}.wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}.card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}h1{margin:0 0 12px 0;color:var(--accent2)}h2{margin:0 0 12px 0;color:var(--accent2)}.knowledge{min-height:260px}.game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}.question{font-size:20px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}.options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}.opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:18px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(13,71,161,0.3)}.opt-btn:active{transform:scale(0.95)}.opt-btn.correct{background:var(--correct)}.opt-btn.wrong{background:var(--wrong)}.btn{background:linear-gradient(135deg,var(--accent2),#1565c0);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer}.row{display:flex;gap:12px;margin-top:16px;align-items:center}.score{font-size:18px;font-weight:bold;color:var(--accent2)}@media(max-width:900px){.wrap{grid-template-columns:1fr}}</style></head><body><div class="wrap"><div class="card knowledge"><h1>📐 角的度量</h1><p>角的大小用<strong>度(°)</strong>来度量，测量工具是<strong>量角器</strong>。</p><p style="margin-top:8px">💡 量角步骤：<br>① 量角器的<strong>中心</strong>对准角的<strong>顶点</strong><br>② 0°刻度线对准角的<strong>一条边</strong><br>③ 读取另一条边所指的刻度</p><p style="margin-top:8px">🔢 1°=60'(分), 1'=60"(秒)。直角=90°，平角=180°，周角=360°。</p><div style="margin-top:16px;padding:12px;background:#90caf9;border-radius:10px"><strong>🎮 游戏说明：</strong><br>判断角的度量知识！</div></div><div class="card game"><h2>📐 角的度量挑战</h2><div class="hint">选择正确答案</div><div class="question" id="q"></div><div class="options" id="o"></div><div id="m" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div><div class="row"><button id="n" class="btn">➡️ 下一题</button><button id="r" class="btn">🔄 重置</button><div class="score">⭐ 得分：<span id="s">0</span></div></div></div></div><script>const qe=document.getElementById('q'),oe=document.getElementById('o'),nb=document.getElementById('n'),rb=document.getElementById('r'),se=document.getElementById('s'),me=document.getElementById('m');let sc=0,ca='';const qs=[{t:'测量角的大小用什么工具？',o:['尺子','量角器','圆规','三角板'],a:'量角器'},{t:'角的度量单位是什么？',o:['米','厘米','度','千克'],a:'度'},{t:'度可以用什么符号表示？',o:['%','#','°','@'],a:'°'},{t:'量角时量角器的中心对准哪里？',o:['角的一边','角的顶点','角的另一边','任意位置'],a:'角的顶点'},{t:'1°等于多少分？',o:['10','30','60','100'],a:'60'},{t:'三角板中最小的角是多少度？',o:['15°','30°','45°','60°'],a:'30°'},{t:'等腰直角三角板的两个锐角各是多少？',o:['30°','45°','60°','90°'],a:'45°'},{t:'量角器上通常有几圈刻度？',o:['0圈','1圈','2圈','3圈'],a:'2圈'},{t:'量角读刻度时从哪边开始读？',o:['左边','右边','0°刻度线那一边','任意'],a:'0°刻度线那一边'},{t:'三个一样的三角板拼在一起能最大得到？',o:['270°','360°','180°','540°'],a:'360°'},{t:'时钟3:30分针与时针夹角约？',o:['60°','75°','90°','105°'],a:'75°'},{t:'1个平角可以分成几个60°的角？',o:['2个','3个','4个','6个'],a:'3个'}];function ss(v){sc=v;se.textContent=sc}function gg(){const i=Math.floor(Math.random()*qs.length),q=qs[i];ca=q.a;qe.textContent=q.t;me.style.display='none';oe.innerHTML='';q.o.forEach(op=>{const b=document.createElement('button');b.className='opt-btn';b.textContent=op;b.addEventListener('click',()=>{if(op===ca){b.classList.add('correct');me.textContent='✅ 正确！';me.style.color='var(--correct)';me.style.display='block';ss(sc+10)}else{b.classList.add('wrong');me.textContent='❌ 答案是 '+ca;me.style.color='var(--wrong)';me.style.display='block'}});oe.appendChild(b);});}function ii(){sc=0;ss(0);gg()}nb.addEventListener('click',gg);rb.addEventListener('click',ii);ii();</script></body></html>
