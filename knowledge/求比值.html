<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>求比值</title>
  <style>
    :root{--bg:#fce4ec;--card:#ffffff;--accent:#f48fb1;--accent2:#880e4f;--text:#2d3436;--correct:#00b894;--wrong:#e17055}
    *{box-sizing:border-box}
    body{margin:0;font-family:'Segoe UI',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text);padding:12px}
    .wrap{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .card{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(0,0,0,0.08)}
    h1{margin:0 0 12px 0;color:var(--accent2)}
    h2{margin:0 0 12px 0;color:var(--accent2)}
    .knowledge{min-height:260px}
    .game{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
    .question{font-size:26px;font-weight:bold;color:var(--accent2);margin:20px 0;text-align:center}
    .options{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;margin:20px 0}
    .opt-btn{min-width:130px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:15px;border:none;font-size:22px;font-weight:bold;color:white;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.3)}
    .opt-btn:active{transform:scale(0.95)}
    .opt-btn.correct{background:var(--correct)}
    .opt-btn.wrong{background:var(--wrong)}
    .btn{background:linear-gradient(135deg,var(--accent2),#c2185b);color:white;padding:10px 20px;border-radius:12px;border:none;font-size:16px;cursor:pointer;transition:transform 0.2s;box-shadow:0 4px 8px rgba(136,14,79,0.4)}
    .btn:active{transform:scale(0.95)}
    .row{display:flex;gap:12px;margin-top:16px;align-items:center}
    .score{font-size:18px;font-weight:bold;color:var(--accent2)}
    .hint{font-size:14px;color:#636e72;margin-top:8px;text-align:center}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}.question{font-size:22px}.opt-btn{min-width:110px;font-size:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card knowledge">
      <h1>🔢 求比值</h1>
      <p><strong>比值</strong>是比的前项除以后项所得的<strong>商</strong>。求比值用<strong>前项 ÷ 后项</strong>。</p>
      <p style="margin-top:8px">💡 比值可以用<strong>分数</strong>、<strong>小数</strong>或<strong>整数</strong>表示。</p>
      <p style="margin-top:8px">🔢 例如：
        <br>12:4 = 12÷4 = 3（整数）
        <br>5:8 = 5÷8 = 0.625（小数）
        <br>3:4 = 3÷4 = 3/4（分数）</p>
      <p style="margin-top:8px">📝 求比值和化简比的区别：比值是一个数；化简比结果还是一个比。</p>
      <div style="margin-top:16px;padding:12px;background:#f48fb1;border-radius:10px">
        <strong>🎮 游戏说明：</strong><br>
        计算比的比值，选择正确答案！
      </div>
    </div>

    <div class="card game">
      <h2>🔢 求比值挑战</h2>
      <div class="hint">计算并选择正确的比值</div>

      <div class="question" id="question"></div>

      <div class="options" id="options"></div>

      <div id="message" style="margin-top:12px;font-weight:bold;font-size:20px;color:var(--correct);display:none"></div>

      <div class="row">
        <button id="next" class="btn">➡️ 下一题</button>
        <button id="reset" class="btn">🔄 重置</button>
        <div class="score">⭐ 得分：<span id="scoreVal">0</span></div>
      </div>
    </div>
  </div>

  <script>
    const questionEl = document.getElementById('question')
    const optionsEl = document.getElementById('options')
    const nextBtn = document.getElementById('next')
    const resetBtn = document.getElementById('reset')
    const scoreEl = document.getElementById('scoreVal')
    const messageEl = document.getElementById('message')

    let score = 0
    let currentAnswer = ''

    const questions = [
      { text: '16:4 的比值是？', options: ['4', '8', '2', '12'], answer: '4' },
      { text: '10:25 的比值是？', options: ['2/5', '5/2', '0.25', '2.5'], answer: '2/5' },
      { text: '18:3 的比值是？', options: ['3', '6', '9', '15'], answer: '6' },
      { text: '7:14 的比值是？', options: ['1/2', '2', '1/7', '7'], answer: '1/2' },
      { text: '30:15 的比值是？', options: ['1/2', '2', '15', '45'], answer: '2' },
      { text: '9:12 的比值是？', options: ['3/4', '4/3', '3', '0.9'], answer: '3/4' },
      { text: '1.5:3 的比值是？', options: ['0.5', '2', '1.5', '4.5'], answer: '0.5' },
      { text: '100:25 的比值是？', options: ['2', '4', '25', '75'], answer: '4' },
      { text: '5:20 的比值是？', options: ['0.25', '4', '5', '15'], answer: '0.25' },
      { text: '24:8 的比值是？', options: ['2', '3', '4', '16'], answer: '3' },
      { text: '0.6:0.2 的比值是？', options: ['3', '0.3', '0.12', '6'], answer: '3' },
      { text: '1/4:1/2 的比值是？', options: ['1/2', '2', '1/8', '8'], answer: '1/2' }
    ]

    function setScore(v) {
      score = v
      scoreEl.textContent = score
    }

    function generateQuestion() {
      const index = Math.floor(Math.random() * questions.length)
      const q = questions[index]
      currentAnswer = q.answer

      questionEl.textContent = q.text
      messageEl.style.display = 'none'

      optionsEl.innerHTML = ''
      q.options.forEach(opt => {
        const btn = document.createElement('button')
        btn.className = 'opt-btn'
        btn.textContent = opt
        btn.addEventListener('click', () => {
          if (opt === currentAnswer) {
            btn.classList.add('correct')
            messageEl.textContent = '✅ 正确！太棒了！'
            messageEl.style.color = 'var(--correct)'
            messageEl.style.display = 'block'
            setScore(score + 10)
          } else {
            btn.classList.add('wrong')
            messageEl.textContent = '❌ 不对哦，正确答案是 ' + currentAnswer
            messageEl.style.color = 'var(--wrong)'
            messageEl.style.display = 'block'
          }
        })
        optionsEl.appendChild(btn)
      })
    }

    function init() {
      score = 0
      setScore(0)
      generateQuestion()
    }

    nextBtn.addEventListener('click', generateQuestion)
    resetBtn.addEventListener('click', init)
    init()
  </script>
</body>
</html>
